<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Resurrection">
  <meta name="application-name" content="Resurrection">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-TileColor" content="#000000">
  <meta name="msapplication-tap-highlight" content="no">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512x512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png">
  <title>RESURRECTION</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            royal: '#22D3EE',
            emerald: '#34D399',
            card: '#0A0A0D',
            border: '#1A1A1E',
            dark: '#030305',
            tactical: '#22D3EE',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* ===== BASE & MOBILE UX ===== */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html { overscroll-behavior-y: contain; -webkit-overflow-scrolling: touch; }
    body { font-family: 'Inter', system-ui, sans-serif; overscroll-behavior: none; touch-action: manipulation; -webkit-text-size-adjust: 100%; overscroll-behavior-y: contain; }
    a, button, input, select, textarea, [onclick] { touch-action: manipulation; }
    input[type="text"], input[type="number"], input[type="password"], textarea, select { font-size: 16px !important; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(34,211,238,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(34,211,238,0.2); }

    /* ===== PREMIUM TACTICAL TOKENS ===== */
    :root {
      --prem-bg-deep: #050507;
      --prem-bg-card: #0A0A0D;
      --prem-bg-card-elevated: #0E0E12;
      --prem-bg-surface: #141418;
      --prem-border-subtle: rgba(255,255,255,0.035);
      --prem-border-default: rgba(255,255,255,0.06);
      --prem-border-cyan: rgba(34,211,238,0.12);
      --prem-text-primary: #EEEEF2;
      --prem-text-secondary: #8A8A92;
      --prem-text-tertiary: #48484A;
      --prem-text-quaternary: #2C2C2E;
      --prem-accent-cyan: #22D3EE;
      --prem-accent-green: #34D399;
      --prem-accent-red: #F87171;
      --prem-accent-amber: #FBBF24;
      --prem-accent-blue: #3B82F6;
      --prem-accent-purple: #A78BFA;
      --prem-glow-cyan: 0 0 20px rgba(34,211,238,0.08), 0 0 60px rgba(34,211,238,0.03);
      --prem-shadow-card: 0 1px 3px rgba(0,0,0,0.5), 0 4px 20px rgba(0,0,0,0.4);
      --prem-shadow-elevated: 0 2px 8px rgba(0,0,0,0.6), 0 8px 40px rgba(0,0,0,0.5);
      --prem-shadow-deep: 0 4px 16px rgba(0,0,0,0.7), 0 16px 64px rgba(0,0,0,0.5);
    }

    /* ===== NEUMORPHIC CARD SYSTEM ===== */
    .card-neu {
      background: var(--prem-bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--prem-border-subtle);
      border-radius: 18px;
      box-shadow: var(--prem-shadow-card);
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
    }
    .card-neu:hover { box-shadow: var(--prem-shadow-elevated); border-color: var(--prem-border-default); }
    .card-inner {
      background: var(--prem-bg-deep);
      border: 1px solid var(--prem-border-subtle);
      border-radius: 12px;
      box-shadow: inset 2px 2px 6px rgba(0,0,0,0.5);
    }

    /* ===== TAB TRANSITIONS ===== */
    .tab-enter { animation: tabIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes tabIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); filter: blur(2px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    #mainContent { transition: opacity 0.15s ease; }

    /* ===== HABIT SYSTEM ===== */
    .habit-check { transition: all 0.3s cubic-bezier(.4,0,.2,1); }
    .habit-check.done {
      background: rgba(52, 211, 153, 0.06) !important;
      border-color: var(--prem-accent-green) !important;
      box-shadow: 0 0 18px rgba(52,211,153,0.15), inset 0 0 15px rgba(52,211,153,0.04) !important;
    }
    .habit-icon-ring { transition: all 0.3s ease; }
    .habit-icon-ring.done { box-shadow: 0 0 14px rgba(52,211,153,0.3); }
    .streak-fire { display: inline-block; animation: firePulse 1.5s ease-in-out infinite; }
    @keyframes firePulse {
      0%, 100% { transform: scale(1) rotate(0deg); filter: brightness(1) drop-shadow(0 0 0 transparent); }
      25% { transform: scale(1.1) rotate(-3deg); }
      50% { transform: scale(1.2) rotate(2deg); filter: brightness(1.4) drop-shadow(0 0 8px rgba(255,150,0,0.4)); }
      75% { transform: scale(1.1) rotate(-1deg); }
    }

    /* ===== NEON SYSTEM ===== */
    .neon-text { color: var(--prem-accent-green); text-shadow: 0 0 8px rgba(52,211,153,0.4), 0 0 20px rgba(52,211,153,0.15); }
    .neon-bar { background: linear-gradient(90deg, var(--prem-accent-green), #10B981); box-shadow: 0 0 8px rgba(52,211,153,0.25); }
    .neon-bar-track { box-shadow: inset 0 0 8px rgba(0,0,0,0.9); }
    .neon-red { color: var(--prem-accent-red); text-shadow: 0 0 8px rgba(248,113,113,0.5), 0 0 20px rgba(248,113,113,0.2); }
    .neon-red-glow { box-shadow: 0 0 16px rgba(248,113,113,0.2), inset 0 0 12px rgba(248,113,113,0.04) !important; border-color: var(--prem-accent-red) !important; }
    .neon-red-bar { background: linear-gradient(90deg, var(--prem-accent-red), #dc2626); box-shadow: 0 0 8px rgba(248,113,113,0.3); }
    @keyframes redPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(255,50,50,0.3); }
      50% { opacity: 0.85; box-shadow: 0 0 35px rgba(255,50,50,0.5); }
    }
    .red-pulse { animation: redPulse 2s ease-in-out infinite; }
    .neon-yellow { color: #FACC15; text-shadow: 0 0 8px rgba(250,204,21,0.5), 0 0 20px rgba(250,204,21,0.25); }
    .neon-gold { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6), 0 0 20px rgba(255,215,0,0.3); }
    .neon-gold-border { border-color: rgba(255,215,0,0.3) !important; box-shadow: 0 0 12px rgba(255,215,0,0.1); }

    /* ===== GLOW BUTTONS ===== */
    .btn-royal {
      background: linear-gradient(135deg, #0891B2, #0E7490);
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 2px 12px rgba(34,211,238,0.15), 0 0 0 1px rgba(34,211,238,0.08);
      border-radius: 14px;
    }
    .btn-royal:hover { box-shadow: 0 4px 20px rgba(34,211,238,0.25); transform: translateY(-1px); }
    .btn-royal:active { transform: scale(0.96) translateY(0); box-shadow: 0 1px 6px rgba(34,211,238,0.2), 0 0 20px rgba(34,211,238,0.12); }
    .btn-glow-green {
      box-shadow: 0 0 15px rgba(52,211,153,0.2), 0 0 40px rgba(52,211,153,0.06);
      border-color: var(--prem-accent-green) !important;
    }

    /* ===== SCORE RING ===== */
    .score-ring { background: conic-gradient(var(--ring-color) calc(var(--score) * 3.6deg), #1a1a1a 0deg); border-radius: 50%; }
    .bar-grow { animation: barGrow 0.7s cubic-bezier(.25,.46,.45,.94) forwards; }
    @keyframes barGrow { from { height: 0; opacity: 0.5; } }

    /* ===== TIMERS ===== */
    .mono-timer { font-family: 'Courier New', 'Consolas', monospace; font-variant-numeric: tabular-nums; letter-spacing: 1px; }

    /* ===== SOBERANIA ===== */
    .sobriety-card { transition: all 0.3s cubic-bezier(.4,0,.2,1); }
    .sobriety-card:hover { border-color: #444 !important; transform: translateY(-1px); }
    .sobriety-card.streak-glow {
      box-shadow: 0 0 20px rgba(52,211,153,0.1), 0 0 40px rgba(52,211,153,0.04), inset 0 0 20px rgba(52,211,153,0.02);
      border-color: rgba(52,211,153,0.25) !important;
    }
    .verse-glow {
      background: linear-gradient(135deg, rgba(34,211,238,0.04), rgba(0,0,0,0));
      border-color: rgba(34,211,238,0.1) !important;
    }

    /* ===== NAV (sidebar-only) ===== */
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* ===== INPUTS ===== */
    input, textarea, select {
      background: #0d0d0d !important;
      border: 1px solid #1a1a1a !important;
      color: #fff !important;
      outline: none !important;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4), inset -1px -1px 3px rgba(255,255,255,0.02);
      transition: all 0.2s ease;
    }
    input:focus, textarea:focus, select:focus {
      border-color: rgba(34,211,238,0.5) !important;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4), 0 0 0 2px rgba(34,211,238,0.15), 0 0 12px rgba(34,211,238,0.08);
    }

    /* ===== FOCUS MODULE ===== */
    .focus-pulse { animation: focusPulse 3s ease-in-out infinite; }
    @keyframes focusPulse {
      0%, 100% { box-shadow: 0 0 16px rgba(167,139,250,0.15), 0 0 48px rgba(167,139,250,0.05); }
      50% { box-shadow: 0 0 28px rgba(167,139,250,0.3), 0 0 80px rgba(167,139,250,0.1); }
    }
    .focus-timer-text { font-family: 'Courier New', 'Consolas', monospace; font-variant-numeric: tabular-nums; letter-spacing: 3px; }
    .focus-immersive {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.97);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .focus-ring-active { border: 3px solid #7C3AED; animation: focusRingSpin 4s linear infinite; }
    @keyframes focusRingSpin {
      0% { border-color: #7C3AED; box-shadow: 0 0 30px rgba(124,58,237,0.4); }
      33% { border-color: #06b6d4; box-shadow: 0 0 40px rgba(6,182,212,0.4); }
      66% { border-color: #8b5cf6; box-shadow: 0 0 35px rgba(139,92,246,0.4); }
      100% { border-color: #7C3AED; box-shadow: 0 0 30px rgba(124,58,237,0.4); }
    }
    .focus-scanline {
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(124,58,237,0.02) 2px, rgba(124,58,237,0.02) 4px);
    }
    /* Deep Work study ring */
    .study-ring {
      background: conic-gradient(from 0deg, #7C3AED calc(var(--pct) * 3.6deg), #1a1a1a calc(var(--pct) * 3.6deg));
      border-radius: 50%;
      padding: 6px;
    }
    .study-ring-inner {
      background: radial-gradient(circle, #050505 60%, #0a0a0a 100%);
      border-radius: 50%;
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    /* Feynman modal */
    .feynman-textarea {
      background: #0a0a0a; border: 1px solid #222; color: #e5e5e5;
      font-size: 15px; line-height: 1.6; resize: none;
      transition: border-color 0.2s;
    }
    .feynman-textarea:focus { border-color: #7C3AED; outline: none; }
    .feynman-textarea::placeholder { color: #444; }
    /* Archive card */
    .archive-card {
      background: #111; border: 1px solid #1a1a1a; border-radius: 16px;
      transition: border-color 0.2s;
    }
    .archive-card:hover { border-color: #333; }
    /* Study mentor chat bubble */
    .mentor-bubble {
      background: linear-gradient(135deg, #1a0a2e 0%, #0a0a0a 100%);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 16px;
    }
    /* Markdown prose inside AI chat bubbles */
    .ai-prose p { margin: 0.4em 0; line-height: 1.7; }
    .ai-prose strong { color: #c4b5fd; font-weight: 800; }
    .ai-prose em { color: #a78bfa; }
    .ai-prose h1,.ai-prose h2,.ai-prose h3,.ai-prose h4 { color: #e9d5ff; font-weight: 800; margin: 0.6em 0 0.3em; }
    .ai-prose h3 { font-size: 0.95rem; }
    .ai-prose ul,.ai-prose ol { padding-left: 1.2em; margin: 0.4em 0; }
    .ai-prose li { margin: 0.2em 0; }
    .ai-prose li::marker { color: #7c3aed; }
    .ai-prose code { background: rgba(124,58,237,0.15); color: #c4b5fd; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.85em; }
    .ai-prose pre { background: #0a0a0a; border: 1px solid #1a1a2e; border-radius: 8px; padding: 0.8em; overflow-x: auto; margin: 0.5em 0; }
    .ai-prose pre code { background: none; padding: 0; }
    .ai-prose table { width: 100%; border-collapse: collapse; margin: 0.8em 0; font-size: 0.8rem; display: table; table-layout: auto; }
    .ai-prose th { background: rgba(124,58,237,0.2); color: #c4b5fd; padding: 8px 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }
    .ai-prose td { padding: 8px 10px; border: 1px solid rgba(255,255,255,0.08); }
    .ai-prose-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .ai-prose blockquote { border-left: 3px solid #7c3aed; padding-left: 0.8em; margin: 0.5em 0; color: #a78bfa; font-style: italic; }
    .ai-prose a { color: #a78bfa; text-decoration: underline; }

    /* ===== TREINO MODULE ===== */
    .workout-load { font-family: 'Courier New', 'Consolas', monospace; font-variant-numeric: tabular-nums; }
    .pr-glow { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6), 0 0 20px rgba(255,215,0,0.3); animation: prPulse 1.5s ease-in-out infinite; }
    @keyframes prPulse {
      0%, 100% { text-shadow: 0 0 8px rgba(255,215,0,0.6); }
      50% { text-shadow: 0 0 16px rgba(255,215,0,0.9), 0 0 30px rgba(255,215,0,0.4); }
    }
    .pr-badge { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05)); border: 1px solid rgba(255,215,0,0.3); color: #FFD700; }
    .day-selector-btn { transition: all 0.15s ease; }
    .day-selector-btn.active-day { background: var(--prem-accent-cyan) !important; color: #050507 !important; border-color: var(--prem-accent-cyan) !important; box-shadow: 0 0 10px rgba(34,211,238,0.2); }
    .exercise-row { transition: all 0.3s ease; }
    .exercise-row.done-exercise { opacity: 0.45; }
    .exercise-row.done-exercise .exercise-name { text-decoration: line-through; }
    .rest-timer-bar { height: 3px; background: var(--prem-accent-cyan); transition: width 1s linear; border-radius: 2px; box-shadow: 0 0 6px rgba(34,211,238,0.3); }

    /* ===== STATUS MODULE ===== */
    .status-bar { transition: height 0.6s ease-out; border-radius: 4px 4px 0 0; }
    .status-metric-card { background: var(--prem-bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--prem-border-subtle); border-radius: 16px; transition: all 0.2s ease; box-shadow: var(--prem-shadow-card); }
    .verdict-card { border-radius: 16px; position: relative; overflow: hidden; }
    .verdict-card::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.01) 3px, rgba(255,255,255,0.01) 6px); pointer-events: none; }

    /* ===== PIE CHART ===== */
    .pie-chart {
      width: 120px; height: 120px; border-radius: 50%;
      background: conic-gradient(var(--ess-color, #2563EB) 0deg calc(var(--ess-pct, 50) * 3.6deg), var(--dop-color, #FF3333) calc(var(--ess-pct, 50) * 3.6deg) 360deg);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.6), 0 0 15px rgba(0,0,0,0.4);
    }

    /* ===== SCARCITY VIGNETTE ===== */
    .scarcity-vignette::after {
      content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.08) 100%);
      animation: vignetteBreath 3s ease-in-out infinite;
    }
    @keyframes vignetteBreath {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ===== RECAIDA OVERLAY ===== */
    .recaida-overlay {
      position: fixed; inset: 0; z-index: 70;
      background: rgba(0,0,0,0.95);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }

    /* ===== TERMINAL & AI (v3.0) ===== */
    .terminal-output {
      background: #050505;
      border: 1px solid rgba(0,255,100,0.12);
      border-radius: 12px;
      padding: 16px;
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 11px;
      color: #00FF64;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 10px rgba(0,255,100,0.05);
    }
    .terminal-output::before {
      content: '> RESURRECTION v4.0 — TERMINAL DE GUERRA';
      display: block;
      color: rgba(0,255,100,0.4);
      font-size: 9px;
      letter-spacing: 2px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0,255,100,0.08);
    }
    .ai-verdict-card {
      background: linear-gradient(135deg, rgba(255,50,50,0.04), rgba(0,0,0,0));
      border: 1px solid rgba(255,50,50,0.15);
      border-radius: 16px;
      box-shadow: 8px 8px 20px rgba(0,0,0,0.6), -4px -4px 12px rgba(255,255,255,0.02);
    }
    .ai-loading { animation: aiPulse 1.5s ease-in-out infinite; }
    @keyframes aiPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .stagnation-tag { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #FF3333; }

    /* ===== AUTH SCREEN ===== */
    .auth-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .auth-card {
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 20px;
      box-shadow: 12px 12px 30px rgba(0,0,0,0.8), -6px -6px 20px rgba(255,255,255,0.02), 0 0 60px rgba(37,99,235,0.05);
    }
    .auth-input {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      background: #050505 !important; border: 1px solid #222 !important;
      color: #fff; font-size: 16px !important; font-weight: 600;
      outline: none; transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: #2563EB !important; box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
    .auth-input::placeholder { color: #444; }
    .auth-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      background: #2563EB; color: #fff; font-weight: 800; font-size: 14px;
      letter-spacing: 0.1em; border: none; cursor: pointer;
      transition: all 0.2s; text-transform: uppercase;
    }
    .auth-btn:hover { background: #1d4ed8; }
    .auth-btn:active { transform: scale(0.97); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-divider { display: flex; align-items: center; gap: 12px; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: #222; }
    .sync-indicator {
      position: fixed; top: 12px; right: 12px; z-index: 90;
      width: 8px; height: 8px; border-radius: 50%;
      transition: background 0.3s;
    }
    .sync-indicator.synced { background: #10B981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
    .sync-indicator.syncing { background: #F59E0B; animation: aiPulse 1s infinite; }
    .sync-indicator.error { background: #EF4444; }

    /* ===== CARD COLLECTION SYSTEM v2.0 ===== */
    .card-colecao {
      perspective: 800px;
      cursor: pointer;
    }
    .card-colecao-inner {
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      transform-style: preserve-3d;
      will-change: transform;
      position: relative;
      overflow: hidden;
    }
    .card-colecao:hover .card-colecao-inner {
      transform: rotateY(3deg) rotateX(-2deg) scale(1.05);
    }
    .card-locked {
      opacity: 0.35;
      filter: brightness(0) grayscale(1);
      pointer-events: none;
    }
    .rarity-comum    { --neon-card: rgba(160,160,160,0.35); }
    .rarity-rara     { --neon-card: rgba(0,230,255,0.55); }
    .rarity-epica    { --neon-card: rgba(180,60,255,0.6); }
    .rarity-lendaria { --neon-card: rgba(255,200,0,0.7); }
    .rarity-secreta  { --neon-card: rgba(180,0,0,0.7); }
    .card-colecao-inner.unlocked {
      border: 1px solid var(--neon-card);
      box-shadow: 0 0 15px var(--neon-card), inset 0 0 20px rgba(0,0,0,0.6);
    }
    .card-colecao:hover .card-colecao-inner.unlocked {
      box-shadow: 0 0 30px var(--neon-card), 0 8px 25px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
    }
    /* Lendária pulse glow */
    .rarity-lendaria .card-colecao-inner.unlocked {
      animation: legendaryPulse 3s ease-in-out infinite;
    }
    @keyframes legendaryPulse {
      0%, 100% { box-shadow: 0 0 15px rgba(255,200,0,0.5), inset 0 0 20px rgba(0,0,0,0.6); }
      50% { box-shadow: 0 0 30px rgba(255,200,0,0.8), 0 0 60px rgba(255,200,0,0.2), inset 0 0 20px rgba(0,0,0,0.4); }
    }
    /* Secreta glitch effect */
    .rarity-secreta .card-colecao-inner.unlocked {
      animation: secretaGlitch 4s ease-in-out infinite;
      border-color: rgba(180,0,0,0.6);
    }
    @keyframes secretaGlitch {
      0%, 100% { box-shadow: 0 0 20px rgba(180,0,0,0.5), inset 0 0 25px rgba(0,0,0,0.7); transform: none; }
      25% { box-shadow: 0 0 35px rgba(180,0,0,0.8), -2px 0 0 rgba(0,255,0,0.15), 2px 0 0 rgba(0,0,255,0.15), inset 0 0 25px rgba(0,0,0,0.5); }
      50% { box-shadow: 0 0 20px rgba(180,0,0,0.4), inset 0 0 25px rgba(0,0,0,0.7); }
      75% { box-shadow: 0 0 40px rgba(180,0,0,0.9), 3px 0 0 rgba(255,0,0,0.2), -3px 0 0 rgba(0,255,255,0.1), inset 0 0 25px rgba(0,0,0,0.4); transform: skewX(-0.5deg); }
    }
    .secreta-text {
      font-family: 'Courier New', monospace;
      letter-spacing: 0.2em;
      text-shadow: 0 0 8px rgba(180,0,0,0.6);
    }
    .rarity-badge {
      font-size: 8px; font-weight: 900; letter-spacing: 0.15em; padding: 2px 8px;
      border-radius: 6px; text-transform: uppercase;
    }
    /* Filter buttons */
    .filter-btn {
      transition: all 0.2s;
      border: 1px solid var(--prem-border-subtle);
      background: var(--prem-bg-card);
    }
    .filter-btn:hover { border-color: var(--prem-border-default); }
    .filter-btn.active { border-color: var(--prem-border-cyan); background: rgba(34,211,238,0.06); color: var(--prem-accent-cyan); }
    .filter-btn.active-comum   { border-color: #6b7280; color: #9ca3af; background: rgba(107,114,128,0.1); }
    .filter-btn.active-rara    { border-color: #06b6d4; color: #22d3ee; background: rgba(6,182,212,0.1); }
    .filter-btn.active-epica   { border-color: #a855f7; color: #c084fc; background: rgba(168,85,247,0.1); }
    .filter-btn.active-lendaria { border-color: #eab308; color: #facc15; background: rgba(234,179,8,0.1); }
    .filter-btn.active-secreta { border-color: #991b1b; color: #dc2626; background: rgba(153,27,27,0.15); }
    .xp-level-bar {
      background: linear-gradient(90deg, var(--prem-accent-cyan) 0%, var(--prem-accent-blue) 50%, var(--prem-accent-green) 100%);
      box-shadow: 0 0 8px rgba(34,211,238,0.3);
    }
    .level-badge {
      background: linear-gradient(135deg, var(--prem-bg-card) 0%, var(--prem-bg-deep) 100%);
      border: 2px solid var(--prem-accent-cyan);
      box-shadow: 0 0 15px rgba(34,211,238,0.15), inset 0 0 10px rgba(0,0,0,0.8);
    }
    .avatar-option { transition: all 0.2s; cursor: pointer; }
    .avatar-option:hover { transform: scale(1.2); }
    .avatar-option.selected { box-shadow: 0 0 12px rgba(34,211,238,0.3); border-color: var(--prem-accent-cyan) !important; }

    /* ===== ATLAS — BOSS FIGHT ===== */
    .boss-banner {
      background: linear-gradient(135deg, #120404 0%, var(--prem-bg-card) 50%, #120404 100%);
      border: 1px solid rgba(248,113,113,0.2);
      animation: bossPulse 3s ease-in-out infinite;
    }
    @keyframes bossPulse {
      0%, 100% { box-shadow: 0 0 12px rgba(248,113,113,0.1), inset 0 0 16px rgba(0,0,0,0.6); border-color: rgba(248,113,113,0.15); }
      50% { box-shadow: 0 0 24px rgba(248,113,113,0.2), 0 0 48px rgba(248,113,113,0.05), inset 0 0 16px rgba(0,0,0,0.4); border-color: rgba(248,113,113,0.3); }
    }
    .campaign-bar-track {
      background: var(--prem-bg-deep);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }
    .campaign-bar-fill {
      background: linear-gradient(90deg, var(--prem-accent-cyan) 0%, var(--prem-accent-blue) 60%, var(--prem-accent-green) 100%);
      box-shadow: 0 0 8px rgba(34,211,238,0.3);
      transition: width 0.7s ease-out;
    }
    .boss-bar-fill {
      background: linear-gradient(90deg, #FF3C00 0%, #FF6B00 50%, #FFAA00 100%);
      box-shadow: 0 0 12px rgba(255,60,0,0.6);
      transition: width 0.7s ease-out;
    }
    @keyframes victoryBurst {
      0% { transform: scale(0); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .victory-burst {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 300px; height: 300px; border-radius: 50%; pointer-events: none; z-index: 200;
      background: radial-gradient(circle, rgba(34,211,238,0.3) 0%, rgba(34,211,238,0) 70%);
      animation: victoryBurst 1.2s ease-out forwards;
    }
    .forja-input {
      background: #0a0a0a; border: 1px solid #222; color: #fff;
      transition: border-color 0.2s;
    }
    .forja-input:focus { border-color: #2563EB; outline: none; }

    /* ===== PWA INSTALL BANNER ===== */
    .install-banner {
      position: fixed; bottom: 72px; left: 16px; right: 16px; z-index: 55;
      background: var(--prem-bg-card); border: 1px solid var(--prem-border-cyan); border-radius: 16px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      box-shadow: var(--prem-shadow-deep), var(--prem-glow-cyan);
      animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @supports (padding-bottom: env(safe-area-inset-bottom)) { nav { padding-bottom: env(safe-area-inset-bottom); } }

    /* ===== THE FUEL MODULE ===== */
    @keyframes fuelScanPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0,255,100,0.2), inset 0 0 30px rgba(0,255,100,0.05); border-color: rgba(0,255,100,0.3); }
      50% { box-shadow: 0 0 40px rgba(0,255,100,0.4), 0 0 80px rgba(0,255,100,0.1), inset 0 0 30px rgba(0,255,100,0.08); border-color: rgba(0,255,100,0.6); }
    }
    .fuel-scan-btn {
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #0a2a0a, #050f05 70%, #000);
      border: 2px solid rgba(0,255,100,0.3);
      animation: fuelScanPulse 3s ease-in-out infinite;
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
    }
    .fuel-scan-btn:active { transform: scale(0.94); box-shadow: 0 0 50px rgba(0,255,100,0.5) !important; }
    .fuel-analysis-panel {
      background: linear-gradient(135deg, #0a1a0a 0%, #0a0a0a 100%);
      border: 1px solid rgba(0,255,100,0.15);
      border-radius: 18px;
    }
    .fuel-analysis-panel .ai-prose strong { color: #86efac; }
    .fuel-analysis-panel .ai-prose th { background: rgba(0,255,100,0.12); color: #86efac; border-color: rgba(0,255,100,0.15); }
    .fuel-analysis-panel .ai-prose td { border-color: rgba(0,255,100,0.08); }
    .fuel-analysis-panel .ai-prose code { background: rgba(0,255,100,0.1); color: #86efac; }
    .fuel-analysis-panel .ai-prose li::marker { color: #00FF64; }
    .fuel-analysis-panel .ai-prose blockquote { border-left-color: #00FF64; color: #86efac; }
    .fuel-goal-btn { transition: all 0.25s cubic-bezier(.4,0,.2,1); }
    .fuel-goal-btn.active-goal { border-color: rgba(0,255,100,0.5) !important; box-shadow: 0 0 12px rgba(0,255,100,0.15); }
    .fuel-log-card {
      background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 14px;
      transition: all 0.3s ease;
    }
    .fuel-log-card:hover { border-color: rgba(0,255,100,0.2); }
    @keyframes fuelScanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    .fuel-scanning::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: linear-gradient(transparent 40%, rgba(0,255,100,0.15) 50%, transparent 60%);
      animation: fuelScanline 1.5s ease-in-out infinite;
    }

    /* ===== UPGRADE DE ELITE: MICROINTERAÇÕES ===== */

    /* Staggered slide-up entrance for tab cards */
    @keyframes eliteSlideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .stagger-enter > * {
      opacity: 0;
      animation: eliteSlideUp 0.4s cubic-bezier(.4,0,.2,1) forwards;
    }
    .stagger-enter > *:nth-child(1)  { animation-delay: 0.00s; }
    .stagger-enter > *:nth-child(2)  { animation-delay: 0.06s; }
    .stagger-enter > *:nth-child(3)  { animation-delay: 0.12s; }
    .stagger-enter > *:nth-child(4)  { animation-delay: 0.18s; }
    .stagger-enter > *:nth-child(5)  { animation-delay: 0.24s; }
    .stagger-enter > *:nth-child(6)  { animation-delay: 0.30s; }
    .stagger-enter > *:nth-child(7)  { animation-delay: 0.36s; }
    .stagger-enter > *:nth-child(8)  { animation-delay: 0.42s; }
    .stagger-enter > *:nth-child(9)  { animation-delay: 0.48s; }
    .stagger-enter > *:nth-child(10) { animation-delay: 0.54s; }
    .stagger-enter > *:nth-child(n+11) { animation-delay: 0.60s; }

    /* Mission cards stagger (faster, tighter) */
    .mission-stagger > button {
      opacity: 0;
      animation: eliteSlideUp 0.35s cubic-bezier(.4,0,.2,1) forwards;
    }
    .mission-stagger > button:nth-child(1)  { animation-delay: 0.03s; }
    .mission-stagger > button:nth-child(2)  { animation-delay: 0.06s; }
    .mission-stagger > button:nth-child(3)  { animation-delay: 0.09s; }
    .mission-stagger > button:nth-child(4)  { animation-delay: 0.12s; }
    .mission-stagger > button:nth-child(5)  { animation-delay: 0.15s; }
    .mission-stagger > button:nth-child(6)  { animation-delay: 0.18s; }
    .mission-stagger > button:nth-child(7)  { animation-delay: 0.21s; }
    .mission-stagger > button:nth-child(8)  { animation-delay: 0.24s; }
    .mission-stagger > button:nth-child(9)  { animation-delay: 0.27s; }
    .mission-stagger > button:nth-child(10) { animation-delay: 0.30s; }

    /* Dopamina Barata idle warning pulse */
    @keyframes dopaminaIdlePulse {
      0%, 100% { border-color: rgba(153,27,27,0.5); box-shadow: 0 0 0 0 rgba(255,51,51,0); }
      50% { border-color: rgba(220,38,38,0.7); box-shadow: 0 0 18px rgba(255,51,51,0.15), inset 0 0 8px rgba(255,51,51,0.05); }
    }
    .btn-dopamina-idle { animation: dopaminaIdlePulse 3s ease-in-out infinite; }

    /* Neon border utilities for active/completed cards */
    .card-neon-blue {
      border: 1px solid rgba(34,211,238,0.15) !important;
      box-shadow: var(--prem-shadow-card), 0 0 12px rgba(34,211,238,0.05);
    }
    .card-neon-green {
      border: 1px solid rgba(52,211,153,0.2) !important;
      box-shadow: var(--prem-shadow-card), 0 0 12px rgba(52,211,153,0.06);
    }
    .card-neon-purple {
      border: 1px solid rgba(167,139,250,0.2) !important;
      box-shadow: var(--prem-shadow-card), 0 0 12px rgba(167,139,250,0.05);
    }

    /* Mission button microinteraction */
    .mission-btn { transition: transform 0.15s cubic-bezier(.4,0,.2,1); }
    .mission-btn:active {
      transform: scale(0.93);
      box-shadow: 6px 6px 14px rgba(0,0,0,0.7), -3px -3px 10px rgba(255,255,255,0.02), 0 0 12px rgba(37,99,235,0.1) !important;
    }

    /* ===== S25 GOD MODE ===== */

    /* Skeleton shimmer loading */
    @keyframes skeletonShimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: skeletonShimmer 1.5s ease-in-out infinite;
      border-radius: 8px;
    }
    .skeleton-text { height: 14px; margin-bottom: 8px; border-radius: 6px; }
    .skeleton-text.short { width: 60%; }
    .skeleton-text.medium { width: 80%; }
    .skeleton-circle { border-radius: 50%; }

    /* Haptic press — universal */
    .haptic { transition: transform 0.15s cubic-bezier(.4,0,.2,1); }
    .haptic:active { transform: scale(0.90); }

    /* ===== ELITE HEADER ===== */
    .elite-header {
      background: rgba(5,5,7,0.92);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-bottom: 1px solid rgba(34,211,238,0.06);
      padding: 14px 24px;
      box-shadow: 0 1px 0 rgba(34,211,238,0.03), 0 4px 24px rgba(0,0,0,0.5);
    }
    .helmet-aura {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      filter: drop-shadow(0 0 8px rgba(34,211,238,0.2)) drop-shadow(0 0 24px rgba(34,211,238,0.08));
      animation: helmetBreath 4s ease-in-out infinite;
    }
    @keyframes helmetBreath {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(34,211,238,0.2)) drop-shadow(0 0 24px rgba(34,211,238,0.08)); }
      50% { filter: drop-shadow(0 0 12px rgba(34,211,238,0.3)) drop-shadow(0 0 36px rgba(34,211,238,0.12)); }
    }

    /* ===== ELITE SIDEBAR ===== */
    .sidebar-overlay {
      position: fixed; inset: 0; z-index: 80;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px) saturate(1.2);
      -webkit-backdrop-filter: blur(12px) saturate(1.2);
      animation: fadeIn 0.3s ease-out;
    }
    .sidebar-panel {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 81;
      width: 300px; max-width: 84vw;
      background: var(--prem-bg-deep);
      border-left: 1px solid rgba(34,211,238,0.08);
      box-shadow: -8px 0 40px rgba(0,0,0,0.6), -2px 0 0 rgba(34,211,238,0.04);
      transform: translateX(100%);
      animation: slideInRight 0.35s cubic-bezier(.25,.46,.45,.94) forwards;
      overflow-y: auto;
      padding: env(safe-area-inset-top, 24px) 28px 40px;
    }
    @keyframes slideInRight { to { transform: translateX(0); } }
    .sidebar-link {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 12px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
      color: var(--prem-text-tertiary); transition: all 0.2s ease;
      border-bottom: 1px solid var(--prem-border-subtle);
      border-radius: 10px;
      text-transform: uppercase;
    }
    .sidebar-link:active {
      color: var(--prem-accent-cyan);
      background: rgba(34,211,238,0.04);
    }
    .sidebar-link-icon { width: 22px; text-align: center; font-size: 17px; flex-shrink: 0; }

    /* ===== ELITE MODAL SYSTEM ===== */
    @keyframes eliteModalIn {
      0% { opacity: 0; transform: scale(0.92) translateY(12px); filter: blur(4px); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }
    @keyframes eliteModalBgIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .elite-modal-overlay {
      position: fixed; inset: 0; z-index: 90;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: eliteModalBgIn 0.3s ease-out;
    }
    .elite-modal-content {
      background: var(--prem-bg-card);
      border: 1px solid var(--prem-border-cyan);
      border-radius: 20px;
      box-shadow: var(--prem-shadow-deep), var(--prem-glow-cyan);
      max-width: 420px; width: 100%;
      animation: eliteModalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      overflow: hidden;
    }

    /* ===== ELITE BUTTON SYSTEM ===== */
    .btn-elite-cyan {
      background: linear-gradient(135deg, rgba(34,211,238,0.15), rgba(34,211,238,0.05));
      border: 1px solid rgba(34,211,238,0.2);
      color: var(--prem-accent-cyan);
      font-weight: 700; font-size: 13px;
      letter-spacing: 0.06em;
      border-radius: 12px;
      padding: 12px 24px;
      transition: all 0.25s ease;
    }
    .btn-elite-cyan:active {
      background: rgba(34,211,238,0.2);
      box-shadow: 0 0 20px rgba(34,211,238,0.15);
      transform: scale(0.96);
    }
    .btn-elite-primary {
      background: linear-gradient(135deg, #22D3EE, #0891B2);
      color: #050507;
      font-weight: 800; font-size: 14px;
      letter-spacing: 0.04em;
      border-radius: 14px;
      padding: 14px 28px;
      border: none;
      box-shadow: 0 2px 12px rgba(34,211,238,0.25), 0 0 0 1px rgba(34,211,238,0.1);
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
    }
    .btn-elite-primary:active {
      transform: scale(0.96);
      box-shadow: 0 1px 6px rgba(34,211,238,0.3), 0 0 24px rgba(34,211,238,0.15);
    }
    .btn-elite-primary:disabled {
      background: var(--prem-bg-surface);
      color: var(--prem-text-quaternary);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ===== NEON COMPLETION PULSE ===== */
    @keyframes completionPulse {
      0% { box-shadow: 0 0 0 0 rgba(34,211,238,0.3); }
      50% { box-shadow: 0 0 20px 4px rgba(34,211,238,0.15); }
      100% { box-shadow: 0 0 0 0 rgba(34,211,238,0); }
    }
    .completion-pulse { animation: completionPulse 0.8s ease-out; }

    /* ===== TACTICAL ACCENT UTILITIES ===== */
    .border-tactical { border-color: rgba(34,211,238,0.1); }
    .text-tactical { color: var(--prem-accent-cyan); }
    .glow-tactical { box-shadow: var(--prem-glow-cyan); }
    .bg-tactical-subtle { background: rgba(34,211,238,0.04); }

    /* ===== PREMIUM DASHBOARD CLASSES ===== */
    .prem-card {
      background: var(--prem-bg-card);
      border: 1px solid var(--prem-border-subtle);
      border-radius: 16px;
      box-shadow: var(--prem-shadow-card);
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .prem-card:hover {
      border-color: var(--prem-border-default);
    }
    .prem-card-elevated {
      background: var(--prem-bg-card-elevated);
      border: 1px solid var(--prem-border-cyan);
      border-radius: 20px;
      box-shadow: var(--prem-shadow-elevated), var(--prem-glow-cyan);
    }
    .prem-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--prem-text-tertiary);
      text-transform: uppercase;
    }
    .prem-stat {
      font-family: 'Inter', system-ui, sans-serif;
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--prem-text-primary);
    }
    .prem-score-ring {
      background: conic-gradient(
        var(--ring-color) calc(var(--score) * 3.6deg),
        var(--prem-bg-surface) 0deg
      );
      border-radius: 50%;
      padding: 3px;
    }
    .prem-score-ring-inner {
      background: var(--prem-bg-card-elevated);
      border-radius: 50%;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .prem-bar-track {
      background: var(--prem-bg-surface);
      border-radius: 999px;
      overflow: hidden;
      height: 6px;
    }
    .prem-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.7s cubic-bezier(.4,0,.2,1);
    }
    .prem-chart-bar {
      border-radius: 6px 6px 3px 3px;
      transition: height 0.6s cubic-bezier(.25,.46,.45,.94);
    }
    .prem-accent-stripe {
      position: relative;
      padding-left: 16px;
    }
    .prem-accent-stripe::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 3px;
      border-radius: 2px;
      background: var(--stripe-color, var(--prem-accent-blue));
    }
    .prem-glow-green { box-shadow: var(--prem-shadow-elevated), 0 0 30px rgba(52,211,153,0.06); }
    .prem-glow-amber { box-shadow: var(--prem-shadow-elevated), 0 0 30px rgba(251,191,36,0.06); }
    .prem-glow-red { box-shadow: var(--prem-shadow-elevated), 0 0 30px rgba(248,113,113,0.06); }
    .prem-divider {
      height: 1px;
      background: var(--prem-border-subtle);
    }
    .prem-metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px;
    }
    .prem-metric-value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--prem-text-primary);
      font-variant-numeric: tabular-nums;
    }
    .prem-metric-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--prem-text-tertiary);
      margin-top: 8px;
      text-transform: uppercase;
    }
    .prem-stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .prem-stat-row-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--prem-text-secondary);
    }
    .prem-stat-row-value {
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* Premium treino classes */
    .prem-segment-control {
      background: var(--prem-bg-surface);
      border-radius: 12px;
      padding: 3px;
      display: flex;
      gap: 3px;
    }
    .prem-segment-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--prem-text-tertiary);
      text-align: center;
      transition: all 0.25s ease;
      min-height: 44px;
      cursor: pointer;
      border: none;
      background: transparent;
    }
    .prem-segment-btn-active {
      background: var(--prem-bg-card);
      color: var(--prem-text-primary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .prem-day-bar {
      background: var(--prem-bg-surface);
      border-radius: 12px;
      padding: 3px;
      display: flex;
      gap: 2px;
    }
    .prem-day-pill {
      flex: 1;
      padding: 8px 0;
      border-radius: 9px;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      transition: all 0.2s ease;
      min-height: 38px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--prem-text-tertiary);
      position: relative;
    }
    .prem-day-pill-has-plan { color: var(--prem-text-secondary); }
    .prem-day-pill-active {
      background: var(--prem-accent-cyan);
      color: #050507;
      font-weight: 800;
      box-shadow: 0 2px 8px rgba(34,211,238,0.2);
    }
    .prem-exercise-card {
      background: var(--prem-bg-card);
      border: 1px solid var(--prem-border-subtle);
      border-radius: 14px;
      padding: 16px;
      transition: all 0.25s ease;
    }
    .prem-exercise-done {
      opacity: 0.4;
    }
    .prem-exercise-done .prem-ex-name {
      text-decoration: line-through;
      color: var(--prem-text-tertiary);
    }
    .prem-ex-input {
      background: var(--prem-bg-surface);
      border: 1px solid var(--prem-border-subtle);
      border-radius: 10px;
      color: var(--prem-text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      text-align: center;
      transition: border-color 0.2s ease;
    }
    .prem-ex-input:focus {
      border-color: var(--prem-accent-cyan);
      box-shadow: 0 0 0 2px rgba(34,211,238,0.1);
      outline: none;
    }
    .prem-ex-input::placeholder { color: var(--prem-text-quaternary); }
    .prem-check {
      width: 32px; height: 32px;
      border-radius: 10px;
      border: 2px solid var(--prem-border-default);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
    }
    .prem-check-done {
      background: var(--prem-accent-green);
      border-color: var(--prem-accent-green);
    }
    .prem-badge-pr {
      display: inline-block;
      font-size: 9px; font-weight: 800;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.25);
      color: var(--prem-accent-amber);
      letter-spacing: 0.03em;
    }
    .prem-badge-stagnation {
      display: inline-block;
      font-size: 9px; font-weight: 800;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      color: var(--prem-accent-red);
      letter-spacing: 0.03em;
    }

    /* Spring entrance for modals/panels */
    @keyframes springIn {
      0% { opacity: 0; transform: scale(0.88) translateY(16px); filter: blur(3px); }
      60% { opacity: 1; transform: scale(1.015) translateY(-1px); filter: blur(0); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }
    .spring-enter { animation: springIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    /* Soberania giant counter */
    .soberania-giant {
      font-family: 'Courier New', 'Consolas', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: -2px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.8), 0 8px 24px rgba(0,0,0,0.5), 0 0 40px currentColor;
      line-height: 1;
    }
    .soberania-label {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    .soberania-unit {
      font-size: 1rem;
      font-weight: 700;
      opacity: 0.5;
    }

    /* Circular glow action button */
    .glow-circle-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(255,255,255,0.1);
      background: radial-gradient(circle at 40% 35%, #1a1a1a, #0a0a0a 70%);
      box-shadow: 0 4px 16px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: all 0.2s cubic-bezier(.4,0,.2,1);
    }
    .glow-circle-btn:active {
      transform: scale(0.88);
      box-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    .glow-circle-btn.glow-red {
      border-color: rgba(255,51,51,0.4);
      box-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 20px rgba(255,51,51,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .glow-circle-btn.glow-green {
      border-color: rgba(0,255,100,0.4);
      box-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 20px rgba(0,255,100,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .glow-circle-btn.glow-blue {
      border-color: rgba(37,99,235,0.4);
      box-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 20px rgba(37,99,235,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .glow-circle-btn.glow-purple {
      border-color: rgba(124,58,237,0.4);
      box-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 20px rgba(124,58,237,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* ===== BATTLE CALENDAR ===== */
    .battle-calendar-overlay {
      position: fixed; inset: 0; z-index: 60;
      background: #000;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 24px; overflow-y: auto;
      animation: fadeIn 0.3s ease-out;
    }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 32px);
      gap: 12px; justify-content: center;
      margin: 0 auto; padding: 0 16px;
    }
    .cal-header {
      font-size: 9px; font-weight: 800; color: rgba(0,210,180,0.3);
      text-align: center; padding: 2px 0; letter-spacing: 0.2em;
    }
    .cal-day {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      border: 1px solid rgba(0,210,180,0.06);
      background: rgba(0,210,180,0.015);
      color: #555; transition: all 0.2s;
    }
    .cal-day-won {
      background: rgba(16,185,129,0.12);
      border-color: rgba(16,185,129,0.5);
      color: #34d399;
      box-shadow: 0 0 10px rgba(16,185,129,0.1), inset 0 0 6px rgba(16,185,129,0.05);
    }
    @keyframes calTodayPulse {
      0%, 100% { border-color: rgba(0,210,180,0.3); box-shadow: 0 0 6px rgba(0,210,180,0.08); }
      50% { border-color: rgba(0,210,180,0.7); box-shadow: 0 0 20px rgba(0,210,180,0.15), inset 0 0 10px rgba(0,210,180,0.05); }
    }
    .cal-day-today {
      border-color: rgba(0,210,180,0.4); color: #5eead4;
      background: rgba(0,210,180,0.05);
      animation: calTodayPulse 2.5s ease-in-out infinite; font-weight: 900;
    }
    .cal-day-today.cal-day-won {
      animation: none;
      background: rgba(16,185,129,0.15);
      border-color: rgba(16,185,129,0.6);
      color: #34d399;
      box-shadow: 0 0 18px rgba(16,185,129,0.15), inset 0 0 8px rgba(16,185,129,0.05);
    }
    .cal-day-missed {
      background: rgba(255,51,51,0.03);
      border-color: rgba(255,51,51,0.1);
      color: #3a1515;
    }
    .cal-day-future {
      opacity: 0.15;
      border-color: rgba(255,255,255,0.02);
    }
    .cal-day-empty { border: none; background: transparent; }
    .precision-timer {
      font-family: 'Courier New', 'Consolas', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 2.5rem; font-weight: 900;
      letter-spacing: 4px; line-height: 1;
      color: #5eead4;
      text-shadow: 0 0 25px rgba(0,210,180,0.35), 0 0 50px rgba(0,210,180,0.12);
    }
    .precision-timer-label {
      font-size: 9px; font-weight: 800;
      letter-spacing: 0.3em; color: rgba(0,210,180,0.3);
    }

    /* SVG progress ring */
    .progress-ring-circle {
      transition: stroke-dashoffset 0.5s cubic-bezier(.4,0,.2,1);
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
    @keyframes ringGlow {
      0%, 100% { filter: drop-shadow(0 0 4px var(--ring-glow-color, rgba(37,99,235,0.4))); }
      50% { filter: drop-shadow(0 0 10px var(--ring-glow-color, rgba(37,99,235,0.6))); }
    }
    .ring-glow-active { animation: ringGlow 2s ease-in-out infinite; }

    /* Floating label input group */
    .float-input-group { position: relative; }
    .float-input-group input,
    .float-input-group textarea {
      padding-top: 1.25rem !important;
      padding-bottom: 0.5rem !important;
    }
    .float-input-group .float-label {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem; font-weight: 600;
      color: #555;
      pointer-events: none;
      transition: all 0.2s cubic-bezier(.4,0,.2,1);
    }
    .float-input-group input:focus ~ .float-label,
    .float-input-group input:not(:placeholder-shown) ~ .float-label,
    .float-input-group textarea:focus ~ .float-label,
    .float-input-group textarea:not(:placeholder-shown) ~ .float-label {
      top: 6px;
      transform: translateY(0);
      font-size: 0.6rem;
      color: #2563EB;
      letter-spacing: 0.05em;
    }

    /* ===== FLASH QUEST SYSTEM ===== */

    /* Emergency overlay */
    .flash-quest-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .flash-quest-overlay.entering {
      animation: flashQuestIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes flashQuestIn {
      0% { opacity: 0; }
      30% { opacity: 1; }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); opacity: 1; }
    }
    .flash-quest-overlay.exiting {
      animation: flashQuestOut 0.6s ease-out forwards;
    }
    @keyframes flashQuestOut {
      0% { opacity: 1; transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { opacity: 0; transform: scale(0.9); }
    }

    /* Pulsing red border container */
    .flash-quest-card {
      width: 100%; max-width: 400px;
      border: 2px solid rgba(255,51,51,0.6);
      border-radius: 24px;
      background: rgba(10,0,0,0.9);
      box-shadow: 0 0 40px rgba(255,51,51,0.2), inset 0 0 30px rgba(255,51,51,0.05);
      animation: flashBorderPulse 1.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    @keyframes flashBorderPulse {
      0%, 100% { border-color: rgba(255,51,51,0.4); box-shadow: 0 0 30px rgba(255,51,51,0.15), inset 0 0 20px rgba(255,51,51,0.03); }
      50% { border-color: rgba(255,51,51,0.8); box-shadow: 0 0 60px rgba(255,51,51,0.3), 0 0 100px rgba(255,51,51,0.1), inset 0 0 30px rgba(255,51,51,0.06); }
    }
    .flash-quest-card.phase-active {
      border-color: rgba(37,99,235,0.6);
      animation: flashBorderBlue 1.5s ease-in-out infinite;
    }
    @keyframes flashBorderBlue {
      0%, 100% { border-color: rgba(37,99,235,0.4); box-shadow: 0 0 30px rgba(37,99,235,0.15), inset 0 0 20px rgba(37,99,235,0.03); }
      50% { border-color: rgba(37,99,235,0.8); box-shadow: 0 0 60px rgba(37,99,235,0.3), 0 0 100px rgba(37,99,235,0.1), inset 0 0 30px rgba(37,99,235,0.06); }
    }
    .flash-quest-card.phase-complete {
      border-color: rgba(0,255,100,0.6);
      animation: flashBorderGreen 1.5s ease-in-out infinite;
    }
    @keyframes flashBorderGreen {
      0%, 100% { border-color: rgba(0,255,100,0.4); box-shadow: 0 0 30px rgba(0,255,100,0.15), inset 0 0 20px rgba(0,255,100,0.03); }
      50% { border-color: rgba(0,255,100,0.8); box-shadow: 0 0 60px rgba(0,255,100,0.3), 0 0 100px rgba(0,255,100,0.1), inset 0 0 30px rgba(0,255,100,0.06); }
    }

    /* Scanline effect on card */
    .flash-quest-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,51,51,0.6), transparent);
      animation: flashScanline 2s linear infinite;
    }
    @keyframes flashScanline {
      0% { top: 0; opacity: 1; }
      100% { top: 100%; opacity: 0.3; }
    }
    .flash-quest-card.phase-active::before { background: linear-gradient(90deg, transparent, rgba(37,99,235,0.6), transparent); }
    .flash-quest-card.phase-complete::before { background: linear-gradient(90deg, transparent, rgba(0,255,100,0.6), transparent); }

    /* Lightning icon glow */
    .flash-zap {
      filter: drop-shadow(0 0 8px rgba(255,51,51,0.8)) drop-shadow(0 0 20px rgba(255,51,51,0.4));
      animation: zapPulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes zapPulse {
      from { filter: drop-shadow(0 0 8px rgba(255,51,51,0.6)) drop-shadow(0 0 15px rgba(255,51,51,0.3)); transform: scale(1); }
      to { filter: drop-shadow(0 0 14px rgba(255,51,51,1)) drop-shadow(0 0 30px rgba(255,51,51,0.6)); transform: scale(1.08); }
    }

    /* Countdown timer ring */
    .flash-timer-ring {
      width: 100px; height: 100px;
      border-radius: 50%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .flash-timer-ring svg {
      position: absolute; inset: 0;
      transform: rotate(-90deg);
    }
    .flash-timer-ring .timer-text {
      font-family: 'Courier New', 'Consolas', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 1.5rem;
      font-weight: 900;
      z-index: 1;
    }

    /* Neon spark particles on completion */
    @keyframes sparkFloat {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
    }
    .neon-spark {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00FF64;
      box-shadow: 0 0 8px #00FF64, 0 0 16px rgba(0,255,100,0.5);
      animation: sparkFloat 0.8s cubic-bezier(.4,0,.2,1) forwards;
      pointer-events: none;
    }

    /* Glass panel utility */
    .glass-panel {
      background: rgba(10,10,13,0.8);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      border: 1px solid var(--prem-border-subtle);
      border-radius: 18px;
    }
    /* sidebar — see ELITE SIDEBAR above */

    /* ===== BOTTOM SHEET ===== */
    .bottom-sheet-overlay {
      position: fixed; inset: 0; z-index: 70;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px) saturate(1.2);
      -webkit-backdrop-filter: blur(12px) saturate(1.2);
      animation: fadeIn 0.2s ease-out;
    }
    .bottom-sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 71;
      max-height: 85vh;
      border-radius: 24px 24px 0 0;
      background: var(--prem-bg-card);
      border-top: 1px solid var(--prem-border-cyan);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.7), 0 -1px 0 rgba(34,211,238,0.04);
      transform: translateY(100%);
      animation: slideUp 0.35s cubic-bezier(.4,0,.2,1) forwards;
      overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }
    @keyframes slideUp { to { transform: translateY(0); } }
    .bottom-sheet-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: rgba(34,211,238,0.15); margin: 12px auto;
    }

    /* ===== CONCAVE NEUMORPHIC BUTTONS ===== */
    .btn-concave {
      background: #0a0a0a;
      box-shadow: inset 3px 3px 8px rgba(0,0,0,0.8), inset -2px -2px 6px rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 16px;
      transition: all 0.2s cubic-bezier(.4,0,.2,1);
    }
    .btn-concave:active {
      box-shadow: inset 4px 4px 12px rgba(0,0,0,0.9), inset -1px -1px 4px rgba(255,255,255,0.02);
    }
    .btn-concave-blue {
      border-color: rgba(34,211,238,0.12);
      box-shadow: inset 3px 3px 8px rgba(0,0,0,0.8), inset -2px -2px 6px rgba(255,255,255,0.03), 0 0 12px rgba(34,211,238,0.05);
    }
    .btn-concave-red {
      border-color: rgba(255,51,51,0.2);
      box-shadow: inset 3px 3px 8px rgba(0,0,0,0.8), inset -2px -2px 6px rgba(255,255,255,0.03), 0 0 15px rgba(255,51,51,0.08);
    }

    /* ===== CHAT TACTICAL (Terminal Style) ===== */
    .chat-tactical {
      background: #050505;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 16px;
      overflow: hidden;
    }
    .chat-tactical-header {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; gap: 6px;
    }
    .chat-terminal-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .msg-user {
      background: rgba(37,99,235,0.08);
      border: 1px solid rgba(37,99,235,0.15);
      border-radius: 16px;
    }
    .msg-ai {
      background: linear-gradient(135deg, #0a0a14 0%, #050505 100%);
      border: 1px solid rgba(37,99,235,0.1);
      border-radius: 16px;
    }

    /* ===== NEON SPARK BORDER ===== */
    @keyframes neonBorderSpark {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .neon-spark-complete { position: relative; }
    .neon-spark-complete::before {
      content: ''; position: absolute; inset: -1px;
      border-radius: inherit; padding: 1px;
      background: linear-gradient(90deg, transparent 0%, #2563eb 25%, #00ff64 50%, #2563eb 75%, transparent 100%);
      background-size: 200% 100%;
      animation: neonBorderSpark 1.5s linear infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.6;
    }

    /* ===== MISSION MODAL ===== */
    .mission-modal-overlay {
      position: fixed; inset: 0; z-index: 90;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      animation: fadeIn 0.2s ease-out;
    }
    .mission-modal {
      width: 100%; max-width: 380px;
      background: #000;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px;
      animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
    }

          email,

          options: { emailRedirectTo: window.location.origin }

          setAuthLoading(false);
          return;
        }
        if (data.session) {

    //     app_state JSONB NOT NULL DEFAULT '{}',
    //     updated_at TIMESTAMPTZ DEFAULT now()

    function setSyncStatus(status) {
      const el = document.getElementById('syncIndicator');
      el.className = 'sync-indicator ' + status;
    }

    async function cloudSave() {
      if (!currentUser || isSyncing) return;
      isSyncing = true;
      setSyncStatus('syncing');
      try {
        const { error } = await supabase
          .from('user_data')
          .upsert({
            id: currentUser.id,
            app_state: userState,
            updated_at: new Date().toISOString()
          }, { onConflict: 'id' });
        if (error) throw error;
        setSyncStatus('synced');
      } catch (err) {
        console.error('Cloud save error:', err);
        setSyncStatus('error');
      }
      isSyncing = false;
    }

    async function cloudLoad() {
      if (!currentUser) return;
      setSyncStatus('syncing');
      try {
        const { data, error } = await supabase
          .from('user_data')
          .select('app_state')
          .eq('id', currentUser.id)
          .single();

        if (error && error.code === 'PGRST116') {
          // No row found — new user, INSERT default state
          console.log('New user — creating cloud record');
          const { error: insertError } = await supabase
            .from('user_data')
            .insert({ id: currentUser.id, app_state: userState });
          if (insertError) throw insertError;
          // Also save to localStorage
          localStorage.setItem('unstoppable_state', JSON.stringify(userState));
          setSyncStatus('synced');
          return;
        }
        if (error) throw error;

        if (data && data.app_state) {
          // Cloud data found — merge into userState
          const cloudState = data.app_state;
          userState = { ...userState, ...cloudState };
          localStorage.setItem('unstoppable_state', JSON.stringify(userState));
        }
        setSyncStatus('synced');
      } catch (err) {
        console.error('Cloud load error:', err);
        setSyncStatus('error');
        // Fall back to localStorage silently
      }
    }

      const today = getTodayKey();

        return userState.missoesDiarias.missoes;
      }
      // Shuffle and pick 10
      const shuffled = [...POOL_MISSOES].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, MISSOES_POR_DIA).map(m => ({
        ...m,
        aceita: false,
        concluida: false
      }));
      userState.missoesDiarias = { date: today, missoes: selected };
      saveData();
      return selected;
    }

    function getMissoesDoDia() {
      const today = getTodayKey();
      if (!userState.missoesDiarias || userState.missoesDiarias.date !== today) {
        return gerarMissoesDoDia();
      }
      return userState.missoesDiarias.missoes;

    function xpParaNivel(nivel) {
      if (nivel <= 0) return 0;
      return Math.floor(Math.pow(nivel, 2.5) * 50);
    }

    function calcularNivel(xpTotal) {
      let nivel = 0;
      let xpAcumulado = 0;
      while (nivel < MAX_LEVEL) {
        const xpProximo = xpParaNivel(nivel + 1);
        if (xpAcumulado + xpProximo > xpTotal) break;
        xpAcumulado += xpProximo;
        nivel++;
      }
      const xpProximoNivel = nivel < MAX_LEVEL ? xpParaNivel(nivel + 1) : 0;
      const xpNoNivelAtual = xpTotal - xpAcumulado;
      return {
        nivel,
        xpTotal,
        xpNoNivelAtual,
        xpProximoNivel,
        pctNivel: xpProximoNivel > 0 ? Math.min(100, Math.round((xpNoNivelAtual / xpProximoNivel) * 100)) : 100,
        isMax: nivel >= MAX_LEVEL
      };
    }

    function isCartaDesbloqueada(carta, nivel) {
      if (carta.tipoDesbloqueio === 'secreto') {
        // Secretas: checam o array userState.cartasSecretas
        return (userState.cartasSecretas || []).includes(carta.id);
      }
      return nivel >= carta.requisito;
    }

    function getCartasDesbloqueadas(nivel) {
      return COLECAO_CARTAS.filter(c => isCartaDesbloqueada(c, nivel));
    }

    function desbloquearCartaSecreta(cartaId) {
      if (!userState.cartasSecretas) userState.cartasSecretas = [];
      if (userState.cartasSecretas.includes(cartaId)) return;
      const carta = COLECAO_CARTAS.find(c => c.id === cartaId);
      if (!carta || carta.tipoDesbloqueio !== 'secreto') return;
      userState.cartasSecretas.push(cartaId);
      showToast(`💀 ANOMALIA DETECTADA: ${carta.nome}`, 5000);
      haptic(100);
      saveData();
    }

    function verificarDesbloqueioCartas(nivelAnterior, nivelAtual) {
      const novas = COLECAO_CARTAS.filter(c =>
        c.tipoDesbloqueio === 'nivel' &&
        c.requisito > nivelAnterior &&
        c.requisito <= nivelAtual
      );
      novas.forEach(c => {
        const rc = RARITY_CONFIG[c.raridade];
        showToast(`🃏 Carta desbloqueada: ${c.nome} (${rc?.label || c.raridade})`, 4000);
        haptic(60);
      });
      return novas;
    }

    function adicionarXP(amount) {
      if (!userState.xpTotal) userState.xpTotal = 0;
      const antes = calcularNivel(userState.xpTotal);
      userState.xpTotal += amount;
      const depois = calcularNivel(userState.xpTotal);
      if (depois.nivel > antes.nivel) {
        showToast(`⬆️ NÍVEL ${depois.nivel}! +${amount} XP`, 3000);
        verificarDesbloqueioCartas(antes.nivel, depois.nivel);
      }
      saveData();
    }

    function getRarityColor(raridade) {
      const cfg = RARITY_CONFIG[raridade];
      if (!cfg) return { text: 'text-gray-500', bg: 'bg-gray-900', border: 'border-gray-700' };
      return { text: cfg.text, bg: cfg.bg, border: cfg.border };
    }

      const todayPrefix = 'verdict_' + today;

      pruneOldHabits();

      const focusKeys = Object.keys(userState.focusSessions).sort();

        focusKeys.slice(0, focusKeys.length - 60).forEach(k => delete userState.focusSessions[k]);

      const workoutLogKeys = Object.keys(userState.workoutLog).sort();
      if (workoutLogKeys.length > 60) {
        workoutLogKeys.slice(0, workoutLogKeys.length - 60).forEach(k => delete userState.workoutLog[k]);

      saveData();

    function computeStreakOnNewDay(today) {
      const yesterday = getDateOffset(today, -1);
      const yHabits = userState.dailyHabits[yesterday];

      if (userState.lastDate === today) return; // Already processed

      if (userState.lastDate === yesterday) {
        // Yesterday exists — check if ALL habits were completed
        if (yHabits && allHabitsComplete(yHabits)) {
          userState.streakCount = (userState.streakCount || 0) + 1;
        } else {
          // Yesterday was not 100% → streak breaks
          userState.streakCount = 0;
        }
      } else if (userState.lastDate) {
        // Skipped one or more days → streak resets to 0
        userState.streakCount = 0;
      }
    }

    function allHabitsComplete(habitsObj) {
      const ids = Object.keys(habitsObj);
      if (ids.length === 0) return false;
      return ids.every(id => habitsObj[id] === true);
    }

    function getDateOffset(dateStr, offset) {
      const d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    }

    function pruneOldHabits() {
      const keys = Object.keys(userState.dailyHabits).sort();
      if (keys.length > 60) {
        keys.slice(0, keys.length - 60).forEach(k => delete userState.dailyHabits[k]);
      }
    }

    function getVersiculoDoDia() {
      const today = getTodayKey();
      const dayOfYear = Math.floor((new Date(today + 'T12:00:00') - new Date(today.slice(0, 4) + '-01-01T00:00:00')) / 86400000);
      return VERSICULOS[dayOfYear % VERSICULOS.length];
    }

    function calcTimeSince(isoString) {
      if (!isoString) return null;
      const start = new Date(isoString).getTime();
      const now = Date.now();
      const diff = now - start;
      if (diff < 0) return { days: 0, hours: 0, mins: 0, total: 0 };
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      return { days, hours, mins, total: diff };
    }

    function getVicioLevel(days) {
      if (days < 4) return { label: 'INICIANTE', cls: 'text-gray-500', border: 'border-[#333]' };
      if (days < 7) return { label: 'RESISTÊNCIA', cls: 'text-royal', border: 'border-royal/30' };
      return { label: 'SOBERANO', cls: 'neon-gold', border: 'neon-gold-border' };
    }

          if (!el) return;

    // BATTLE CALENDAR — Calendário de Batalha

    let battleTimerInterval = null;

    function calcularStreakSobriedade(diasVencidos) {
      if (!diasVencidos || diasVencidos.length === 0) return 0;
      const sorted = [...diasVencidos].sort().reverse();
      const today = getTodayKey();
      const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
      // Streak must include today or yesterday to be "active"
      if (sorted[0] !== today && sorted[0] !== yesterday) return 0;
      let streak = 1;
      for (let i = 1; i < sorted.length; i++) {
        const prev = new Date(sorted[i - 1]);
        const curr = new Date(sorted[i]);
        const diffDays = Math.round((prev - curr) / 86400000);
        if (diffDays === 1) streak++;
        else break;
      }
      return streak;
    }

    function renderCalendarGrid(vicioId) {
      const data = userState.vicios[vicioId];
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const today = getTodayKey();
      const startDate = data.startedAt ? data.startedAt.split('T')[0] : null;
      const diasSet = new Set(data.diasVencidos || []);
      const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
      const lastDate = new Date(year, month + 1, 0).getDate();
      const monthNames = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

      let html = `<p class="text-xs font-extrabold text-gray-500 tracking-[0.2em] text-center mb-3">${monthNames[month]} ${year}</p>`;
      html += '<div class="cal-grid">';
      // Headers
      ['D','S','T','Q','Q','S','S'].forEach(d => { html += `<div class="cal-header">${d}</div>`; });
      // Empty cells before day 1
      for (let i = 0; i < firstDay; i++) html += '<div class="cal-day cal-day-empty"></div>';
      // Days
      for (let day = 1; day <= lastDate; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isToday = dateStr === today;
        const isWon = diasSet.has(dateStr);
        const isFuture = dateStr > today;
        const isBeforeStart = startDate && dateStr < startDate;
        const isPast = dateStr < today;
        let cls = 'cal-day';
        let content = day;
        if (isBeforeStart) {
          cls += ' cal-day-empty';
          content = '';
        } else if (isFuture) {
          cls += ' cal-day-future';
        } else if (isToday) {
          cls += ' cal-day-today';
          if (isWon) cls += ' cal-day-won';
        } else if (isPast && isWon) {
          cls += ' cal-day-won';
          content = '✓';
        } else if (isPast && !isWon) {
          cls += ' cal-day-missed';
        }
        html += `<div class="${cls}">${content}</div>`;
      }
      html += '</div>';
      return html;
    }

    function canCheckinToday(vicioId) {
      const data = userState.vicios[vicioId];
      if (!data || !data.startedAt) return false;
      const today = getTodayKey();
      const startDate = data.startedAt.split('T')[0];
      if (today === startDate) return false; // Survive the day first
      if (data.diasVencidos.includes(today)) return false; // Already checked
      return true;
    }

        const s = Math.floor((diff % 60000) / 1000);
        el.textContent = `${String(d).padStart(2,'0')} : ${String(h).padStart(2,'0')} : ${String(m).padStart(2,'0')} : ${String(s).padStart(2,'0')}`;

      tick();

    // =============================================
    // SCORE ENGINE
    // =============================================
    function calcDayScore(dateKey) {
      const habits = userState.dailyHabits[dateKey];
      if (!habits) return 0;

      // 70% — mission/habit completion (works with both old 4-habit and new 10-mission system)
      const ids = Object.keys(habits);
      const total = ids.length || 1;
      const done = ids.filter(id => habits[id] === true).length;
      const habitScore = (done / total) * 70;

      // 30% — budget health (daily portion)
      let budgetScore = 30; // default full if no budget set
      const budget = userState.budget || 0;
      if (budget > 0) {
        const mk = dateKey.slice(0, 7);
        const monthExps = userState.monthlyExpenses[mk] || [];
        const daysInMonth = new Date(parseInt(mk.split('-')[0]), parseInt(mk.split('-')[1]), 0).getDate();
        const dailyBudget = budget / daysInMonth;
        const dayExpenses = monthExps.filter(e => e.date === dateKey).reduce((s, e) => s + e.amount, 0);
        const ratio = Math.max(0, Math.min(1, 1 - (dayExpenses / dailyBudget)));
        budgetScore = ratio * 30;
      }

      return Math.round(habitScore + budgetScore);
    }

    function getWeekData() {
      const today = getTodayKey();
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const habits = userState.dailyHabits[dk];
        const score = calcDayScore(dk);
        const ids = habits ? Object.keys(habits) : [];
        const done = habits ? ids.filter(id => habits[id] === true).length : 0;
        const allDone = ids.length > 0 && done === ids.length;
        const dayLabel = new Date(dk + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'short' }).slice(0, 3).toUpperCase();
        days.push({ date: dk, score, done, allDone, dayLabel, isToday: dk === today });
      }
      return days;
    }

    function getStatusBattle(score) {
      if (score <= 30) return { text: 'REAGIR OU MORRER', cls: 'neon-red', bg: 'border-red-900/40', bgInner: 'rgba(255,50,50,0.05)', icon: '💀' };
      if (score <= 70) return { text: 'MANTENHA A LINHA', cls: 'neon-yellow', bg: 'border-yellow-700/40', bgInner: 'rgba(250,204,21,0.05)', icon: '⚔️' };
      return { text: 'IMPARÁVEL', cls: 'neon-text', bg: 'border-[#00FF64]/30', bgInner: 'rgba(0,255,100,0.05)', icon: '👑' };
    }

    function getScoreRingColor(score) {
      if (score <= 30) return '#FF3333';
      if (score <= 70) return '#FACC15';
      return '#00FF64';
    }

    function calcVitalidade() {
      const today = getTodayKey();
      const todayMeals = (userState.mealLogs || []).filter(l => l.date === today).length;
      const mealScore = Math.min(todayMeals / 3, 1) * 50;
      const wLog = userState.workoutLog[today];
      let workoutScore = 0;
      if (wLog && wLog.exercises) {
        const exIds = Object.keys(wLog.exercises);
        const doneCount = exIds.filter(id => wLog.exercises[id].done).length;
        workoutScore = exIds.length > 0 ? (doneCount / exIds.length) * 50 : 0;
      }
      return Math.round(mealScore + workoutScore);
    }

    function calcResiliencia() {
      let totalStreak = 0, activeCount = 0;
      DEFAULT_VICIOS.forEach(v => {
        const data = userState.vicios[v.id];
        if (data && data.startedAt) {
          activeCount++;
          totalStreak += calcularStreakSobriedade(data.diasVencidos);
        }
      });
      if (activeCount === 0) return 0;
      return Math.min(Math.round((totalStreak / activeCount / 30) * 100), 100);
    }

    function getMissionSuccessRateThisWeek() {
      let total = 0, done = 0;
      for (let i = 0; i < 7; i++) {
        const dk = getDateOffset(getTodayKey(), -i);
        const habits = userState.dailyHabits[dk];
        if (habits) {
          const ids = Object.keys(habits);
          total += ids.length;
          done += ids.filter(id => habits[id] === true).length;
        }
      }
      return total > 0 ? Math.round((done / total) * 100) : 0;
    }

        if (data && data.startedAt) {

          if (time) total += time.days;

      });
      return total;
    }

    function toggleHabit(id) {
      const today = getTodayKey();
      if (!userState.dailyHabits[today]) return;
      userState.dailyHabits[today][id] = !userState.dailyHabits[today][id];
      haptic(userState.dailyHabits[today][id] ? 30 : 15);
      saveData();
      renderActiveTab();
    }

    function toggleMissao(missionId) {
      const missoes = getMissoesDoDia();
      const m = missoes.find(x => x.id === missionId);
      if (!m) return;
      // Guard: must accept before completing
      if (!m.aceita && !m.concluida) { openMissionModal(missionId); return; }
      const wasCompleted = m.concluida;
      m.concluida = !m.concluida;
      haptic(m.concluida ? 40 : 15);

      // XP system: add on complete, remove on uncheck
      if (m.concluida && !wasCompleted) {
        adicionarXP(m.xp);
      } else if (!m.concluida && wasCompleted) {
        if (!userState.xpTotal) userState.xpTotal = 0;
        userState.xpTotal = Math.max(0, userState.xpTotal - m.xp);
      }

      // Sync missions to dailyHabits for score compatibility
      const today = getTodayKey();
      if (!userState.dailyHabits[today]) userState.dailyHabits[today] = {};
      missoes.forEach(mi => {
        userState.dailyHabits[today][mi.id] = mi.concluida;
      });

      saveData();
      renderActiveTab();

      // Neon spark animation on mission complete
      if (m.concluida && !wasCompleted) {
        setTimeout(() => {
          const btns = document.querySelectorAll('.mission-btn');
          const idx = missoes.indexOf(m);
          if (btns[idx]) {
            btns[idx].classList.add('neon-spark-complete');
            setTimeout(() => btns[idx].classList.remove('neon-spark-complete'), 2000);
          }
        }, 50);
      }
    }

                ${impacts.map(tag => `<span class="mission-impact-tag">${tag}</span>`).join('')}

    function aceitarMissao(missionId) {
      const missoes = getMissoesDoDia();
      const m = missoes.find(x => x.id === missionId);
      if (!m || m.aceita) return;
      m.aceita = true;
      haptic(40);
      saveData();
      closeMissionModal();
      showToast('MISSAO ACEITA: ' + m.titulo, 3000);
      renderActiveTab();
    }

    function closeMissionModal() {
      const el = document.getElementById('missionModal');
      if (el) el.remove();
    }
