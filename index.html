    function updateBudget(val) {
      userState.budget = parseFloat(val) || 0;
      saveData();
      checkScarcity();
      renderActiveTab();
    }

    function addWarExpense(category) {
      const descEl = document.getElementById('expDesc');
      const amountEl = document.getElementById('expAmount');
      const name = descEl?.value?.trim() || (category === 'essencial' ? 'Gasto Essencial' : 'Dopamina Barata');
      const amount = parseFloat(amountEl?.value);
      if (!amount || amount <= 0) {
        // Highlight input briefly
        if (amountEl) { amountEl.style.borderColor = '#FF3333'; setTimeout(() => amountEl.style.borderColor = '#222', 1000); }
        return;
      }
      const mk = getMonthKey();
      if (!userState.monthlyExpenses[mk]) userState.monthlyExpenses[mk] = [];
      userState.monthlyExpenses[mk].push({ name, amount, category, date: getTodayKey() });
      haptic(category === 'dopamina' ? [50, 30, 50] : 20);
      saveData();
      checkScarcity();
      renderActiveTab();
      showToast(category === 'dopamina' ? 'Dopamina registrada. Fique esperto.' : 'Gasto registrado.');
    }

    function removeWarExpense(index) {
      const mk = getMonthKey();
      const arr = userState.monthlyExpenses[mk];
      if (arr && arr[index] !== undefined) {
        arr.splice(index, 1);
        saveData();
        checkScarcity();
        renderActiveTab();
      }
    }

    function clearMonthExpenses() {
      if (confirm('Limpar todos os gastos deste mês? Isso é irreversível.')) {
        userState.monthlyExpenses[getMonthKey()] = [];
        saveData();
        renderActiveTab();
      }
    }

    async function askWarChestMentor() {
      const input = document.getElementById('warChestMentorInput');
      const question = input ? input.value.trim() : '';
      if (!question) return;
      warChestChat.push({ role: 'user', text: question });
      input.value = '';
      renderActiveTab();
      const scrollWC = () => setTimeout(() => {
        const el = document.getElementById('warChestMentorMessages');
        if (el) el.scrollTop = el.scrollHeight;
      }, 100);
      scrollWC();
      try {
        // Build financial context snapshot
        const expenses = getMonthExpenses();
        const totalGasto = expenses.reduce((s, e) => s + e.amount, 0);
        const totalDopamina = expenses.filter(e => e.category === 'dopamina').reduce((s, e) => s + e.amount, 0);
        const budget = userState.budget || 0;
        const saldo = budget - totalGasto;
        const ctx = budget > 0
          ? `[Contexto financeiro do mês: Budget R$${budget}, Gasto total R$${totalGasto}, Saldo R$${saldo}, Dopamina R$${totalDopamina} (${budget > 0 ? ((totalDopamina/budget)*100).toFixed(1) : 0}% do budget)]\n\n`
          : '';
        // Multi-turn history: send PREVIOUS messages only (exclude current question)
        // The backend will add ctx+question as the final user message via prompt
        const previousMessages = warChestChat.slice(0, -1);
        const historico = previousMessages.length > 0
          ? previousMessages.map(m => ({
              role: m.role === 'user' ? 'user' : 'model',
              text: m.text
            }))
          : null;
        const resp = await callGemini(ctx + question, null, null, historico, 'war_chest');
        warChestChat.push({ role: 'ai', text: resp });
      } catch (e) {
        console.error('ERRO GESTOR IA:', e);
        warChestChat.push({ role: 'ai', text: 'Conexão falhou. Proteja seu capital.' });
      }
      renderActiveTab();
      scrollWC();
    }

              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>

    // =============================================
    // TREINO (ATLAS) MODULE
    // =============================================
    function getTodayWorkoutDay() {
      return WORKOUT_DAYS[new Date().getDay()];
    }

    function getWorkoutLog(dateKey) {
      if (!userState.workoutLog[dateKey]) {
        userState.workoutLog[dateKey] = { exercises: {}, finalized: false };
      }
      return userState.workoutLog[dateKey];
    }

    function toggleExerciseDone(exerciseId) {
      const today = getTodayKey();
      const log = getWorkoutLog(today);
      if (!log.exercises[exerciseId]) {
        log.exercises[exerciseId] = { done: false, load: 0 };
      }
      log.exercises[exerciseId].done = !log.exercises[exerciseId].done;
      haptic(log.exercises[exerciseId].done ? 40 : 15);
      if (log.exercises[exerciseId].done) startRestTimer(90);
      saveData();
      renderActiveTab();
    }

    function updateExerciseLoad(exerciseId, val) {
      const today = getTodayKey();
      const log = getWorkoutLog(today);
      const load = parseFloat(val) || 0;
      if (!log.exercises[exerciseId]) {
        log.exercises[exerciseId] = { done: false, load: 0 };
      }
      log.exercises[exerciseId].load = load;

      // Update load history and PR
      if (!userState.workoutLoads[exerciseId]) {
        userState.workoutLoads[exerciseId] = { lastLoad: 0, pr: 0 };
      }
      if (load > 0) {
        userState.workoutLoads[exerciseId].lastLoad = load;
        if (load > userState.workoutLoads[exerciseId].pr) {
          userState.workoutLoads[exerciseId].pr = load;
        }
      }
      saveData();
    }

    function finalizeWorkout() {
      const today = getTodayKey();
      const log = getWorkoutLog(today);
      log.finalized = true;

      // Auto-mark 'Treino de Força' habit as done
      if (userState.dailyHabits[today]) {
        userState.dailyHabits[today].workout = true;
      }

      stopRestTimer();
      haptic([100, 50, 100, 50, 100]);
      saveData();
      renderActiveTab();
      showToast('TREINO FINALIZADO. Hábito marcado.');
    }

    function selectWorkoutDay(day) {
      selectedWorkoutDay = day;
      renderActiveTab();
    }

      const prObj = document.getElementById('campPRObj')?.value;

          </button>
        `;

        return `

                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>

          ${forjaShowingLibrary ? `

    function renderTreino() {

      const pctDone = totalExercises > 0 ? Math.round((doneCount / totalExercises) * 100) : 0;

          ${atlasMode === 'forja' ? renderForja() : `
            <!-- DAY SELECTOR -->
            <div class="prem-day-bar">
              ${WORKOUT_DAYS.map((d, i) => {
                const isActive = d === viewDay;
                const hasPlan = !!DEFAULT_WORKOUT_PLAN[d];
                return `
                  <button onclick="selectWorkoutDay('${d}')"
                    class="prem-day-pill ${isActive ? 'prem-day-pill-active' : hasPlan ? 'prem-day-pill-has-plan' : ''} haptic">

                  </button>
                `;
              }).join('')}
            </div>

            ${isRest ? `
              <div class="prem-card p-8 text-center">
                <p class="text-3xl mb-3">😴</p>
                <p class="text-lg font-bold" style="color:var(--prem-text-secondary);">Dia de descanso</p>
                <p class="text-sm font-medium mt-2" style="color:var(--prem-text-tertiary);">Recuperacao e parte do processo.</p>
              </div>
            ` : `
              <!-- WORKOUT HEADER -->
              <div class="prem-card p-5">
                <div class="flex items-center justify-between mb-1">
                  <div>
                    <p class="prem-label">${isToday ? 'Treino de hoje' : 'Visualizando'}</p>
                    <p class="text-lg font-bold mt-1" style="color:var(--prem-text-primary);">${plan.label}</p>
                  </div>
                  <div class="text-right">
                    <span class="prem-stat text-3xl" style="color:${allDone ? 'var(--prem-accent-green)' : 'var(--prem-text-tertiary)'};">${doneCount}<span class="text-base font-semibold" style="color:var(--prem-text-tertiary);">/${totalExercises}</span></span>
                  </div>
                </div>
                ${isToday && totalExercises > 0 ? `
                  <div class="prem-bar-track mt-4">
                    <div class="prem-bar-fill" style="width:${pctDone}%; background:${allDone ? 'var(--prem-accent-green)' : 'var(--prem-accent-blue)'};"></div>
                  </div>
                ` : ''}
              </div>

              <!-- REST TIMER -->
              ${isToday && restTimerSeconds > 0 ? `
                <div class="prem-card p-4 flex items-center gap-4" id="restTimerContainer" style="border-color:rgba(59,130,246,0.15);">
                  <div class="flex-1">
                    <span id="restTimerLabel" class="text-sm font-bold" style="color:var(--prem-accent-blue);">Descanso: ${restTimerSeconds}s</span>
                    <div class="prem-bar-track mt-2">
                      <div id="restTimerBar" class="prem-bar-fill" style="width:100%; background:var(--prem-accent-blue); transition:width 1s linear;"></div>
                    </div>
                  </div>
                  <button onclick="stopRestTimer(); document.getElementById('restTimerContainer').style.display='none'" class="text-xs font-bold min-h-[44px] px-3 haptic" style="color:var(--prem-text-tertiary);">Pular</button>
                </div>
              ` : ''}

              <!-- EXERCISES -->
              <div class="space-y-3">
                ${plan.exercises.map(ex => {
                  const exLog = log.exercises[ex.id] || { done: false, load: 0 };
                  const loadHistory = userState.workoutLoads[ex.id] || { lastLoad: 0, pr: 0 };
                  const currentLoad = isToday ? (exLog.load || loadHistory.lastLoad) : loadHistory.lastLoad;
                  const isPR = isToday && exLog.load > 0 && exLog.load >= loadHistory.pr && loadHistory.pr > 0;
                  const isDone = isToday && exLog.done;
                  const history = getExerciseHistory(ex.id);
                  return `
                    <div class="prem-exercise-card ${isDone ? 'prem-exercise-done' : ''}">
                      <div class="flex items-center justify-between">
                        <div class="flex-1 min-w-0">
                          <div class="flex items-center gap-2">
                            <p class="prem-ex-name text-[15px] font-bold truncate" style="color:${isDone ? 'var(--prem-text-tertiary)' : 'var(--prem-text-primary)'};">${ex.name}</p>
                            ${history.length > 0 ? `<button onclick="event.stopPropagation(); toggleExerciseHistory('${ex.id}')" class="text-xs px-1 min-w-[28px] min-h-[28px] haptic" style="color:var(--prem-text-tertiary);">\u25BC</button>` : ''}
                          </div>
                          <div class="flex items-center gap-2 mt-1">
                            <span class="text-xs font-semibold workout-load" style="color:var(--prem-text-tertiary);">${ex.sets}x${ex.reps}</span>
                            ${isPR ? '<span class="prem-badge-pr">PR</span>' : ''}
                            ${stagnationAlerts[ex.id] ? '<span class="prem-badge-stagnation">Aumente a carga</span>' : ''}
                            ${!isToday && loadHistory.pr > 0 ? `<span class="text-xs font-semibold" style="color:var(--prem-text-quaternary);">PR: ${loadHistory.pr}kg</span>` : ''}
                          </div>
                          ${history.length > 0 ? `
                            <div id="history-${ex.id}" class="hidden mt-2 space-y-1">
                              <p class="prem-label" style="font-size:9px;">Ultimas cargas</p>
                              ${history.map(h => `<p class="text-xs font-medium" style="color:var(--prem-text-tertiary);">${h.date.slice(5)}: <span class="workout-load" style="color:var(--prem-text-secondary);">${h.load}kg</span></p>`).join('')}
                            </div>
                          ` : ''}
                        </div>
                        <div class="flex items-center gap-3 flex-shrink-0 ml-3">
                          ${isToday ? `
                            <input type="number" value="${currentLoad || ''}" placeholder="—"
                              class="prem-ex-input w-16 px-2 py-2 min-h-[40px]"
                              onchange="updateExerciseLoad('${ex.id}', this.value)">
                          ` : `
                            <span class="workout-load text-sm font-bold" style="color:${loadHistory.lastLoad > 0 ? 'var(--prem-text-secondary)' : 'var(--prem-text-quaternary)'};">${loadHistory.lastLoad > 0 ? loadHistory.lastLoad + 'kg' : '—'}</span>
                          `}
                          ${isToday ? `
                            <button onclick="toggleExerciseDone('${ex.id}')"
                              class="prem-check ${isDone ? 'prem-check-done' : ''} min-w-[44px] min-h-[44px] haptic active:scale-90">
                              ${isDone ? '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="black" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}
                            </button>
                          ` : ''}
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>

              ${isToday && !isFinalized ? `
                <button onclick="finalizeWorkout()"
                  class="w-full py-4 rounded-2xl font-bold text-base min-h-[52px] active:scale-[0.96] haptic transition-all ${allDone
                    ? 'text-white' : 'text-gray-600'}"
                  style="${allDone
                    ? 'background:var(--prem-accent-blue); box-shadow:0 2px 12px rgba(59,130,246,0.25);'
                    : 'background:var(--prem-bg-surface); border:1px solid var(--prem-border-subtle);'}">
                  ${allDone ? 'Finalizar treino' : `Finalizar treino (${doneCount}/${totalExercises})`}
                </button>
              ` : ''}

              ${isFinalized ? `
                <div class="prem-card p-6 text-center prem-glow-green" style="border-color:rgba(52,211,153,0.15);">
                  <p class="text-3xl mb-2">✓</p>
                  <p class="text-lg font-bold" style="color:var(--prem-accent-green);">Treino concluido</p>
                  <p class="text-sm font-medium mt-1" style="color:var(--prem-text-tertiary);">Habito marcado automaticamente.</p>
                </div>
              ` : ''}
            `}
          `}
        </div>
        ${renderCampaignModal()}
      `;
    }

    // =============================================
    // DEEP WORK — BIBLIOTECA DE ALEXANDRIA
    // =============================================
    let focusInterval = null;
    let focusStartTime = null;
    let focusImmersive = false;
    let restTimerInterval = null;
    let restTimerSeconds = 0;
    let extremeFocusMode = false;
    let deepWorkTopic = '';
    let showFeynmanModal = false;
    let feynmanElapsed = 0;
    let deepWorkSubTab = 'timer'; // 'timer' or 'arquivo'
    let studyMentorChat = [];
    let showStudyMentor = false;
    let warChestChat = [];
    let showWarChestAdvisor = false;

    function getTodayFocus() {
      const today = getTodayKey();
      if (!userState.focusSessions[today]) {
        userState.focusSessions[today] = { totalSeconds: 0, sessions: [] };
      }
      return userState.focusSessions[today];
    }

    function formatFocusTime(totalSec) {
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function getRandomFocusPhrase() {
      return FOCUS_PHRASES[Math.floor(Math.random() * FOCUS_PHRASES.length)];
    }

    function getStudyLogs() {
      if (!userState.studyLogs) userState.studyLogs = [];
      return userState.studyLogs;
    }

    function promptStudyTopic() {
      const input = document.getElementById('studyTopicInput');
      const topic = input ? input.value.trim() : '';
      if (!topic) { showToast('Digite o foco do estudo.', 2500); return; }
      deepWorkTopic = topic;
      focusStartTime = Date.now();
      focusImmersive = true;
      studyMentorChat = [];
      showStudyMentor = false;
      renderActiveTab();
      showImmersiveOverlay();
      startFocusTicker();
    }

    function startFocusSession() {
      // If no topic set, just start without one (backward compat)
      if (!deepWorkTopic) deepWorkTopic = 'Foco Livre';
      focusStartTime = Date.now();
      focusImmersive = true;
      studyMentorChat = [];
      renderActiveTab();
      showImmersiveOverlay();
      startFocusTicker();
    }

    function startFocusTicker() {
      if (focusInterval) clearInterval(focusInterval);
      focusInterval = setInterval(() => {
        if (!focusStartTime) return;
        const elapsed = Math.floor((Date.now() - focusStartTime) / 1000);
        const imTimer = document.getElementById('focusImmersiveTimer');
        if (imTimer) imTimer.textContent = formatFocusTime(elapsed);
        const phEl = document.getElementById('focusPhrase');
        if (phEl && elapsed > 0 && elapsed % 60 === 0) {
          phEl.textContent = getRandomFocusPhrase();
          phEl.style.opacity = '0';
          setTimeout(() => { if (phEl) phEl.style.opacity = '1'; }, 50);
        }
        const tabTimer = document.getElementById('focusTabTimer');
        if (tabTimer) tabTimer.textContent = formatFocusTime(elapsed);
        // Update topic display
        const topicEl = document.getElementById('immersiveTopic');
        if (topicEl && deepWorkTopic) topicEl.textContent = deepWorkTopic;
      }, 1000);
    }

    function endFocusSession() {
      if (!focusStartTime) return;
      const elapsed = Math.floor((Date.now() - focusStartTime) / 1000);
      feynmanElapsed = elapsed;
      if (elapsed > 0) {
        const todayFocus = getTodayFocus();
        todayFocus.totalSeconds += elapsed;
        todayFocus.sessions.push({
          start: new Date(focusStartTime).toISOString(),
          durationSec: elapsed,
          topic: deepWorkTopic || 'Foco Livre',
        });
        saveData();
      }
      focusStartTime = null;
      focusImmersive = false;
      if (focusInterval) { clearInterval(focusInterval); focusInterval = null; }
      removeImmersiveOverlay();
      // Show Feynman modal if session was > 2 min
      if (elapsed >= 120) {
        showFeynmanModal = true;
      } else {
        const mins = Math.floor(elapsed / 60);
        showToast(`Sessão curta: ${mins}m registrados.`, 2500);
      }
      renderActiveTab();
    }

    function submitFeynmanReport() {
      const textarea = document.getElementById('feynmanTextarea');
      const resumo = textarea ? textarea.value.trim() : '';
      if (!resumo) { showToast('Escreva o que você absorveu.', 2500); return; }
      const logs = getStudyLogs();
      const xpGanho = Math.max(1, Math.floor(feynmanElapsed / 120)); // 1 XP per 2 min
      const bonusFeynman = 10; // bonus for writing the report
      logs.push({
        id: 'study_' + Date.now(),
        data: getTodayKey(),
        hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
        tema: deepWorkTopic || 'Foco Livre',
        tempoSeg: feynmanElapsed,
        resumo,
        xp: xpGanho + bonusFeynman,
      });
      userState.studyLogs = logs;
      adicionarXP(xpGanho + bonusFeynman);
      saveData();
      showFeynmanModal = false;
      deepWorkTopic = '';
      feynmanElapsed = 0;
      showToast(`DOSSIÊ REGISTRADO! +${xpGanho + bonusFeynman} XP`, 4000);
      haptic([60, 30, 60]);
      renderActiveTab();
    }

    function skipFeynmanReport() {
      const xpGanho = Math.max(1, Math.floor(feynmanElapsed / 120));
      adicionarXP(xpGanho);
      showFeynmanModal = false;
      deepWorkTopic = '';
      feynmanElapsed = 0;
      showToast(`Sessão salva. +${xpGanho} XP (sem bônus Feynman)`, 3000);
      renderActiveTab();
    }

    async function askStudyMentor() {
      const input = document.getElementById('studyMentorInput');
      const question = input ? input.value.trim() : '';
      if (!question) return;
      studyMentorChat.push({ role: 'user', text: question });
      input.value = '';
      renderActiveTab();
      // Scroll to bottom
      const scrollMentor = () => setTimeout(() => {
        const chatEl = document.getElementById('studyMentorMessages');
        if (chatEl) chatEl.scrollTop = chatEl.scrollHeight;
      }, 100);
      scrollMentor();
      try {
        const tema = deepWorkTopic || 'estudo geral';
        // Multi-turn history: send PREVIOUS messages only (exclude current question)
        const previousMessages = studyMentorChat.slice(0, -1);
        const historico = previousMessages.length > 0
          ? previousMessages.map(m => ({
              role: m.role === 'user' ? 'user' : 'model',
              text: m.text
            }))
          : null;
        const resp = await callGemini(question, null, tema, historico);
        studyMentorChat.push({ role: 'ai', text: resp });
      } catch (e) {
        console.error('ERRO PROFESSOR IA:', e);
        studyMentorChat.push({ role: 'ai', text: 'Conexão falhou. Continue estudando.' });
      }
      renderActiveTab();
      scrollMentor();
    }

    function showImmersiveOverlay() {
      removeImmersiveOverlay();
      const overlay = document.createElement('div');
      overlay.id = 'focusOverlay';
      overlay.className = 'focus-immersive focus-scanline';
      overlay.innerHTML = `

    // =============================================

    function getWeekScores() {
      const today = getTodayKey();
      const result = [];
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const score = calcDayScore(dk);
        const dayLabel = new Date(dk + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'short' }).slice(0, 3).toUpperCase();
        const isToday = dk === today;
        result.push({ date: dk, score, dayLabel, isToday });
      }
      return result;
    }

    function getWeekAvgScore() {
      const scores = getWeekScores();
      const total = scores.reduce((s, d) => s + d.score, 0);
      return Math.round(total / scores.length);
    }

    function getWeekFocusHours() {
      const today = getTodayKey();
      let totalSec = 0;
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const fs = userState.focusSessions[dk];
        if (fs) totalSec += fs.totalSeconds;
      }
      return (totalSec / 3600).toFixed(1);
    }

    function getWeekHabitRate() {
      const today = getTodayKey();
      let totalPossible = 0;
      let totalDone = 0;
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const habits = userState.dailyHabits[dk];
        if (habits) {
          const dayIds = Object.keys(habits);
          totalPossible += dayIds.length;
          totalDone += dayIds.filter(id => habits[id] === true).length;
        }
      }
      return totalPossible > 0 ? Math.round((totalDone / totalPossible) * 100) : 0;
    }

    function getMonthFinancials() {
      const mk = getMonthKey();
      const expenses = userState.monthlyExpenses[mk] || [];
      const totalGasto = expenses.reduce((s, e) => s + e.amount, 0);
      const totalDopamina = expenses.filter(e => e.category === 'dopamina').reduce((s, e) => s + e.amount, 0);
      const totalEssencial = expenses.filter(e => e.category === 'essencial').reduce((s, e) => s + e.amount, 0);
      const budget = userState.budget || 0;
      const saldo = budget - totalGasto;
      return { totalGasto, totalDopamina, totalEssencial, budget, saldo };
    }

    async function handleFuelImage(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      fuelScanning = true;
      fuelAnalysis = null;
      renderActiveTab();

      try {
        // Compress + convert to Base64
        const base64 = await compressAndConvert(file, 800, 0.7);
        const thumbBase64 = await compressAndConvert(file, 200, 0.5);

        // Send to API

        const resp = await callGemini(prompt, null, null, null, 'the_fuel', base64);

        fuelAnalysis = { text: resp };
        fuelScanning = false;

        // Save to meal log
        const log = {
          date: getTodayKey(),
          time: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
          thumb: thumbBase64,
          analysis: resp,

        // Keep last 50

        fuelAnalysis = { text: 'Falha na análise. Tente novamente.' };
        fuelScanning = false;
      }

    }

    function compressAndConvert(file, maxSize, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxSize || h > maxSize) {
              const ratio = Math.min(maxSize / w, maxSize / h);
              w = Math.round(w * ratio);
              h = Math.round(h * ratio);
            }
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            // Strip "data:image/jpeg;base64," prefix
            resolve(dataUrl.split(',')[1]);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // saveApiKey removed — Gemini API key is hardcoded in userState

    function quickPrompt(text) {
      const input = document.getElementById('chatInput');
      if (input) {
        input.value = text;
        sendChat();
      }
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const msg = input?.value?.trim();
      if (!msg) return;

      // Add user message
      userState.chatHistory.push({ role: 'user', content: msg });
      input.value = '';
      saveData();
      renderActiveTab();
      scrollChat();

      // Gemini AI mode
      try {
        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) sendBtn.textContent = '...';

        // Build conversation context for Gemini
        const recentChat = userState.chatHistory.slice(-10).map(m =>
          `${m.role === 'user' ? 'USUÁRIO' : 'MENTOR'}: ${m.content}`
        ).join('\n');

        const prompt = `Histórico recente:\n${recentChat}\n\nResponda a última mensagem do USUÁRIO de forma direta, concisa (máx 3 frases). Seja disciplinado e motivador.`;

        const reply = await callGemini(prompt, 200);
        userState.chatHistory.push({ role: 'assistant', content: reply });
      } catch (err) {
        console.error('Gemini sendChat error:', err);
        userState.chatHistory.push({ role: 'assistant', content: 'Erro de conexão com Gemini. Tente novamente.' });
      }

      saveData();
      renderActiveTab();
      scrollChat();
    }

    function scrollChat() {
      setTimeout(() => {
        const el = document.getElementById('chatMessages');
        if (el) el.scrollTop = el.scrollHeight;
      }, 50);
    }

      userState.chatHistory = [];
      saveData();
      renderActiveTab();
    }

    async function askGestorFromSheet() {
      const input = document.getElementById('gestorSheetInput');
      const question = input ? input.value.trim() : '';
      if (!question) return;
      warChestChat.push({ role: 'user', text: question });
      input.value = '';
      // Re-render the bottom sheet messages
      refreshGestorSheetMessages();
      try {
        const expenses = getMonthExpenses();
        const totalGasto = expenses.reduce((s, e) => s + e.amount, 0);
        const budget = userState.profile?.budget || 0;
        const essencial = expenses.filter(e => e.cat === 'essencial').reduce((s, e) => s + e.amount, 0);
        const dopamina = expenses.filter(e => e.cat === 'dopamina').reduce((s, e) => s + e.amount, 0);
        const ctx = `Contexto financeiro: Orçamento R$${budget}, Gasto total R$${totalGasto} (Essencial R$${essencial}, Dopamina R$${dopamina}), Sobra R$${budget - totalGasto}.`;
        const previousMessages = warChestChat.slice(0, -1);
        const historico = previousMessages.length > 0
          ? previousMessages.map(m => ({ role: m.role === 'user' ? 'user' : 'model', text: m.text }))
          : [];
        const resp = await callGemini(question, 400, 'gestor', historico, ctx);
        warChestChat.push({ role: 'model', text: resp });
        refreshGestorSheetMessages();
      } catch (err) {
        warChestChat.push({ role: 'model', text: 'Erro ao consultar o Gestor. Tente novamente.' });
        refreshGestorSheetMessages();
      }
    }

    async function toggleNotifications() {
      if (!('Notification' in window)) {
        showToast('Seu navegador não suporta notificações', 3000);
        return;
      }

      if (!userState.notificationsEnabled) {
        // Turning ON
        if (Notification.permission === 'default') {
          const perm = await Notification.requestPermission();
          if (perm !== 'granted') {
            showToast('Permissão negada. Ative nas configurações do navegador.', 4000);
            return;
          }
        } else if (Notification.permission === 'denied') {
          showToast('Notificações bloqueadas. Ative nas configurações do navegador.', 4000);
          return;
        }
        userState.notificationsEnabled = true;
        saveData();
        scheduleAllNotifications();
        showToast('Alertas de guerra ATIVADOS', 3000);
        haptic(30);
      } else {
        // Turning OFF
        userState.notificationsEnabled = false;
        notifScheduled = false;
        saveData();

        haptic(10);

      const currentMinutes = h * 60 + m;

      // Goggins quotes at 08:00, 14:00, 20:00
      const gogginsTimes = [480, 840, 1200]; // in minutes
      gogginsTimes.forEach(targetMin => {
        let delay = (targetMin - currentMinutes) * 60000;
        if (delay < 0) return; // already passed today
        setTimeout(() => {
          if (!userState.notificationsEnabled) return;
          const quote = getRandomGogginsQuote();
          fireNotification('PROTOCOLO GOGGINS', quote.text, 'goggins');
        }, delay);
      });

      // Mission reminder at 18:00
      const missionReminderMin = 1080;
      let missionDelay = (missionReminderMin - currentMinutes) * 60000;
      if (missionDelay > 0) {
        setTimeout(() => {
          if (!userState.notificationsEnabled) return;
          const missoes = getMissoesDoDia();
          const done = missoes.filter(x => x.concluida).length;
          if (done < missoes.length / 2) {
            fireNotification('MISSÕES PENDENTES', `Você completou ${done}/${missoes.length} missões. Hora de moer.`, 'missions');
          }
        }, missionDelay);
      }

      // Discipline reminder every 3 hours
      setInterval(() => {
        if (!userState.notificationsEnabled) return;
        const phrase = DISCIPLINE_PHRASES[Math.floor(Math.random() * DISCIPLINE_PHRASES.length)];
        fireNotification('DISCIPLINA', phrase, 'discipline');
      }, 3 * 60 * 60 * 1000);
    }

    function fireNotification(title, body, tag) {
      if (Notification.permission !== 'granted' || !userState.notificationsEnabled) return;

      // Try SW notification first (persists even if tab is hidden)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().then(reg => {
          if (reg) {
            reg.showNotification(title, {
              body: body,
              icon: './icons/icon-192x192.png',
              badge: './icons/icon-192x192.png',
              tag: tag,
              vibrate: [200, 100, 200],
              renotify: true,
            });
          } else {
            new Notification(title, { body, icon: './icons/icon-192x192.png', tag });
          }
        }).catch(() => {
          new Notification(title, { body, icon: './icons/icon-192x192.png', tag });
        });
      } else {
        new Notification(title, { body, icon: './icons/icon-192x192.png', tag });
      }
    }

    async function callGemini(prompt, maxTokens = 300, topicoEstudo = null, historico = null, moduloAtivo = null, imagemBase64 = null) {
      try {
        const payload = { prompt, maxTokens };
        if (topicoEstudo) payload.topicoEstudo = topicoEstudo;
        if (historico && historico.length > 0) payload.historico = historico;
        if (moduloAtivo) payload.moduloAtivo = moduloAtivo;
        if (imagemBase64) payload.imagemBase64 = imagemBase64;

        const res = await fetch('/api/gemini', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          console.error('Erro Real da API — Status:', res.status, res.statusText);
          console.error('Erro Real da API — Body:', JSON.stringify(data, null, 2));
          throw new Error(`HTTP ${res.status}: ${data?.error || 'Unknown error'}`);
        }

        return data.text || 'Sistema offline. Continue na disciplina.';
      } catch (err) {
        console.error('Erro Real da API — Exception:', err.message || err);
        console.error('Erro Real da API — Stack:', err.stack);
        return 'Conexão com IA falhou. Continue na disciplina.';
      }
    }

    async function fetchAIVerdict() {
      const today = getTodayKey();
      const hourBlock = Math.floor(new Date().getHours() / 2);
      const cacheKey = 'verdict_' + today + '_' + hourBlock;
      const cached = userState.aiCache[cacheKey];
      if (cached && !cached.includes('falhou') && !cached.includes('offline')) { displayVerdict(cached); return; }

      const done = getMissoesDone();
      const total = MISSOES_POR_DIA;
      const score = calcDayScore(today);
      const hour = new Date().getHours();
      const mk = getMonthKey();
      const todayExp = (userState.monthlyExpenses[mk] || []).filter(e => e.date === today);
      const dopamina = todayExp.filter(e => e.category === 'dopamina').reduce((s, e) => s + e.amount, 0);
      const essencial = todayExp.filter(e => e.category === 'essencial').reduce((s, e) => s + e.amount, 0);
      const budget = userState.budget || 0;
      const dopPct = budget > 0 ? (dopamina / budget * 100) : 0;

      let extra = '';
      if (hour >= 12 && done < total) extra += '\nALERTA: Passou do MEIO-DIA e hábitos INCOMPLETOS. Seja EXTRA AGRESSIVO sobre preguiça.';
      if (dopPct > 15) extra += '\nALERTA: Dopamina Barata acima de 15%! Inclua uma ORDEM DE CORTE DE GASTOS.';

      const prompt = `DADOS (${today} ${hour}h): Hábitos ${done}/${total}, Score ${score}/100, Gastos hoje: Essencial R$${essencial.toFixed(0)} Dopamina R$${dopamina.toFixed(0)}, Streak ${userState.streakCount || 0}d.${extra}\n\nVEREDITO: Exatamente 2 frases. Direto, disciplinado, cobrador.`;
      const verdict = await callGemini(prompt, 150);

      userState.aiCache[cacheKey] = verdict;
      if (!userState.performanceLog[today]) userState.performanceLog[today] = {};

    function getStagnationAlerts() {
      const alerts = {};
      const keys = Object.keys(userState.workoutLog).sort().reverse().slice(0, 30);
      const exHist = {};
      for (const k of keys) {
        const dl = userState.workoutLog[k];
        if (!dl?.exercises) continue;
        for (const [id, d] of Object.entries(dl.exercises)) {
          if (!d.load || d.load <= 0) continue;
          if (!exHist[id]) exHist[id] = [];
          if (exHist[id].length < 3) exHist[id].push(d.load);
        }
      }
      for (const [id, loads] of Object.entries(exHist)) {
        if (loads.length >= 3 && loads.every(l => l === loads[0])) alerts[id] = true;
      }
      return alerts;
    }

    function startCallCountdown(totalSeconds) {
      let remaining = totalSeconds;
      const circumference = 2 * Math.PI * 44;

      flashQuestCountdown = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(flashQuestCountdown);
          flashQuestCountdown = null;
          declineFlashQuest();
          return;
        }

        const mins = Math.floor(remaining / 60);
        const secs = remaining % 60;
        const textEl = document.getElementById('flashTimerText');
        const circleEl = document.getElementById('flashTimerCircle');
        if (textEl) textEl.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
        if (circleEl) {
          const progress = 1 - (remaining / totalSeconds);
          circleEl.setAttribute('stroke-dashoffset', String(circumference * progress));
        }
      }, 1000);
    }

    function startExecCountdown(totalMinutes) {
      let remaining = totalMinutes * 60;
      const totalSeconds = remaining;
      const circumference = 2 * Math.PI * 44;

      flashQuestTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(flashQuestTimer);
          flashQuestTimer = null;
          // Time ran out — mission failed
          failFlashQuest();
          return;
        }

        const mins = Math.floor(remaining / 60);
        const secs = remaining % 60;
        const textEl = document.getElementById('flashTimerText');
        const circleEl = document.getElementById('flashTimerCircle');
        if (textEl) textEl.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
        if (circleEl) {
          const progress = 1 - (remaining / totalSeconds);
          circleEl.setAttribute('stroke-dashoffset', String(circumference * progress));
        }
      }, 1000);
    }

      // Track stats
      if (!userState.flashQuestsTotal) userState.flashQuestsTotal = 0;
      userState.flashQuestsTotal++;
      saveData();

      flashQuestPhase = 'complete';
      renderFlashQuestModal();
    }

    function failFlashQuest() {
      haptic(300);
      showToast('⏰ Tempo esgotado! A missão escapou.', 3000);
      cleanupFlashQuest();
    }

    function declineFlashQuest() {
      if (flashQuestCountdown) { clearInterval(flashQuestCountdown); flashQuestCountdown = null; }
      haptic(100);
      cleanupFlashQuest();
    }

    function closeFlashQuest() {
      const overlay = document.getElementById('flashQuestOverlay');
      if (overlay) {
        overlay.classList.remove('entering');
        overlay.classList.add('exiting');
        setTimeout(() => { overlay.remove(); }, 600);
      }
      flashQuestActive = false;
      flashQuestPhase = null;
      flashQuestCurrentMission = null;
    }

    function cleanupFlashQuest() {
      if (flashQuestCountdown) { clearInterval(flashQuestCountdown); flashQuestCountdown = null; }
      if (flashQuestTimer) { clearInterval(flashQuestTimer); flashQuestTimer = null; }
      const overlay = document.getElementById('flashQuestOverlay');
      if (overlay) {
        overlay.classList.remove('entering');
        overlay.classList.add('exiting');
        setTimeout(() => { overlay.remove(); }, 600);
      }
      flashQuestActive = false;
      flashQuestPhase = null;
      flashQuestCurrentMission = null;
    }

    function spawnNeonSparks(anchorId, count) {
      const anchor = document.getElementById(anchorId);
      if (!anchor) return;
      const rect = anchor.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      for (let i = 0; i < count; i++) {
        const spark = document.createElement('div');
        spark.className = 'neon-spark';
        const angle = (Math.PI * 2 / count) * i + (Math.random() * 0.5);
        const dist = 60 + Math.random() * 80;
        const sx = Math.cos(angle) * dist;
        const sy = Math.sin(angle) * dist;
        spark.style.cssText = `left:${cx}px;top:${cy}px;--sx:${sx}px;--sy:${sy}px;animation-delay:${Math.random() * 0.2}s;`;
        const colors = ['#00FF64', '#2563EB', '#FFD700', '#FF3333', '#7C3AED'];
        const c = colors[Math.floor(Math.random() * colors.length)];
        spark.style.background = c;
        spark.style.boxShadow = `0 0 8px ${c}, 0 0 16px ${c}80`;
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 1000);
      }
    }

    // Manual trigger for testing (accessible via console: testFlashQuest())
    window.testFlashQuest = triggerFlashQuest;

    // =============================================
    // HAPTIC FEEDBACK
    // =============================================
    function haptic(pattern = 30) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    // =============================================
    // SCARCITY DETECTION
    // =============================================
    function checkScarcity() {
      const budget = userState.budget || 0;
      if (budget <= 0) { document.body.classList.remove('scarcity-vignette'); return; }
      const mk = getMonthKey();
      const expenses = userState.monthlyExpenses[mk] || [];
      const totalGasto = expenses.reduce((s, e) => s + e.amount, 0);
      const saldo = budget - totalGasto;
      if (saldo < budget * 0.1) {
        document.body.classList.add('scarcity-vignette');
      } else {
        document.body.classList.remove('scarcity-vignette');
      }
    }

    // =============================================
    // REST TIMER (TREINO)
    // =============================================
    function startRestTimer(seconds = 90) {
      stopRestTimer();
      restTimerSeconds = seconds;
      const totalSec = seconds;
      restTimerInterval = setInterval(() => {
        restTimerSeconds--;
        const bar = document.getElementById('restTimerBar');
        const label = document.getElementById('restTimerLabel');
        if (bar) bar.style.width = `${(restTimerSeconds / totalSec) * 100}%`;
        if (label) label.textContent = `Descanso: ${restTimerSeconds}s`;
        if (restTimerSeconds <= 0) {
          stopRestTimer();
          haptic([100, 50, 100]);
          showToast('DESCANSO ACABOU. PRÓXIMA SÉRIE.');
          const container = document.getElementById('restTimerContainer');
          if (container) container.classList.add('hidden');
        }
      }, 1000);
    }

    function stopRestTimer() {
      if (restTimerInterval) { clearInterval(restTimerInterval); restTimerInterval = null; }
      restTimerSeconds = 0;
    }

    // =============================================
    // EXERCISE HISTORY
    // =============================================
    function getExerciseHistory(exerciseId) {
      const logs = userState.workoutLog;
      const keys = Object.keys(logs).sort().reverse();
      const history = [];
      for (const k of keys) {
        if (history.length >= 3) break;
        const ex = logs[k]?.exercises?.[exerciseId];
        if (ex && ex.load > 0) {
          history.push({ date: k, load: ex.load, done: ex.done });
        }
      }
      return history;
    }

    function toggleExerciseHistory(exerciseId) {
      const el = document.getElementById('history-' + exerciseId);
      if (el) el.classList.toggle('hidden');
    }

    // =============================================
    // RECAÍDA OVERLAY
    // =============================================
    function showRecaidaOverlay(vicioId) {
      const data = userState.vicios[vicioId];
      const time = calcTimeSince(data?.startedAt);
      const days = time ? time.days : 0;
      const impactMsg = days >= 7
        ? `Você construiu ${days} DIAS de soberania. Cada dia foi uma batalha vencida. Vai destruir tudo agora?`
        : days >= 3
        ? `${days} dias de progresso serão ZERADOS. A dor da recaída dura mais que o prazer. Tem certeza?`
        : 'O cronômetro volta a zero. Mas lembre-se: cada recomeço é uma chance de ir mais longe.';
      const overlay = document.createElement('div');
      overlay.id = 'recaidaOverlay';
      overlay.className = 'recaida-overlay';
      overlay.innerHTML = `
        <div class="w-full max-w-sm mx-4 p-6 rounded-2xl card-neu text-center">
          <p class="text-4xl mb-4">\u{1F480}</p>
          <p class="text-lg font-black neon-red mb-2">CONFIRMAR RECAÍDA?</p>
          <p class="text-sm font-bold text-gray-400 mb-6 leading-relaxed">${impactMsg}</p>
          ${days >= 7 ? '<p class="text-xs font-extrabold neon-red mb-4">VOCÊ VAI PERDER ' + days + ' DIAS DE PROGRESSO</p>' : ''}
          <div class="flex gap-3">
            <button onclick="closeRecaidaOverlay()" class="flex-1 py-3 rounded-xl bg-[#111] border border-[#333] text-gray-400 font-extrabold text-sm tracking-wider active:scale-[0.93] haptic transition-all">
              CANCELAR
            </button>
            <button onclick="confirmRecaida('${vicioId}')" class="flex-1 py-3 rounded-xl bg-red-950/50 border-2 border-red-900/60 text-red-400 font-extrabold text-sm tracking-wider active:scale-[0.93] haptic transition-all">
              CONFIRMAR
            </button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      haptic([50, 30, 50]);
    }

    function closeRecaidaOverlay() {
      const el = document.getElementById('recaidaOverlay');
      if (el) el.remove();
    }

    function confirmRecaida(vicioId) {
      closeRecaidaOverlay();
      // Kill battle timer IMMEDIATELY before any DOM update
      if (battleTimerInterval) { clearInterval(battleTimerInterval); battleTimerInterval = null; }
      const timerEl = document.getElementById('battlePrecisionTimer');
      if (timerEl) timerEl.textContent = '00 : 00 : 00 : 00';
      // FULL RESET — back to INACTIVE (startedAt = null, not new Date!)
      userState.vicios[vicioId].startedAt = null;
      userState.vicios[vicioId].diasVencidos = [];
      userState.vicios[vicioId].ultimoCheckin = null;
      haptic(100);
      // Close battle calendar if open
      if (document.getElementById('battleCalendarOverlay')) closeBattleCalendar();
      // Invalidate verdict cache (force refresh)
      const today = getTodayKey();
      Object.keys(userState.aiCache).forEach(k => { if (k.startsWith('verdict_' + today)) delete userState.aiCache[k]; });
      saveData();
      renderActiveTab();
      const label = userState.vicios[vicioId]?.label || vicioId;
      fetchRecaidaFeedback(label);
    }

    // =============================================
    // EXTREME FOCUS MODE
    // =============================================
    function toggleExtremeFocus() {
      extremeFocusMode = !extremeFocusMode;
      const nav = document.querySelector('nav');
      if (nav) nav.classList.toggle('nav-hidden', extremeFocusMode);
      const main = document.getElementById('mainContent');
      if (main) main.style.marginBottom = extremeFocusMode ? '0' : '';
      haptic(20);
    }

    // =============================================
    // INIT
    // =============================================
    (async function init() {
      registerServiceWorker();
      setupInstallPrompt();
      setInterval(updateHeaderDate, 60000);

      // Check for existing Supabase session
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session && session.user) {
          currentUser = session.user;
          document.getElementById('authScreen').style.display = 'none';
          await cloudLoad();
          loadData();
          updateHeaderDate();
          switchTab('dashboard');
          checkScarcity();
          initNotifications();
          return;
        }
      } catch (err) {
        console.error('Session restore error:', err);
      }

      // No session — show login screen, but load localStorage as fallback display
      loadData();
      updateHeaderDate();

      // Listen for auth state changes (e.g., email confirmation redirect)
      supabase.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session?.user) {
          currentUser = session.user;
          await onAuthSuccess();
        }
        if (event === 'SIGNED_OUT') {
          currentUser = null;
          document.getElementById('authScreen').style.display = 'flex';
        }
      });
    })();
  </script>
</body>
</html>
