<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Unstoppable">
  <meta name="application-name" content="Unstoppable Clone">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-TileColor" content="#000000">
  <meta name="msapplication-tap-highlight" content="no">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%23000'/><text x='90' y='122' font-size='100' text-anchor='middle' fill='%232563EB' font-family='Arial' font-weight='900'>U</text></svg>">
  <title>BE UNSTOPPABLE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            royal: '#2563EB',
            emerald: '#10B981',
            card: '#111111',
            border: '#222222',
            dark: '#000000',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* ===== BASE & MOBILE UX ===== */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html { overscroll-behavior-y: contain; -webkit-overflow-scrolling: touch; }
    body { font-family: 'Inter', system-ui, sans-serif; overscroll-behavior: none; touch-action: manipulation; -webkit-text-size-adjust: 100%; overscroll-behavior-y: contain; }
    a, button, input, select, textarea, [onclick] { touch-action: manipulation; }
    input[type="text"], input[type="number"], input[type="password"], textarea, select { font-size: 16px !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

    /* ===== NEUMORPHIC CARD SYSTEM ===== */
    .card-neu {
      background: #111;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      box-shadow: 10px 10px 24px rgba(0,0,0,0.7), -5px -5px 14px rgba(255,255,255,0.02), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: all 0.3s cubic-bezier(.4,0,.2,1);
    }
    .card-neu:hover { box-shadow: 12px 12px 28px rgba(0,0,0,0.8), -5px -5px 16px rgba(255,255,255,0.03), inset 0 1px 0 rgba(255,255,255,0.05); transform: translateY(-1px); }
    .card-inner {
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 12px;
      box-shadow: inset 2px 2px 6px rgba(0,0,0,0.5), inset -1px -1px 4px rgba(255,255,255,0.02);
    }

    /* ===== TAB TRANSITIONS ===== */
    .tab-enter { animation: tabIn 0.3s cubic-bezier(.4,0,.2,1); }
    @keyframes tabIn {
      from { opacity: 0; transform: translateY(12px) scale(0.985); filter: blur(2px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    #mainContent { transition: opacity 0.15s ease; }

    /* ===== HABIT SYSTEM ===== */
    .habit-check { transition: all 0.3s cubic-bezier(.4,0,.2,1); }
    .habit-check.done {
      background: rgba(0, 255, 100, 0.06) !important;
      border-color: #00FF64 !important;
      box-shadow: 0 0 18px rgba(0,255,100,0.2), inset 0 0 15px rgba(0,255,100,0.05) !important;
    }
    .habit-icon-ring { transition: all 0.3s ease; }
    .habit-icon-ring.done { box-shadow: 0 0 14px rgba(0,255,100,0.4); }
    .streak-fire { display: inline-block; animation: firePulse 1.5s ease-in-out infinite; }
    @keyframes firePulse {
      0%, 100% { transform: scale(1) rotate(0deg); filter: brightness(1) drop-shadow(0 0 0 transparent); }
      25% { transform: scale(1.1) rotate(-3deg); }
      50% { transform: scale(1.2) rotate(2deg); filter: brightness(1.4) drop-shadow(0 0 8px rgba(255,150,0,0.4)); }
      75% { transform: scale(1.1) rotate(-1deg); }
    }

    /* ===== NEON SYSTEM ===== */
    .neon-text { color: #00FF64; text-shadow: 0 0 8px rgba(0,255,100,0.6), 0 0 20px rgba(0,255,100,0.3); }
    .neon-bar { background: linear-gradient(90deg, #00FF64, #10B981); box-shadow: 0 0 12px rgba(0,255,100,0.4), 0 0 4px rgba(0,255,100,0.2); }
    .neon-bar-track { box-shadow: inset 0 0 8px rgba(0,0,0,0.9); }
    .neon-red { color: #FF3333; text-shadow: 0 0 10px rgba(255,50,50,0.7), 0 0 25px rgba(255,50,50,0.4); }
    .neon-red-glow { box-shadow: 0 0 20px rgba(255,50,50,0.3), inset 0 0 15px rgba(255,50,50,0.05) !important; border-color: #FF3333 !important; }
    .neon-red-bar { background: linear-gradient(90deg, #FF3333, #cc0000); box-shadow: 0 0 12px rgba(255,50,50,0.5); }
    @keyframes redPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(255,50,50,0.3); }
      50% { opacity: 0.85; box-shadow: 0 0 35px rgba(255,50,50,0.5); }
    }
    .red-pulse { animation: redPulse 2s ease-in-out infinite; }
    .neon-yellow { color: #FACC15; text-shadow: 0 0 8px rgba(250,204,21,0.5), 0 0 20px rgba(250,204,21,0.25); }
    .neon-gold { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6), 0 0 20px rgba(255,215,0,0.3); }
    .neon-gold-border { border-color: rgba(255,215,0,0.3) !important; box-shadow: 0 0 12px rgba(255,215,0,0.1); }

    /* ===== GLOW BUTTONS ===== */
    .btn-royal {
      background: linear-gradient(135deg, #2563EB, #1d4ed8);
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 2px 12px rgba(37,99,235,0.3);
      border-radius: 14px;
    }
    .btn-royal:hover { box-shadow: 0 4px 20px rgba(37,99,235,0.5); transform: translateY(-1px); }
    .btn-royal:active { transform: scale(0.96) translateY(0); box-shadow: 0 1px 6px rgba(37,99,235,0.3), 0 0 20px rgba(37,99,235,0.25); }
    .btn-glow-green {
      box-shadow: 0 0 15px rgba(0,255,100,0.3), 0 0 40px rgba(0,255,100,0.1);
      border-color: #00FF64 !important;
    }

    /* ===== SCORE RING ===== */
    .score-ring { background: conic-gradient(var(--ring-color) calc(var(--score) * 3.6deg), #1a1a1a 0deg); border-radius: 50%; }
    .bar-grow { animation: barGrow 0.7s cubic-bezier(.25,.46,.45,.94) forwards; }
    @keyframes barGrow { from { height: 0; opacity: 0.5; } }

    /* ===== TIMERS ===== */
    .mono-timer { font-family: 'Courier New', 'Consolas', monospace; font-variant-numeric: tabular-nums; letter-spacing: 1px; }

    /* ===== SOBERANIA ===== */
    .sobriety-card { transition: all 0.3s cubic-bezier(.4,0,.2,1); }
    .sobriety-card:hover { border-color: #444 !important; transform: translateY(-1px); }
    .sobriety-card.streak-glow {
      box-shadow: 0 0 20px rgba(0,255,100,0.15), 0 0 40px rgba(0,255,100,0.05), inset 0 0 20px rgba(0,255,100,0.03);
      border-color: rgba(0,255,100,0.3) !important;
    }
    .verse-glow {
      background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(0,0,0,0));
      border-color: rgba(37,99,235,0.2) !important;
    }

    /* ===== NAV ===== */
    .nav-btn { transition: all 0.25s cubic-bezier(.4,0,.2,1); position: relative; }
    .nav-btn:active { transform: scale(0.92); }
    .nav-btn.active svg { stroke: #2563EB; filter: drop-shadow(0 0 6px rgba(37,99,235,0.5)); transition: all 0.3s ease; }
    .nav-btn.active span { color: #2563EB; text-shadow: 0 0 8px rgba(37,99,235,0.3); }
    .nav-btn.active::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: #2563EB; border-radius: 2px; box-shadow: 0 0 8px rgba(37,99,235,0.6); }
    nav.nav-hidden { transform: translateY(100%); transition: transform 0.3s ease; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* ===== INPUTS ===== */
    input, textarea, select {
      background: #0d0d0d !important;
      border: 1px solid #1a1a1a !important;
      color: #fff !important;
      outline: none !important;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4), inset -1px -1px 3px rgba(255,255,255,0.02);
      transition: all 0.2s ease;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #2563EB !important;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4), 0 0 8px rgba(37,99,235,0.2);
    }

    /* ===== FOCUS MODULE ===== */
    .focus-pulse { animation: focusPulse 2s ease-in-out infinite; }
    @keyframes focusPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(124,58,237,0.3), 0 0 60px rgba(124,58,237,0.1); }
      50% { box-shadow: 0 0 40px rgba(124,58,237,0.6), 0 0 100px rgba(124,58,237,0.2); }
    }
    .focus-timer-text { font-family: 'Courier New', 'Consolas', monospace; font-variant-numeric: tabular-nums; letter-spacing: 3px; }
    .focus-immersive {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.97);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .focus-ring-active { border: 3px solid #7C3AED; animation: focusRingSpin 4s linear infinite; }
    @keyframes focusRingSpin {
      0% { border-color: #7C3AED; box-shadow: 0 0 30px rgba(124,58,237,0.4); }
      33% { border-color: #06b6d4; box-shadow: 0 0 40px rgba(6,182,212,0.4); }
      66% { border-color: #8b5cf6; box-shadow: 0 0 35px rgba(139,92,246,0.4); }
      100% { border-color: #7C3AED; box-shadow: 0 0 30px rgba(124,58,237,0.4); }
    }
    .focus-scanline {
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(124,58,237,0.02) 2px, rgba(124,58,237,0.02) 4px);
    }
    /* Deep Work study ring */
    .study-ring {
      background: conic-gradient(from 0deg, #7C3AED calc(var(--pct) * 3.6deg), #1a1a1a calc(var(--pct) * 3.6deg));
      border-radius: 50%;
      padding: 6px;
    }
    .study-ring-inner {
      background: radial-gradient(circle, #050505 60%, #0a0a0a 100%);
      border-radius: 50%;
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    /* Feynman modal */
    .feynman-textarea {
      background: #0a0a0a; border: 1px solid #222; color: #e5e5e5;
      font-size: 15px; line-height: 1.6; resize: none;
      transition: border-color 0.2s;
    }
    .feynman-textarea:focus { border-color: #7C3AED; outline: none; }
    .feynman-textarea::placeholder { color: #444; }
    /* Archive card */
    .archive-card {
      background: #111; border: 1px solid #1a1a1a; border-radius: 16px;
      transition: border-color 0.2s;
    }
    .archive-card:hover { border-color: #333; }
    /* Study mentor chat bubble */
    .mentor-bubble {
      background: linear-gradient(135deg, #1a0a2e 0%, #0a0a0a 100%);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 16px;
    }
    /* Markdown prose inside AI chat bubbles */
    .ai-prose p { margin: 0.4em 0; line-height: 1.7; }
    .ai-prose strong { color: #c4b5fd; font-weight: 800; }
    .ai-prose em { color: #a78bfa; }
    .ai-prose h1,.ai-prose h2,.ai-prose h3,.ai-prose h4 { color: #e9d5ff; font-weight: 800; margin: 0.6em 0 0.3em; }
    .ai-prose h3 { font-size: 0.95rem; }
    .ai-prose ul,.ai-prose ol { padding-left: 1.2em; margin: 0.4em 0; }
    .ai-prose li { margin: 0.2em 0; }
    .ai-prose li::marker { color: #7c3aed; }
    .ai-prose code { background: rgba(124,58,237,0.15); color: #c4b5fd; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.85em; }
    .ai-prose pre { background: #0a0a0a; border: 1px solid #1a1a2e; border-radius: 8px; padding: 0.8em; overflow-x: auto; margin: 0.5em 0; }
    .ai-prose pre code { background: none; padding: 0; }
    .ai-prose table { width: 100%; border-collapse: collapse; margin: 0.5em 0; font-size: 0.85em; }
    .ai-prose th { background: rgba(124,58,237,0.2); color: #c4b5fd; padding: 0.4em 0.6em; text-align: left; border: 1px solid #2a1a4e; }
    .ai-prose td { padding: 0.4em 0.6em; border: 1px solid #1a1a2e; }
    .ai-prose blockquote { border-left: 3px solid #7c3aed; padding-left: 0.8em; margin: 0.5em 0; color: #a78bfa; font-style: italic; }
    .ai-prose a { color: #a78bfa; text-decoration: underline; }

    /* ===== TREINO MODULE ===== */
    .workout-load { font-family: 'Courier New', 'Consolas', monospace; font-variant-numeric: tabular-nums; }
    .pr-glow { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6), 0 0 20px rgba(255,215,0,0.3); animation: prPulse 1.5s ease-in-out infinite; }
    @keyframes prPulse {
      0%, 100% { text-shadow: 0 0 8px rgba(255,215,0,0.6); }
      50% { text-shadow: 0 0 16px rgba(255,215,0,0.9), 0 0 30px rgba(255,215,0,0.4); }
    }
    .pr-badge { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05)); border: 1px solid rgba(255,215,0,0.3); color: #FFD700; }
    .day-selector-btn { transition: all 0.15s ease; }
    .day-selector-btn.active-day { background: #2563EB !important; color: white !important; border-color: #2563EB !important; box-shadow: 0 0 10px rgba(37,99,235,0.3); }
    .exercise-row { transition: all 0.3s ease; }
    .exercise-row.done-exercise { opacity: 0.45; }
    .exercise-row.done-exercise .exercise-name { text-decoration: line-through; }
    .rest-timer-bar { height: 3px; background: #2563EB; transition: width 1s linear; border-radius: 2px; box-shadow: 0 0 6px rgba(37,99,235,0.4); }

    /* ===== STATUS MODULE ===== */
    .status-bar { transition: height 0.6s ease-out; border-radius: 4px 4px 0 0; }
    .status-metric-card { background: #111; border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; transition: all 0.2s ease; box-shadow: 4px 4px 12px rgba(0,0,0,0.5), -2px -2px 6px rgba(255,255,255,0.02); }
    .verdict-card { border-radius: 16px; position: relative; overflow: hidden; }
    .verdict-card::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.01) 3px, rgba(255,255,255,0.01) 6px); pointer-events: none; }

    /* ===== PIE CHART ===== */
    .pie-chart {
      width: 120px; height: 120px; border-radius: 50%;
      background: conic-gradient(var(--ess-color, #2563EB) 0deg calc(var(--ess-pct, 50) * 3.6deg), var(--dop-color, #FF3333) calc(var(--ess-pct, 50) * 3.6deg) 360deg);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.6), 0 0 15px rgba(0,0,0,0.4);
    }

    /* ===== SCARCITY VIGNETTE ===== */
    .scarcity-vignette::after {
      content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.08) 100%);
      animation: vignetteBreath 3s ease-in-out infinite;
    }
    @keyframes vignetteBreath {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ===== RECAIDA OVERLAY ===== */
    .recaida-overlay {
      position: fixed; inset: 0; z-index: 70;
      background: rgba(0,0,0,0.95);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }

    /* ===== TERMINAL & AI (v3.0) ===== */
    .terminal-output {
      background: #050505;
      border: 1px solid rgba(0,255,100,0.12);
      border-radius: 12px;
      padding: 16px;
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 11px;
      color: #00FF64;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 10px rgba(0,255,100,0.05);
    }
    .terminal-output::before {
      content: '> UNSTOPPABLE v3.0 — TERMINAL DE GUERRA';
      display: block;
      color: rgba(0,255,100,0.4);
      font-size: 9px;
      letter-spacing: 2px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0,255,100,0.08);
    }
    .ai-verdict-card {
      background: linear-gradient(135deg, rgba(255,50,50,0.04), rgba(0,0,0,0));
      border: 1px solid rgba(255,50,50,0.15);
      border-radius: 16px;
      box-shadow: 8px 8px 20px rgba(0,0,0,0.6), -4px -4px 12px rgba(255,255,255,0.02);
    }
    .ai-loading { animation: aiPulse 1.5s ease-in-out infinite; }
    @keyframes aiPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .stagnation-tag { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #FF3333; }

    /* ===== AUTH SCREEN ===== */
    .auth-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .auth-card {
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 20px;
      box-shadow: 12px 12px 30px rgba(0,0,0,0.8), -6px -6px 20px rgba(255,255,255,0.02), 0 0 60px rgba(37,99,235,0.05);
    }
    .auth-input {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      background: #050505 !important; border: 1px solid #222 !important;
      color: #fff; font-size: 16px !important; font-weight: 600;
      outline: none; transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: #2563EB !important; box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
    .auth-input::placeholder { color: #444; }
    .auth-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      background: #2563EB; color: #fff; font-weight: 800; font-size: 14px;
      letter-spacing: 0.1em; border: none; cursor: pointer;
      transition: all 0.2s; text-transform: uppercase;
    }
    .auth-btn:hover { background: #1d4ed8; }
    .auth-btn:active { transform: scale(0.97); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-divider { display: flex; align-items: center; gap: 12px; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: #222; }
    .sync-indicator {
      position: fixed; top: 12px; right: 12px; z-index: 90;
      width: 8px; height: 8px; border-radius: 50%;
      transition: background 0.3s;
    }
    .sync-indicator.synced { background: #10B981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
    .sync-indicator.syncing { background: #F59E0B; animation: aiPulse 1s infinite; }
    .sync-indicator.error { background: #EF4444; }

    /* ===== CARD COLLECTION SYSTEM v2.0 ===== */
    .card-colecao {
      perspective: 800px;
      cursor: pointer;
    }
    .card-colecao-inner {
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      transform-style: preserve-3d;
      will-change: transform;
      position: relative;
      overflow: hidden;
    }
    .card-colecao:hover .card-colecao-inner {
      transform: rotateY(3deg) rotateX(-2deg) scale(1.05);
    }
    .card-locked {
      opacity: 0.35;
      filter: brightness(0) grayscale(1);
      pointer-events: none;
    }
    .rarity-comum    { --neon-card: rgba(160,160,160,0.35); }
    .rarity-rara     { --neon-card: rgba(0,230,255,0.55); }
    .rarity-epica    { --neon-card: rgba(180,60,255,0.6); }
    .rarity-lendaria { --neon-card: rgba(255,200,0,0.7); }
    .rarity-secreta  { --neon-card: rgba(180,0,0,0.7); }
    .card-colecao-inner.unlocked {
      border: 1px solid var(--neon-card);
      box-shadow: 0 0 15px var(--neon-card), inset 0 0 20px rgba(0,0,0,0.6);
    }
    .card-colecao:hover .card-colecao-inner.unlocked {
      box-shadow: 0 0 30px var(--neon-card), 0 8px 25px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
    }
    /* Lendária pulse glow */

    function showAuthError(msg) {
      const el = document.getElementById('authError');
      const txt = document.getElementById('authErrorText');
      el.classList.remove('hidden');
      txt.textContent = msg;
    }

    function hideAuthError() {
      document.getElementById('authError').classList.add('hidden');
    }

    function setAuthLoading(loading) {
      document.getElementById('authLoading').classList.toggle('hidden', !loading);
      document.getElementById('btnLogin').disabled = loading;
      document.getElementById('btnSignup').disabled = loading;
    }

    async function handleLogin() {
      hideAuthError();
      if (!supabase) { showAuthError('Supabase não carregou. Recarregue a página.'); return; }
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      if (!email || !password) { showAuthError('Preencha email e senha.'); return; }
      setAuthLoading(true);
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        currentUser = data.user;
        await onAuthSuccess();
      } catch (err) {
        console.error('Login error:', err);
        showAuthError(err.message === 'Invalid login credentials'
          ? 'Email ou senha incorretos.'
          : err.message || 'Erro ao fazer login.');
      }
      setAuthLoading(false);
    }

    async function handleSignup() {
      hideAuthError();
      if (!supabase) { showAuthError('Supabase não carregou. Recarregue a página.'); return; }
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      if (!email || !password) { showAuthError('Preencha email e senha.'); return; }
      if (password.length < 6) { showAuthError('Senha deve ter pelo menos 6 caracteres.'); return; }
      setAuthLoading(true);
      try {
        console.log('Attempting signup with:', email);
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: { emailRedirectTo: window.location.origin }
        });
        console.log('Signup response data:', JSON.stringify(data, null, 2));
        console.log('Signup response error:', error);
        if (error) throw error;
        if (data.user && !data.user.confirmed_at && data.user.identities?.length === 0) {
          showAuthError('Este email já está cadastrado.');
          setAuthLoading(false);
          return;
        }
        if (data.session) {
          // Email confirmation disabled — user is logged in immediately
          currentUser = data.user;
          await onAuthSuccess();
        } else if (data.user) {
          // Email confirmation required — auto-login anyway for local/dev use
          // Try signing in directly (works if "Confirm email" is OFF in Supabase Auth settings)
          const { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({ email, password });
          if (loginData?.session) {
            currentUser = loginData.user;
            await onAuthSuccess();
          } else {
            showAuthError('Conta criada! Verifique seu email para confirmar, ou desative "Confirm email" no Supabase → Auth → Settings.');
          }
        }
      } catch (err) {
        console.error('Signup error:', err);
        console.error('Signup error details:', JSON.stringify(err, Object.getOwnPropertyNames(err)));
        showAuthError(err.message || 'Erro ao criar conta.');
      }
      setAuthLoading(false);
    }

    // =============================================
    // CLOUD SYNC (Supabase user_data table)
    // =============================================
    // Table schema:
    //   user_data (
    //     id UUID REFERENCES auth.users(id) PRIMARY KEY,
    //     app_state JSONB NOT NULL DEFAULT '{}',
    //     updated_at TIMESTAMPTZ DEFAULT now()
    //   )

    function setSyncStatus(status) {
      const el = document.getElementById('syncIndicator');
      el.className = 'sync-indicator ' + status;
    }

    async function cloudSave() {
      if (!currentUser || isSyncing) return;
      isSyncing = true;
      setSyncStatus('syncing');
      try {
        const { error } = await supabase
          .from('user_data')
          .upsert({
            id: currentUser.id,
            app_state: userState,
            updated_at: new Date().toISOString()
          }, { onConflict: 'id' });
        if (error) throw error;
        setSyncStatus('synced');
      } catch (err) {
        console.error('Cloud save error:', err);
        setSyncStatus('error');
      }
      isSyncing = false;
    }

    async function cloudLoad() {
      if (!currentUser) return;
      setSyncStatus('syncing');
      try {
        const { data, error } = await supabase
          .from('user_data')
          .select('app_state')
          .eq('id', currentUser.id)
          .single();

        if (error && error.code === 'PGRST116') {
          // No row found — new user, INSERT default state
          console.log('New user — creating cloud record');
          const { error: insertError } = await supabase
            .from('user_data')
            .insert({ id: currentUser.id, app_state: userState });
          if (insertError) throw insertError;
          // Also save to localStorage
          localStorage.setItem('unstoppable_state', JSON.stringify(userState));
          setSyncStatus('synced');
          return;
        }
        if (error) throw error;

        if (data && data.app_state) {
          // Cloud data found — merge into userState
          const cloudState = data.app_state;
          userState = { ...userState, ...cloudState };
          localStorage.setItem('unstoppable_state', JSON.stringify(userState));
        }
        setSyncStatus('synced');
      } catch (err) {
        console.error('Cloud load error:', err);
        setSyncStatus('error');
        // Fall back to localStorage silently
      }
    }

    // Debounced cloud sync — fires 2s after last saveData() call
    function scheduleCloudSync() {
      if (syncTimeout) clearTimeout(syncTimeout);
      syncTimeout = setTimeout(cloudSave, 2000);
    }

    const MISSOES_POR_DIA = 10;

    function gerarMissoesDoDia() {
      const today = getTodayKey();
      // Check if missions already generated for today
      if (userState.missoesDiarias && userState.missoesDiarias.date === today) {
        return userState.missoesDiarias.missoes;
      }
      // Shuffle and pick 10
      const shuffled = [...POOL_MISSOES].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, MISSOES_POR_DIA).map(m => ({
        ...m,
        concluida: false
      }));
      userState.missoesDiarias = { date: today, missoes: selected };
      saveData();
      return selected;
    }

    function getMissoesDoDia() {
      const today = getTodayKey();
      if (!userState.missoesDiarias || userState.missoesDiarias.date !== today) {
        return gerarMissoesDoDia();
      }
      return userState.missoesDiarias.missoes;
    }

    function getMissoesDone() {
      const missoes = getMissoesDoDia();
      return missoes.filter(m => m.concluida).length;
    }

    function getMissoesXpTotal() {
      const missoes = getMissoesDoDia();
      return missoes.filter(m => m.concluida).reduce((sum, m) => sum + m.xp, 0);
    }

    function xpParaNivel(nivel) {
      if (nivel <= 0) return 0;
      return Math.floor(Math.pow(nivel, 2.5) * 50);
    }

    function calcularNivel(xpTotal) {
      let nivel = 0;
      let xpAcumulado = 0;
      while (nivel < MAX_LEVEL) {
        const xpProximo = xpParaNivel(nivel + 1);
        if (xpAcumulado + xpProximo > xpTotal) break;
        xpAcumulado += xpProximo;
        nivel++;
      }
      const xpProximoNivel = nivel < MAX_LEVEL ? xpParaNivel(nivel + 1) : 0;
      const xpNoNivelAtual = xpTotal - xpAcumulado;
      return {
        nivel,
        xpTotal,
        xpNoNivelAtual,
        xpProximoNivel,
        pctNivel: xpProximoNivel > 0 ? Math.min(100, Math.round((xpNoNivelAtual / xpProximoNivel) * 100)) : 100,
        isMax: nivel >= MAX_LEVEL
      };
    }

    function isCartaDesbloqueada(carta, nivel) {
      if (carta.tipoDesbloqueio === 'secreto') {
        // Secretas: checam o array userState.cartasSecretas
        return (userState.cartasSecretas || []).includes(carta.id);
      }
      return nivel >= carta.requisito;
    }

    function getCartasDesbloqueadas(nivel) {
      return COLECAO_CARTAS.filter(c => isCartaDesbloqueada(c, nivel));
    }

    function desbloquearCartaSecreta(cartaId) {
      if (!userState.cartasSecretas) userState.cartasSecretas = [];
      if (userState.cartasSecretas.includes(cartaId)) return;
      const carta = COLECAO_CARTAS.find(c => c.id === cartaId);
      if (!carta || carta.tipoDesbloqueio !== 'secreto') return;
      userState.cartasSecretas.push(cartaId);
      showToast(`💀 ANOMALIA DETECTADA: ${carta.nome}`, 5000);
      haptic(100);
      saveData();
    }

    function verificarDesbloqueioCartas(nivelAnterior, nivelAtual) {
      const novas = COLECAO_CARTAS.filter(c =>
        c.tipoDesbloqueio === 'nivel' &&
        c.requisito > nivelAnterior &&
        c.requisito <= nivelAtual
      );
      novas.forEach(c => {
        const rc = RARITY_CONFIG[c.raridade];
        showToast(`🃏 Carta desbloqueada: ${c.nome} (${rc?.label || c.raridade})`, 4000);
        haptic(60);
      });
      return novas;
    }

    function adicionarXP(amount) {
      if (!userState.xpTotal) userState.xpTotal = 0;
      const antes = calcularNivel(userState.xpTotal);
      userState.xpTotal += amount;
      const depois = calcularNivel(userState.xpTotal);
      if (depois.nivel > antes.nivel) {
        showToast(`⬆️ NÍVEL ${depois.nivel}! +${amount} XP`, 3000);
        verificarDesbloqueioCartas(antes.nivel, depois.nivel);
      }
      saveData();
    }

    function avancarFaseCampanha() {
      const c = userState.prCampaign;
      if (!c || c.concluida) return;
      const fase = c.trilha[c.faseAtual];
      if (!fase) return;
      fase.progresso++;
      if (fase.progresso >= fase.meta) {
        if (c.faseAtual < c.trilha.length - 1) {
          c.faseAtual++;
          showToast(`FASE ${c.faseAtual + 1} DESBLOQUEADA: ${c.trilha[c.faseAtual].titulo}`, 4000);
          haptic(60);
        }
      }
      saveData();
      renderActiveTab();
    }

    function concluirBossFight(conseguiu) {
      const c = userState.prCampaign;
      if (!c || c.concluida) return;
      if (conseguiu) {
        c.concluida = true;
        c.trilha[c.faseAtual].progresso = 1;
        // XP massivo
        const xpGanho = 500 + Math.round((c.prObjetivo - c.prAtual) * 10);
        adicionarXP(xpGanho);
        // Update PR record
        const exId = c.exercicio.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        if (!userState.workoutLoads[exId]) userState.workoutLoads[exId] = { lastLoad: 0, pr: 0 };
        userState.workoutLoads[exId].pr = c.prObjetivo;
        userState.workoutLoads[exId].lastLoad = c.prObjetivo;
        haptic([100, 50, 100, 50, 200]);
        showToast(`PR ESMAGADO! ${c.prObjetivo}kg! +${xpGanho} XP`, 5000);

        const burst = document.createElement('div');
        burst.className = 'victory-burst';

    function addForjaExercicio(nome) {
      if (!nome || !nome.trim()) return;
      const id = 'forja_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
      forjaExercicios.push({ id, nome: nome.trim(), series: 3, reps: 10, carga: 0, concluido: false });
      forjaShowingLibrary = false;
      renderActiveTab();
    }

    function removeForjaExercicio(id) {
      forjaExercicios = forjaExercicios.filter(e => e.id !== id);
      renderActiveTab();
    }

    function updateForjaExercicio(id, campo, valor) {
      const ex = forjaExercicios.find(e => e.id === id);
      if (!ex) return;
      if (campo === 'series' || campo === 'reps' || campo === 'carga') {
        ex[campo] = parseFloat(valor) || 0;
      }
      // No re-render needed for input changes
    }

    function toggleForjaConcluido(id) {
      const ex = forjaExercicios.find(e => e.id === id);
      if (!ex) return;
      ex.concluido = !ex.concluido;
      haptic(ex.concluido ? 40 : 15);
      if (ex.concluido) startRestTimer(90);
      renderActiveTab();
    }

      const today = getTodayKey();

      } else {

      const today = getTodayKey();
      if (userState.dailyHabits[today]) {
        userState.dailyHabits[today].workout = true;

      const done = forjaExercicios.filter(e => e.concluido).length;

      haptic([100, 50, 100, 50, 100]);

    let selectedWorkoutDay = WORKOUT_DAYS[new Date().getDay()]; // current day of week

    function getTodayKey() {
      return new Date().toISOString().split('T')[0];
    }

    function getMonthKey() {
      return getTodayKey().slice(0, 7); // "2026-03"
    }

    function saveData() {
      localStorage.setItem('unstoppable_state', JSON.stringify(userState));
      // Trigger debounced cloud sync if logged in
      if (currentUser) scheduleCloudSync();
    }

    function loadData() {
      const raw = localStorage.getItem('unstoppable_state');
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          userState = { ...userState, ...parsed };
        } catch (e) {
          console.warn('Failed to load state:', e);
        }
      }
      // Migrate: old flat array → month-keyed object
      if (Array.isArray(userState.monthlyExpenses)) {
        const migrated = {};
        userState.monthlyExpenses.forEach(e => {
          const mk = (e.date || getTodayKey()).slice(0, 7);
          if (!migrated[mk]) migrated[mk] = [];
          migrated[mk].push(e);
        });
        userState.monthlyExpenses = migrated;
      }
      if (typeof userState.monthlyExpenses !== 'object' || userState.monthlyExpenses === null) {
        userState.monthlyExpenses = {};
      }
      const today = getTodayKey();
      // Daily reset: create fresh booleans for today (history stays intact)
      if (!userState.dailyHabits[today]) {
        // Before resetting, compute streak from yesterday
        computeStreakOnNewDay(today);
        userState.dailyHabits[today] = {};
        // Generate today's missions and sync to dailyHabits
        const todayMissoes = gerarMissoesDoDia();
        todayMissoes.forEach(m => userState.dailyHabits[today][m.id] = false);
      } else {
        // Ensure missions exist for today (in case loaded from cloud without them)
        getMissoesDoDia();
      }
      // Initialize vicios if needed
      if (!userState.vicios || typeof userState.vicios !== 'object') {
        userState.vicios = {};
      }
      DEFAULT_VICIOS.forEach(v => {
        if (!userState.vicios[v.id]) {
          userState.vicios[v.id] = { startedAt: null, label: v.label };
        }
      });
      // Initialize focusSessions if needed
      if (!userState.focusSessions || typeof userState.focusSessions !== 'object') {
        userState.focusSessions = {};
      }
      // Initialize workout state if needed
      if (!userState.workoutLoads || typeof userState.workoutLoads !== 'object') {
        userState.workoutLoads = {};
      }
      if (!userState.workoutLog || typeof userState.workoutLog !== 'object') {
        userState.workoutLog = {};
      }
      // Initialize v3.0 fields
      if (!userState.performanceLog || typeof userState.performanceLog !== 'object') userState.performanceLog = {};
      if (!userState.aiCache || typeof userState.aiCache !== 'object') userState.aiCache = {};
      if (!userState.apiKey) userState.apiKey = '';
      if (!userState.profile) userState.profile = { name: 'Guerreiro', budget: 0, focusGoalHours: 4 };
      if (!userState.profile.avatar) userState.profile.avatar = '⚔️';
      if (typeof userState.xpTotal !== 'number') userState.xpTotal = 0;
      if (!Array.isArray(userState.cartasSecretas)) userState.cartasSecretas = [];
      if (!userState.forjaTreinos || typeof userState.forjaTreinos !== 'object') userState.forjaTreinos = {};
      if (userState.prCampaign && userState.prCampaign.concluida) {
        // Keep completed campaigns for history, but user can start new ones
      }
      if (!userState.missoesDiarias) userState.missoesDiarias = null;
      if (!Array.isArray(userState.studyLogs)) userState.studyLogs = [];
      if (!Array.isArray(userState.mealLogs)) userState.mealLogs = [];
      if (!userState.fuelGoal) userState.fuelGoal = 'manutenção';
      // Clean stale AI cache (keep only today's)
      const todayPrefix = 'verdict_' + today;
      Object.keys(userState.aiCache).forEach(k => {
        if (k.startsWith('verdict_') && !k.startsWith(todayPrefix)) delete userState.aiCache[k];
      });
      // Clean old habit data (keep only last 60 days)
      pruneOldHabits();
      // Prune old focus data (keep only last 60 days)
      const focusKeys = Object.keys(userState.focusSessions).sort();
      if (focusKeys.length > 60) {
        focusKeys.slice(0, focusKeys.length - 60).forEach(k => delete userState.focusSessions[k]);
      }
      // Prune old workout logs (keep only last 60 days)
      const workoutLogKeys = Object.keys(userState.workoutLog).sort();
      if (workoutLogKeys.length > 60) {
        workoutLogKeys.slice(0, workoutLogKeys.length - 60).forEach(k => delete userState.workoutLog[k]);
      }
      userState.lastDate = today;
      saveData();
    }

    function computeStreakOnNewDay(today) {
      const yesterday = getDateOffset(today, -1);
      const yHabits = userState.dailyHabits[yesterday];

      if (userState.lastDate === today) return; // Already processed

      if (userState.lastDate === yesterday) {
        // Yesterday exists — check if ALL habits were completed
        if (yHabits && allHabitsComplete(yHabits)) {
          userState.streakCount = (userState.streakCount || 0) + 1;
        } else {
          // Yesterday was not 100% → streak breaks
          userState.streakCount = 0;
        }
      } else if (userState.lastDate) {
        // Skipped one or more days → streak resets to 0
        userState.streakCount = 0;
      }
    }

    function allHabitsComplete(habitsObj) {
      const ids = Object.keys(habitsObj);
      if (ids.length === 0) return false;
      return ids.every(id => habitsObj[id] === true);
    }

    function getDateOffset(dateStr, offset) {
      const d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    }

    function pruneOldHabits() {
      const keys = Object.keys(userState.dailyHabits).sort();
      if (keys.length > 60) {
        keys.slice(0, keys.length - 60).forEach(k => delete userState.dailyHabits[k]);
      }
    }

    // =============================================
    // SOBERANIA (VÍCIOS) ENGINE
    // =============================================
    function getVersiculoDoDia() {
      const today = getTodayKey();
      const dayOfYear = Math.floor((new Date(today + 'T12:00:00') - new Date(today.slice(0, 4) + '-01-01T00:00:00')) / 86400000);
      return VERSICULOS[dayOfYear % VERSICULOS.length];
    }

    function calcTimeSince(isoString) {
      if (!isoString) return null;
      const start = new Date(isoString).getTime();
      const now = Date.now();
      const diff = now - start;
      if (diff < 0) return { days: 0, hours: 0, mins: 0, total: 0 };
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      return { days, hours, mins, total: diff };
    }

    function getVicioLevel(days) {
      if (days < 4) return { label: 'INICIANTE', cls: 'text-gray-500', border: 'border-[#333]' };
      if (days < 7) return { label: 'RESISTÊNCIA', cls: 'text-royal', border: 'border-royal/30' };
      return { label: 'SOBERANO', cls: 'neon-gold', border: 'neon-gold-border' };
    }

    // =============================================
    // SCORE ENGINE
    // =============================================
    function calcDayScore(dateKey) {
      const habits = userState.dailyHabits[dateKey];
      if (!habits) return 0;

      // 70% — mission/habit completion (works with both old 4-habit and new 10-mission system)
      const ids = Object.keys(habits);
      const total = ids.length || 1;
      const done = ids.filter(id => habits[id] === true).length;
      const habitScore = (done / total) * 70;

      // 30% — budget health (daily portion)
      let budgetScore = 30; // default full if no budget set
      const budget = userState.budget || 0;
      if (budget > 0) {
        const mk = dateKey.slice(0, 7);
        const monthExps = userState.monthlyExpenses[mk] || [];
        const daysInMonth = new Date(parseInt(mk.split('-')[0]), parseInt(mk.split('-')[1]), 0).getDate();
        const dailyBudget = budget / daysInMonth;
        const dayExpenses = monthExps.filter(e => e.date === dateKey).reduce((s, e) => s + e.amount, 0);
        const ratio = Math.max(0, Math.min(1, 1 - (dayExpenses / dailyBudget)));
        budgetScore = ratio * 30;
      }

      return Math.round(habitScore + budgetScore);
    }

    function getWeekData() {
      const today = getTodayKey();
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const habits = userState.dailyHabits[dk];
        const score = calcDayScore(dk);
        const ids = habits ? Object.keys(habits) : [];
        const done = habits ? ids.filter(id => habits[id] === true).length : 0;
        const allDone = ids.length > 0 && done === ids.length;
        const dayLabel = new Date(dk + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'short' }).slice(0, 3).toUpperCase();
        days.push({ date: dk, score, done, allDone, dayLabel, isToday: dk === today });
      }
      return days;
    }

      return { text: 'IMPARÁVEL', cls: 'neon-text', bg: 'border-[#00FF64]/30', bgInner: 'rgba(0,255,100,0.05)', icon: '👑' };

    function toggleHabit(id) {
      const today = getTodayKey();
      if (!userState.dailyHabits[today]) return;
      userState.dailyHabits[today][id] = !userState.dailyHabits[today][id];
      haptic(userState.dailyHabits[today][id] ? 30 : 15);
      saveData();
      renderActiveTab();
    }

    function toggleMissao(missionId) {
      const missoes = getMissoesDoDia();
      const m = missoes.find(x => x.id === missionId);
      if (!m) return;
      const wasCompleted = m.concluida;
      m.concluida = !m.concluida;
      haptic(m.concluida ? 40 : 15);

      // XP system: add on complete, remove on uncheck
      if (m.concluida && !wasCompleted) {
        adicionarXP(m.xp);
      } else if (!m.concluida && wasCompleted) {
        if (!userState.xpTotal) userState.xpTotal = 0;
        userState.xpTotal = Math.max(0, userState.xpTotal - m.xp);
      }

      // Sync missions to dailyHabits for score compatibility
      const today = getTodayKey();
      if (!userState.dailyHabits[today]) userState.dailyHabits[today] = {};
      missoes.forEach(mi => {
        userState.dailyHabits[today][mi.id] = mi.concluida;
      });

      saveData();
      renderActiveTab();
    }

      return `

            <!-- BARRA DE PROGRESSO -->

                <span class="text-sm font-black ${pct === 100 ? 'neon-text' : 'text-royal'}">${pct}%</span>
              </div>
              <div class="w-full h-4 bg-black rounded-full overflow-hidden" style="box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);">

    // =============================================
    // WAR CHEST TAB
    // =============================================
    function getMonthExpenses() {
      const mk = getMonthKey();
      if (!userState.monthlyExpenses[mk]) userState.monthlyExpenses[mk] = [];
      return userState.monthlyExpenses[mk];
    }

      const totalGasto = expenses.reduce((s, e) => s + e.amount, 0);

      const saldo = budget - totalGasto;
      const usoPct = budget > 0 ? Math.min(100, Math.round((totalGasto / budget) * 100)) : 0;

      const dopaminaAlert = dopaminaPct > 15;

            ${dopaminaAlert ? `<p class="text-xs font-extrabold text-red-400 mt-3">ALERTA: DOPAMINA BARATA ACIMA DE 15%</p>` : ''}

          <div class="grid grid-cols-3 gap-2">

              <p class="text-lg font-black text-gray-300 mt-1">R$${totalGasto.toLocaleString('pt-BR')}</p>

            <div class="bg-[#111] border border-[#333] rounded-xl p-3 text-center">

                  <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-sm bg-royal"></div>
                    <div>
                      <span class="text-[10px] font-bold text-gray-400">Essencial</span>
                      <p class="text-[9px] font-black text-gray-500">${Math.round((totalEssencial / totalGasto) * 100)}%</p>
                    </div>
                  </div>
                  <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-sm bg-red-500"></div>
                    <div>
                      <span class="text-[10px] font-bold text-gray-400">Dopamina</span>
                      <p class="text-[9px] font-black text-red-400">${Math.round((totalDopamina / totalGasto) * 100)}%</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          ` : ''}

          <!-- Barra de Uso -->
          ${budget > 0 ? `
            <div class="card-neu p-4">
              <div class="flex justify-between mb-2">
                <span class="text-[10px] font-extrabold tracking-widest text-gray-500">USO DO CAPITAL</span>
                <span class="text-xs font-black ${usoPct > 90 ? 'neon-red' : usoPct > 70 ? 'text-yellow-400' : 'text-royal'}">${usoPct}%</span>
              </div>
              <div class="w-full h-3 bg-black rounded-full overflow-hidden neon-bar-track">
                <div class="h-full rounded-full transition-all duration-700 ease-out ${usoPct > 90 ? 'neon-red-bar' : usoPct > 70 ? 'bg-yellow-500' : 'bg-royal'}" style="width:${usoPct}%"></div>
              </div>
            </div>
          ` : ''}

          <!-- Capital de Guerra -->
          <div class="bg-[#111] border border-[#333] rounded-xl p-4">
            <label class="text-[10px] font-extrabold tracking-widest text-gray-500 block mb-2">CAPITAL DE GUERRA (R$)</label>
            <input type="number" id="budgetInput" value="${budget || ''}" placeholder="Ex: 5000"
              class="w-full px-3 py-3 rounded-lg text-sm font-extrabold text-center" style="font-size:18px;"
              onchange="updateBudget(this.value)">
          </div>

          <!-- Input de Gastos -->
          <div class="bg-[#111] border border-[#333] rounded-xl p-4">
            <h3 class="text-sm font-extrabold mb-3 text-gray-300">REGISTRAR GASTO</h3>
            <input type="text" id="expDesc" placeholder="Descrição do gasto"
              class="w-full px-3 py-2.5 rounded-lg text-sm font-semibold mb-2">
            <input type="number" id="expAmount" placeholder="Valor (R$)" step="0.01"
              class="w-full px-3 py-3 rounded-lg text-sm font-extrabold mb-3" style="font-size:16px;">
            <div class="grid grid-cols-2 gap-3">
              <button onclick="addWarExpense('essencial')"
                class="py-3 rounded-xl text-sm font-extrabold border-2 border-[#333] bg-black text-gray-300 hover:border-gray-500 transition-all active:scale-[0.97]">
                <span class="block text-lg mb-0.5">🛡️</span>
                ESSENCIAL
              </button>
              <button onclick="addWarExpense('dopamina')"
                class="btn-dopamina-idle py-3 rounded-xl text-sm font-extrabold border-2 border-red-900/50 bg-red-950/20 text-red-400 hover:border-red-700 transition-all active:scale-[0.97]">
                <span class="block text-lg mb-0.5">💀</span>
                DOPAMINA BARATA
              </button>
            </div>
          </div>

          <!-- GESTOR DE CAPITAL IA -->
          <button onclick="showWarChestAdvisor=true;renderActiveTab();"
            class="w-full py-4 rounded-xl font-extrabold text-sm text-white active:scale-[0.97] transition-transform ${showWarChestAdvisor ? 'hidden' : ''}"
            style="background: linear-gradient(135deg, #1e3a5f 0%, #0a1a2e 50%, #000 100%); border: 1px solid rgba(37,99,235,0.3);">
            <span class="text-lg mr-2">🏦</span> CONSULTAR GESTOR DE CAPITAL — IA
          </button>
          ${renderWarChestAdvisor()}

          <!-- Últimos 5 Registros -->
          ${last5.length > 0 ? `
            <div class="bg-[#111] border border-[#333] rounded-xl p-4">

                <h3 class="text-sm font-extrabold text-gray-300">ÚLTIMOS REGISTROS</h3>
                <button onclick="clearMonthExpenses()" class="text-[10px] font-bold text-gray-600 hover:text-red-400 transition-colors">LIMPAR MÊS</button>
              </div>
              <div class="space-y-2">
                ${last5.map((e, i) => {
                  const isD = e.category === 'dopamina';
                  const realIdx = expenses.length - 1 - i;
                  return `
                    <div class="flex items-center gap-3 p-3 bg-black rounded-xl">
                      <div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs font-black flex-shrink-0 ${isD ? 'bg-red-950 text-red-400 border border-red-900/50' : 'bg-[#1a1a1a] text-gray-500 border border-[#333]'}">
                        ${isD ? 'D' : 'E'}
                      </div>
                      <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold ${isD ? 'text-red-900' : 'text-gray-400'} truncate">${escapeHtml(e.name || 'Sem descrição')}</p>
                        <p class="text-[10px] font-semibold text-gray-700">${e.date || ''}</p>
                      </div>
                      <div class="flex items-center gap-2 flex-shrink-0">
                        <span class="text-sm font-black tabular-nums ${isD ? 'text-red-500' : 'text-gray-400'}">-R$${e.amount.toLocaleString('pt-BR')}</span>
                        <button onclick="removeWarExpense(${realIdx})" class="text-gray-700 hover:text-red-400 p-0.5 transition-colors">
                          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>

              <p class="text-gray-800 text-xs font-semibold mt-1">Mantenha a disciplina.</p>

        </div>
      `;

    function updateBudget(val) {
      userState.budget = parseFloat(val) || 0;
      saveData();
      checkScarcity();
      renderActiveTab();
    }

    function addWarExpense(category) {
      const descEl = document.getElementById('expDesc');
      const amountEl = document.getElementById('expAmount');
      const name = descEl?.value?.trim() || (category === 'essencial' ? 'Gasto Essencial' : 'Dopamina Barata');
      const amount = parseFloat(amountEl?.value);
      if (!amount || amount <= 0) {
        // Highlight input briefly
        if (amountEl) { amountEl.style.borderColor = '#FF3333'; setTimeout(() => amountEl.style.borderColor = '#222', 1000); }
        return;
      }
      const mk = getMonthKey();
      if (!userState.monthlyExpenses[mk]) userState.monthlyExpenses[mk] = [];
      userState.monthlyExpenses[mk].push({ name, amount, category, date: getTodayKey() });
      haptic(category === 'dopamina' ? [50, 30, 50] : 20);
      saveData();
      checkScarcity();
      renderActiveTab();
      showToast(category === 'dopamina' ? 'Dopamina registrada. Fique esperto.' : 'Gasto registrado.');
    }

    function removeWarExpense(index) {
      const mk = getMonthKey();
      const arr = userState.monthlyExpenses[mk];
      if (arr && arr[index] !== undefined) {
        arr.splice(index, 1);
        saveData();
        checkScarcity();
        renderActiveTab();
      }
    }

    function clearMonthExpenses() {
      if (confirm('Limpar todos os gastos deste mês? Isso é irreversível.')) {
        userState.monthlyExpenses[getMonthKey()] = [];
        saveData();
        renderActiveTab();
      }
    }

    async function askWarChestMentor() {
      const input = document.getElementById('warChestMentorInput');
      const question = input ? input.value.trim() : '';
      if (!question) return;
      warChestChat.push({ role: 'user', text: question });
      input.value = '';
      renderActiveTab();
      const scrollWC = () => setTimeout(() => {
        const el = document.getElementById('warChestMentorMessages');
        if (el) el.scrollTop = el.scrollHeight;
      }, 100);
      scrollWC();
      try {
        // Build financial context snapshot
        const expenses = getMonthExpenses();
        const totalGasto = expenses.reduce((s, e) => s + e.amount, 0);
        const totalDopamina = expenses.filter(e => e.category === 'dopamina').reduce((s, e) => s + e.amount, 0);
        const budget = userState.budget || 0;
        const saldo = budget - totalGasto;
        const ctx = budget > 0
          ? `[Contexto financeiro do mês: Budget R$${budget}, Gasto total R$${totalGasto}, Saldo R$${saldo}, Dopamina R$${totalDopamina} (${budget > 0 ? ((totalDopamina/budget)*100).toFixed(1) : 0}% do budget)]\n\n`
          : '';
        // Multi-turn history: send PREVIOUS messages only (exclude current question)
        // The backend will add ctx+question as the final user message via prompt
        const previousMessages = warChestChat.slice(0, -1);
        const historico = previousMessages.length > 0
          ? previousMessages.map(m => ({
              role: m.role === 'user' ? 'user' : 'model',
              text: m.text
            }))
          : null;
        const resp = await callGemini(ctx + question, null, null, historico, 'war_chest');
        warChestChat.push({ role: 'ai', text: resp });
      } catch (e) {
        console.error('ERRO GESTOR IA:', e);
        warChestChat.push({ role: 'ai', text: 'Conexão falhou. Proteja seu capital.' });
      }
      renderActiveTab();
      scrollWC();
    }

    function renderWarChestAdvisor() {
      if (!showWarChestAdvisor) return '';
      return `
        <div class="card-neu rounded-xl p-4 space-y-3" style="border: 1px solid rgba(37,99,235,0.2);">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm" style="background: linear-gradient(135deg, #1e3a5f, #0a0a0a); border: 1px solid rgba(37,99,235,0.3);">🏦</div>
              <div>
                <p class="text-xs font-extrabold text-blue-400">GESTOR DE CAPITAL</p>
                <p class="text-[9px] font-bold text-gray-600">Gemini AI — Modo Banqueiro</p>
              </div>
            </div>
            <button onclick="showWarChestAdvisor=false;renderActiveTab();" class="min-w-[44px] min-h-[44px] flex items-center justify-center text-gray-600 hover:text-red-400 rounded-xl active:bg-white/5">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>

          <div id="warChestMentorMessages" class="space-y-3 max-h-96 overflow-y-auto" style="scrollbar-width: thin; scrollbar-color: #1e3a5f #000;">
            ${warChestChat.length === 0 ? `
              <div class="text-center py-4">
                <p class="text-sm font-bold text-gray-600">Pergunte sobre investimentos, alocação, juros compostos...</p>
              </div>
            ` : warChestChat.map(msg => `

    // =============================================
    // TREINO (ATLAS) MODULE
    // =============================================
    function getTodayWorkoutDay() {
      return WORKOUT_DAYS[new Date().getDay()];
    }

    function getWorkoutLog(dateKey) {
      if (!userState.workoutLog[dateKey]) {
        userState.workoutLog[dateKey] = { exercises: {}, finalized: false };
      }
      return userState.workoutLog[dateKey];
    }

    function toggleExerciseDone(exerciseId) {
      const today = getTodayKey();
      const log = getWorkoutLog(today);
      if (!log.exercises[exerciseId]) {
        log.exercises[exerciseId] = { done: false, load: 0 };
      }
      log.exercises[exerciseId].done = !log.exercises[exerciseId].done;
      haptic(log.exercises[exerciseId].done ? 40 : 15);
      if (log.exercises[exerciseId].done) startRestTimer(90);
      saveData();
      renderActiveTab();
    }

    function updateExerciseLoad(exerciseId, val) {
      const today = getTodayKey();
      const log = getWorkoutLog(today);
      const load = parseFloat(val) || 0;
      if (!log.exercises[exerciseId]) {
        log.exercises[exerciseId] = { done: false, load: 0 };
      }
      log.exercises[exerciseId].load = load;

      // Update load history and PR
      if (!userState.workoutLoads[exerciseId]) {
        userState.workoutLoads[exerciseId] = { lastLoad: 0, pr: 0 };
      }
      if (load > 0) {
        userState.workoutLoads[exerciseId].lastLoad = load;
        if (load > userState.workoutLoads[exerciseId].pr) {
          userState.workoutLoads[exerciseId].pr = load;
        }
      }
      saveData();
    }

    function finalizeWorkout() {
      const today = getTodayKey();
      const log = getWorkoutLog(today);
      log.finalized = true;

      // Auto-mark 'Treino de Força' habit as done
      if (userState.dailyHabits[today]) {
        userState.dailyHabits[today].workout = true;
      }

      stopRestTimer();
      haptic([100, 50, 100, 50, 100]);
      saveData();
      renderActiveTab();
      showToast('TREINO FINALIZADO. Hábito marcado.');
    }

    function selectWorkoutDay(day) {
      selectedWorkoutDay = day;
      renderActiveTab();
    }

    function submitNovaCampanha() {
      const ex = document.getElementById('campExercicio')?.value?.trim();
      const prAtual = document.getElementById('campPRAtual')?.value;
      const prObj = document.getElementById('campPRObj')?.value;
      if (!ex || !prAtual || !prObj) { showToast('Preencha todos os campos.', 2500); return; }
      if (parseFloat(prObj) <= parseFloat(prAtual)) { showToast('O objetivo deve ser maior que o PR atual.', 2500); return; }
      showCampaignModal = false;
      iniciarCampanhaPR(ex, prAtual, prObj);

                        ${!isToday && loadHistory.pr > 0 ? `<p class="text-xs font-bold text-gray-700 mt-0.5">PR: ${loadHistory.pr}kg</p>` : ''}
                        ${history.length > 0 ? `
                          <div id="history-${ex.id}" class="hidden mt-1.5 space-y-0.5">

                      <div class="text-center">

                        ${isToday ? `
                          <input type="number" value="${currentLoad || ''}" placeholder="—"
                            class="w-14 px-1 py-2 rounded-lg text-center text-sm font-black workout-load forja-input min-h-[40px]"
                            onchange="updateExerciseLoad('${ex.id}', this.value)">
                        ` : `
                          <span class="workout-load text-sm font-black ${loadHistory.lastLoad > 0 ? 'text-gray-400' : 'text-gray-700'}">${loadHistory.lastLoad > 0 ? loadHistory.lastLoad : '—'}</span>

                      </div>
                      <div class="flex justify-center">
                        ${isToday ? `
                          <button onclick="toggleExerciseDone('${ex.id}')"
                            class="w-8 h-8 rounded-lg border-2 flex items-center justify-center transition-all active:scale-90 min-w-[44px] min-h-[44px] ${isDone ? 'bg-[#00FF64] border-[#00FF64]' : 'border-[#444] hover:border-gray-400'}">
                            ${isDone ? '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="black" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}

              </div>

              ${isToday && !isFinalized ? `
                <button onclick="finalizeWorkout()"
                  class="w-full py-4 rounded-2xl ${doneCount === totalExercises && doneCount > 0 ? 'btn-royal' : 'bg-[#111] border-2 border-[#333]'} text-white font-extrabold text-base tracking-wider min-h-[52px] active:scale-[0.97] transition-all">
                  ${doneCount === totalExercises && doneCount > 0 ? 'FINALIZAR TREINO' : `FINALIZAR TREINO (${doneCount}/${totalExercises})`}
                </button>
              ` : ''}

              ${isFinalized ? `
                <div class="rounded-2xl p-6 text-center border border-[#00FF64]/30" style="background: rgba(0,255,100,0.05); box-shadow: 0 0 30px rgba(0,255,100,0.1);">

                  <p class="neon-text font-black text-2xl tracking-wide">TREINO CONCLUÍDO</p>

        </div>
        ${renderCampaignModal()}

    }

    // =============================================
    // DEEP WORK — BIBLIOTECA DE ALEXANDRIA
    // =============================================
    let focusInterval = null;
    let focusStartTime = null;
    let focusImmersive = false;
    let restTimerInterval = null;
    let restTimerSeconds = 0;
    let extremeFocusMode = false;
    let deepWorkTopic = '';
    let showFeynmanModal = false;
    let feynmanElapsed = 0;
    let deepWorkSubTab = 'timer'; // 'timer' or 'arquivo'
    let studyMentorChat = [];
    let showStudyMentor = false;
    let warChestChat = [];
    let showWarChestAdvisor = false;

    function getTodayFocus() {
      const today = getTodayKey();
      if (!userState.focusSessions[today]) {
        userState.focusSessions[today] = { totalSeconds: 0, sessions: [] };
      }
      return userState.focusSessions[today];
    }

    function formatFocusTime(totalSec) {
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function getRandomFocusPhrase() {
      return FOCUS_PHRASES[Math.floor(Math.random() * FOCUS_PHRASES.length)];
    }

    function getStudyLogs() {
      if (!userState.studyLogs) userState.studyLogs = [];
      return userState.studyLogs;
    }

    function promptStudyTopic() {
      const input = document.getElementById('studyTopicInput');
      const topic = input ? input.value.trim() : '';
      if (!topic) { showToast('Digite o foco do estudo.', 2500); return; }
      deepWorkTopic = topic;
      focusStartTime = Date.now();
      focusImmersive = true;
      studyMentorChat = [];
      showStudyMentor = false;
      renderActiveTab();
      showImmersiveOverlay();
      startFocusTicker();
    }

    function startFocusSession() {
      // If no topic set, just start without one (backward compat)
      if (!deepWorkTopic) deepWorkTopic = 'Foco Livre';
      focusStartTime = Date.now();
      focusImmersive = true;
      studyMentorChat = [];
      renderActiveTab();
      showImmersiveOverlay();
      startFocusTicker();
    }

    function startFocusTicker() {
      if (focusInterval) clearInterval(focusInterval);
      focusInterval = setInterval(() => {
        if (!focusStartTime) return;
        const elapsed = Math.floor((Date.now() - focusStartTime) / 1000);
        const imTimer = document.getElementById('focusImmersiveTimer');
        if (imTimer) imTimer.textContent = formatFocusTime(elapsed);
        const phEl = document.getElementById('focusPhrase');
        if (phEl && elapsed > 0 && elapsed % 60 === 0) {
          phEl.textContent = getRandomFocusPhrase();
          phEl.style.opacity = '0';
          setTimeout(() => { if (phEl) phEl.style.opacity = '1'; }, 50);
        }
        const tabTimer = document.getElementById('focusTabTimer');
        if (tabTimer) tabTimer.textContent = formatFocusTime(elapsed);
        // Update topic display
        const topicEl = document.getElementById('immersiveTopic');
        if (topicEl && deepWorkTopic) topicEl.textContent = deepWorkTopic;
      }, 1000);
    }

    function endFocusSession() {
      if (!focusStartTime) return;
      const elapsed = Math.floor((Date.now() - focusStartTime) / 1000);
      feynmanElapsed = elapsed;
      if (elapsed > 0) {
        const todayFocus = getTodayFocus();
        todayFocus.totalSeconds += elapsed;
        todayFocus.sessions.push({
          start: new Date(focusStartTime).toISOString(),
          durationSec: elapsed,
          topic: deepWorkTopic || 'Foco Livre',
        });
        saveData();
      }
      focusStartTime = null;
      focusImmersive = false;
      if (focusInterval) { clearInterval(focusInterval); focusInterval = null; }
      removeImmersiveOverlay();
      // Show Feynman modal if session was > 2 min
      if (elapsed >= 120) {
        showFeynmanModal = true;
      } else {
        const mins = Math.floor(elapsed / 60);
        showToast(`Sessão curta: ${mins}m registrados.`, 2500);
      }
      renderActiveTab();
    }

    function submitFeynmanReport() {
      const textarea = document.getElementById('feynmanTextarea');
      const resumo = textarea ? textarea.value.trim() : '';
      if (!resumo) { showToast('Escreva o que você absorveu.', 2500); return; }
      const logs = getStudyLogs();
      const xpGanho = Math.max(1, Math.floor(feynmanElapsed / 120)); // 1 XP per 2 min
      const bonusFeynman = 10; // bonus for writing the report
      logs.push({
        id: 'study_' + Date.now(),
        data: getTodayKey(),
        hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
        tema: deepWorkTopic || 'Foco Livre',
        tempoSeg: feynmanElapsed,
        resumo,
        xp: xpGanho + bonusFeynman,
      });
      userState.studyLogs = logs;
      adicionarXP(xpGanho + bonusFeynman);
      saveData();
      showFeynmanModal = false;
      deepWorkTopic = '';
      feynmanElapsed = 0;
      showToast(`DOSSIÊ REGISTRADO! +${xpGanho + bonusFeynman} XP`, 4000);
      haptic([60, 30, 60]);
      renderActiveTab();
    }

    function skipFeynmanReport() {
      const xpGanho = Math.max(1, Math.floor(feynmanElapsed / 120));
      adicionarXP(xpGanho);
      showFeynmanModal = false;
      deepWorkTopic = '';
      feynmanElapsed = 0;
      showToast(`Sessão salva. +${xpGanho} XP (sem bônus Feynman)`, 3000);
      renderActiveTab();
    }

    async function askStudyMentor() {
      const input = document.getElementById('studyMentorInput');
      const question = input ? input.value.trim() : '';
      if (!question) return;
      studyMentorChat.push({ role: 'user', text: question });
      input.value = '';
      renderActiveTab();
      // Scroll to bottom
      const scrollMentor = () => setTimeout(() => {
        const chatEl = document.getElementById('studyMentorMessages');
        if (chatEl) chatEl.scrollTop = chatEl.scrollHeight;
      }, 100);
      scrollMentor();
      try {
        const tema = deepWorkTopic || 'estudo geral';
        // Multi-turn history: send PREVIOUS messages only (exclude current question)
        const previousMessages = studyMentorChat.slice(0, -1);
        const historico = previousMessages.length > 0
          ? previousMessages.map(m => ({
              role: m.role === 'user' ? 'user' : 'model',
              text: m.text
            }))
          : null;
        const resp = await callGemini(question, null, tema, historico);
        studyMentorChat.push({ role: 'ai', text: resp });
      } catch (e) {
        console.error('ERRO PROFESSOR IA:', e);
        studyMentorChat.push({ role: 'ai', text: 'Conexão falhou. Continue estudando, guerreiro.' });
      }
      renderActiveTab();
      scrollMentor();
    }

        </div>
      `;
      document.body.appendChild(overlay);

    function renderFeynmanModal() {
      if (!showFeynmanModal) return '';
      const mins = Math.floor(feynmanElapsed / 60);

    function getWeekScores() {
      const today = getTodayKey();
      const result = [];
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const score = calcDayScore(dk);
        const dayLabel = new Date(dk + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'short' }).slice(0, 3).toUpperCase();
        const isToday = dk === today;
        result.push({ date: dk, score, dayLabel, isToday });
      }
      return result;
    }

    function getWeekAvgScore() {
      const scores = getWeekScores();
      const total = scores.reduce((s, d) => s + d.score, 0);
      return Math.round(total / scores.length);
    }

    function getWeekFocusHours() {
      const today = getTodayKey();
      let totalSec = 0;
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const fs = userState.focusSessions[dk];
        if (fs) totalSec += fs.totalSeconds;
      }
      return (totalSec / 3600).toFixed(1);
    }

    function getWeekHabitRate() {
      const today = getTodayKey();
      let totalPossible = 0;
      let totalDone = 0;
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const habits = userState.dailyHabits[dk];
        if (habits) {
          const dayIds = Object.keys(habits);
          totalPossible += dayIds.length;
          totalDone += dayIds.filter(id => habits[id] === true).length;
        }
      }
      return totalPossible > 0 ? Math.round((totalDone / totalPossible) * 100) : 0;
    }

    function getMonthFinancials() {
      const mk = getMonthKey();
      const expenses = userState.monthlyExpenses[mk] || [];
      const totalGasto = expenses.reduce((s, e) => s + e.amount, 0);
      const totalDopamina = expenses.filter(e => e.category === 'dopamina').reduce((s, e) => s + e.amount, 0);
      const totalEssencial = expenses.filter(e => e.category === 'essencial').reduce((s, e) => s + e.amount, 0);
      const budget = userState.budget || 0;
      const saldo = budget - totalGasto;
      return { totalGasto, totalDopamina, totalEssencial, budget, saldo };
    }

    function compressAndConvert(file, maxSize, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxSize || h > maxSize) {
              const ratio = Math.min(maxSize / w, maxSize / h);
              w = Math.round(w * ratio);
              h = Math.round(h * ratio);
            }
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            // Strip "data:image/jpeg;base64," prefix
            resolve(dataUrl.split(',')[1]);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const msg = input?.value?.trim();
      if (!msg) return;

      // Add user message
      userState.chatHistory.push({ role: 'user', content: msg });
      input.value = '';
      saveData();
      renderActiveTab();
      scrollChat();

      // Gemini AI mode
      try {
        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) sendBtn.textContent = '...';

        // Build conversation context for Gemini
        const recentChat = userState.chatHistory.slice(-10).map(m =>
          `${m.role === 'user' ? 'SOLDADO' : 'MENTOR'}: ${m.content}`
        ).join('\n');

        const prompt = `Histórico recente:\n${recentChat}\n\nResponda a última mensagem do SOLDADO de forma direta, concisa (máx 3 frases). Seja implacável e motivador.`;

        const reply = await callGemini(prompt, 200);
        userState.chatHistory.push({ role: 'assistant', content: reply });
      } catch (err) {
        console.error('Gemini sendChat error:', err);
        userState.chatHistory.push({ role: 'assistant', content: 'Erro de conexão com Gemini. Tente novamente.' });

      saveData();
      renderActiveTab();
      scrollChat();

      return `
