<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Unstoppable">
  <meta name="application-name" content="Unstoppable Clone">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-TileColor" content="#000000">
  <meta name="msapplication-tap-highlight" content="no">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%23000'/><text x='90' y='122' font-size='100' text-anchor='middle' fill='%232563EB' font-family='Arial' font-weight='900'>U</text></svg>">
  <title>BE UNSTOPPABLE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            royal: '#2563EB',
            emerald: '#10B981',
            card: '#111111',
            border: '#222222',
            dark: '#000000',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* ===== BASE & MOBILE UX ===== */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html { overscroll-behavior-y: contain; -webkit-overflow-scrolling: touch; }
    body { font-family: 'Inter', system-ui, sans-serif; overscroll-behavior: none; touch-action: manipulation; -webkit-text-size-adjust: 100%; overscroll-behavior-y: contain; }
    a, button, input, select, textarea, [onclick] { touch-action: manipulation; }
    input[type="text"], input[type="number"], input[type="password"], textarea, select { font-size: 16px !important; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

    /* ===== NEUMORPHIC CARD SYSTEM ===== */
    .card-neu {
      background: #111;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 16px;
      box-shadow: 8px 8px 20px rgba(0,0,0,0.6), -4px -4px 12px rgba(255,255,255,0.02), inset 0 1px 0 rgba(255,255,255,0.03);
      transition: all 0.3s cubic-bezier(.4,0,.2,1);
    }
    .card-neu:hover { box-shadow: 8px 8px 24px rgba(0,0,0,0.7), -4px -4px 14px rgba(255,255,255,0.03), inset 0 1px 0 rgba(255,255,255,0.04); }
    .card-inner {
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: 12px;
      box-shadow: inset 2px 2px 6px rgba(0,0,0,0.5), inset -1px -1px 4px rgba(255,255,255,0.02);
    }

    /* ===== TAB TRANSITIONS ===== */
    .tab-enter { animation: tabIn 0.3s cubic-bezier(.4,0,.2,1); }
    @keyframes tabIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    #mainContent { transition: opacity 0.15s ease; }

    /* ===== HABIT SYSTEM ===== */
    .habit-check { transition: all 0.3s cubic-bezier(.4,0,.2,1); }
    .habit-check.done {
      background: rgba(0, 255, 100, 0.06) !important;
      border-color: #00FF64 !important;
      box-shadow: 0 0 18px rgba(0,255,100,0.2), inset 0 0 15px rgba(0,255,100,0.05) !important;
    }
    .habit-icon-ring { transition: all 0.3s ease; }
    .habit-icon-ring.done { box-shadow: 0 0 14px rgba(0,255,100,0.4); }
    .streak-fire { display: inline-block; animation: firePulse 1.5s ease-in-out infinite; }
    @keyframes firePulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.15); filter: brightness(1.3); }
    }

    /* ===== NEON SYSTEM ===== */
    .neon-text { color: #00FF64; text-shadow: 0 0 8px rgba(0,255,100,0.6), 0 0 20px rgba(0,255,100,0.3); }
    .neon-bar { background: linear-gradient(90deg, #00FF64, #10B981); box-shadow: 0 0 12px rgba(0,255,100,0.4), 0 0 4px rgba(0,255,100,0.2); }
    .neon-bar-track { box-shadow: inset 0 0 8px rgba(0,0,0,0.9); }
    .neon-red { color: #FF3333; text-shadow: 0 0 10px rgba(255,50,50,0.7), 0 0 25px rgba(255,50,50,0.4); }
    .neon-red-glow { box-shadow: 0 0 20px rgba(255,50,50,0.3), inset 0 0 15px rgba(255,50,50,0.05) !important; border-color: #FF3333 !important; }
    .neon-red-bar { background: linear-gradient(90deg, #FF3333, #cc0000); box-shadow: 0 0 12px rgba(255,50,50,0.5); }
    @keyframes redPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(255,50,50,0.3); }
      50% { opacity: 0.85; box-shadow: 0 0 35px rgba(255,50,50,0.5); }
    }
    .red-pulse { animation: redPulse 2s ease-in-out infinite; }
    .neon-yellow { color: #FACC15; text-shadow: 0 0 8px rgba(250,204,21,0.5), 0 0 20px rgba(250,204,21,0.25); }
    .neon-gold { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6), 0 0 20px rgba(255,215,0,0.3); }
    .neon-gold-border { border-color: rgba(255,215,0,0.3) !important; box-shadow: 0 0 12px rgba(255,215,0,0.1); }

    /* ===== GLOW BUTTONS ===== */
    .btn-royal {
      background: linear-gradient(135deg, #2563EB, #1d4ed8);
      transition: all 0.2s ease;
      box-shadow: 0 2px 12px rgba(37,99,235,0.3);
    }
    .btn-royal:hover { box-shadow: 0 4px 20px rgba(37,99,235,0.5); }
    .btn-royal:active { transform: scale(0.97); box-shadow: 0 1px 6px rgba(37,99,235,0.3); }
    .btn-glow-green {
      box-shadow: 0 0 15px rgba(0,255,100,0.3), 0 0 40px rgba(0,255,100,0.1);
      border-color: #00FF64 !important;
    }

    /* ===== SCORE RING ===== */
    .score-ring { background: conic-gradient(var(--ring-color) calc(var(--score) * 3.6deg), #1a1a1a 0deg); border-radius: 50%; }
    .bar-grow { animation: barGrow 0.6s ease-out forwards; }
    @keyframes barGrow { from { height: 0; } }

    /* ===== TIMERS ===== */
    .mono-timer { font-family: 'Courier New', 'Consolas', monospace; font-variant-numeric: tabular-nums; letter-spacing: 1px; }

    /* ===== SOBERANIA ===== */
    .sobriety-card { transition: all 0.3s cubic-bezier(.4,0,.2,1); }
    .sobriety-card:hover { border-color: #444 !important; transform: translateY(-1px); }
    .sobriety-card.streak-glow {
      box-shadow: 0 0 20px rgba(0,255,100,0.15), 0 0 40px rgba(0,255,100,0.05), inset 0 0 20px rgba(0,255,100,0.03);
      border-color: rgba(0,255,100,0.3) !important;
    }
    .verse-glow {
      background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(0,0,0,0));
      border-color: rgba(37,99,235,0.2) !important;
    }

    /* ===== NAV ===== */
    .nav-btn { transition: all 0.2s ease; }
    .nav-btn.active svg { stroke: #2563EB; filter: drop-shadow(0 0 4px rgba(37,99,235,0.4)); }
    .nav-btn.active span { color: #2563EB; }
    nav.nav-hidden { transform: translateY(100%); transition: transform 0.3s ease; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* ===== INPUTS ===== */
    input, textarea, select {
      background: #0d0d0d !important;
      border: 1px solid #1a1a1a !important;
      color: #fff !important;
      outline: none !important;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4), inset -1px -1px 3px rgba(255,255,255,0.02);
      transition: all 0.2s ease;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #2563EB !important;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4), 0 0 8px rgba(37,99,235,0.2);
    }

    /* ===== FOCUS MODULE ===== */
    .focus-pulse { animation: focusPulse 2s ease-in-out infinite; }
    @keyframes focusPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(37,99,235,0.3), 0 0 60px rgba(37,99,235,0.1); }
      50% { box-shadow: 0 0 40px rgba(37,99,235,0.6), 0 0 100px rgba(37,99,235,0.2); }
    }
    .focus-timer-text { font-family: 'Courier New', 'Consolas', monospace; font-variant-numeric: tabular-nums; letter-spacing: 3px; }
    .focus-immersive {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.96);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .focus-ring-active { border: 3px solid #2563EB; animation: focusRingSpin 4s linear infinite; }
    @keyframes focusRingSpin {
      0% { border-color: #2563EB; box-shadow: 0 0 30px rgba(37,99,235,0.3); }
      33% { border-color: #3b82f6; box-shadow: 0 0 40px rgba(59,130,246,0.4); }
      66% { border-color: #1d4ed8; box-shadow: 0 0 30px rgba(29,78,216,0.3); }
      100% { border-color: #2563EB; box-shadow: 0 0 30px rgba(37,99,235,0.3); }
    }
    .focus-scanline {
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(37,99,235,0.03) 2px, rgba(37,99,235,0.03) 4px);
    }

    /* ===== TREINO MODULE ===== */
    .workout-load { font-family: 'Courier New', 'Consolas', monospace; font-variant-numeric: tabular-nums; }
    .pr-glow { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.6), 0 0 20px rgba(255,215,0,0.3); animation: prPulse 1.5s ease-in-out infinite; }
    @keyframes prPulse {
      0%, 100% { text-shadow: 0 0 8px rgba(255,215,0,0.6); }
      50% { text-shadow: 0 0 16px rgba(255,215,0,0.9), 0 0 30px rgba(255,215,0,0.4); }
    }
    .pr-badge { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05)); border: 1px solid rgba(255,215,0,0.3); color: #FFD700; }
    .day-selector-btn { transition: all 0.15s ease; }
    .day-selector-btn.active-day { background: #2563EB !important; color: white !important; border-color: #2563EB !important; box-shadow: 0 0 10px rgba(37,99,235,0.3); }
    .exercise-row { transition: all 0.3s ease; }
    .exercise-row.done-exercise { opacity: 0.45; }
    .exercise-row.done-exercise .exercise-name { text-decoration: line-through; }
    .rest-timer-bar { height: 3px; background: #2563EB; transition: width 1s linear; border-radius: 2px; box-shadow: 0 0 6px rgba(37,99,235,0.4); }

    /* ===== STATUS MODULE ===== */
    .status-bar { transition: height 0.6s ease-out; border-radius: 4px 4px 0 0; }
    .status-metric-card { background: #111; border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; transition: all 0.2s ease; box-shadow: 4px 4px 12px rgba(0,0,0,0.5), -2px -2px 6px rgba(255,255,255,0.02); }
    .verdict-card { border-radius: 16px; position: relative; overflow: hidden; }
    .verdict-card::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.01) 3px, rgba(255,255,255,0.01) 6px); pointer-events: none; }

    /* ===== PIE CHART ===== */
    .pie-chart {
      width: 120px; height: 120px; border-radius: 50%;
      background: conic-gradient(var(--ess-color, #2563EB) 0deg calc(var(--ess-pct, 50) * 3.6deg), var(--dop-color, #FF3333) calc(var(--ess-pct, 50) * 3.6deg) 360deg);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.6), 0 0 15px rgba(0,0,0,0.4);
    }

    /* ===== SCARCITY VIGNETTE ===== */
    .scarcity-vignette::after {
      content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.08) 100%);
      animation: vignetteBreath 3s ease-in-out infinite;
    }
    @keyframes vignetteBreath {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ===== RECAIDA OVERLAY ===== */
    .recaida-overlay {
      position: fixed; inset: 0; z-index: 70;
      background: rgba(0,0,0,0.95);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }

    /* ===== TERMINAL & AI (v3.0) ===== */
    .terminal-output {
      background: #050505;
      border: 1px solid rgba(0,255,100,0.12);
      border-radius: 12px;
      padding: 16px;
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 11px;
      color: #00FF64;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 10px rgba(0,255,100,0.05);
    }
    .terminal-output::before {
      content: '> UNSTOPPABLE v3.0 — TERMINAL DE GUERRA';
      display: block;
      color: rgba(0,255,100,0.4);
      font-size: 9px;
      letter-spacing: 2px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(0,255,100,0.08);
    }
    .ai-verdict-card {
      background: linear-gradient(135deg, rgba(255,50,50,0.04), rgba(0,0,0,0));
      border: 1px solid rgba(255,50,50,0.15);
      border-radius: 16px;
      box-shadow: 8px 8px 20px rgba(0,0,0,0.6), -4px -4px 12px rgba(255,255,255,0.02);
    }
    .ai-loading { animation: aiPulse 1.5s ease-in-out infinite; }
    @keyframes aiPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .stagnation-tag { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #FF3333; }

    /* ===== AUTH SCREEN ===== */
    .auth-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .auth-card {
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 20px;
      box-shadow: 12px 12px 30px rgba(0,0,0,0.8), -6px -6px 20px rgba(255,255,255,0.02), 0 0 60px rgba(37,99,235,0.05);
    }
    .auth-input {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      background: #050505 !important; border: 1px solid #222 !important;
      color: #fff; font-size: 16px !important; font-weight: 600;
      outline: none; transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: #2563EB !important; box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
    .auth-input::placeholder { color: #444; }
    .auth-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      background: #2563EB; color: #fff; font-weight: 800; font-size: 14px;
      letter-spacing: 0.1em; border: none; cursor: pointer;
      transition: all 0.2s; text-transform: uppercase;
    }
    .auth-btn:hover { background: #1d4ed8; }
    .auth-btn:active { transform: scale(0.97); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-divider { display: flex; align-items: center; gap: 12px; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: #222; }
    .sync-indicator {
      position: fixed; top: 12px; right: 12px; z-index: 90;
      width: 8px; height: 8px; border-radius: 50%;
      transition: background 0.3s;
    }
    .sync-indicator.synced { background: #10B981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
    .sync-indicator.syncing { background: #F59E0B; animation: aiPulse 1s infinite; }
    .sync-indicator.error { background: #EF4444; }

    /* ===== PWA INSTALL BANNER ===== */
    .install-banner {
      position: fixed; bottom: 72px; left: 16px; right: 16px; z-index: 55;
      background: #111; border: 1px solid #2563EB; border-radius: 16px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 -4px 30px rgba(37,99,235,0.15), 0 4px 20px rgba(0,0,0,0.6);
      animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @supports (padding-bottom: env(safe-area-inset-bottom)) { nav { padding-bottom: env(safe-area-inset-bottom); } }
  </style>
</head>
<body class="bg-dark text-white min-h-screen flex flex-col select-none">

  <!-- ========== AUTH SCREEN ========== -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card w-full max-w-sm mx-4 p-8">
      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-black border border-[#222] flex items-center justify-center">
          <span class="text-3xl font-black text-royal">U</span>
        </div>
        <h1 class="text-2xl font-black tracking-tight">BE <span class="text-royal">UNSTOPPABLE</span></h1>
        <p class="text-xs font-bold text-gray-600 mt-1 tracking-widest">v3.0 — SISTEMA DE GUERRA</p>
      </div>

      <!-- Auth Error -->
      <div id="authError" class="hidden mb-4 p-3 rounded-xl bg-red-950/30 border border-red-900/30">
        <p id="authErrorText" class="text-xs font-bold text-red-400 text-center"></p>
      </div>

      <!-- Auth Form -->
      <div class="space-y-3">
        <input type="email" id="authEmail" class="auth-input" placeholder="Email de guerra" autocomplete="email">
        <input type="password" id="authPassword" class="auth-input" placeholder="Senha (mín. 6 caracteres)" autocomplete="current-password">
      </div>

      <div class="space-y-3 mt-5">
        <button id="btnLogin" onclick="handleLogin()" type="button" class="auth-btn">ENTRAR NA BATALHA</button>
        <div class="auth-divider">
          <span class="text-[10px] font-bold text-gray-600 tracking-widest">OU</span>
        </div>
        <button id="btnSignup" onclick="handleSignup()" type="button"
          class="w-full py-3.5 rounded-xl bg-[#111] border border-[#333] text-gray-300 font-extrabold text-sm tracking-wider hover:border-royal hover:text-royal transition-all active:scale-[0.97] cursor-pointer">
          CRIAR CONTA DE GUERREIRO
        </button>
      </div>

      <!-- Loading state -->
      <div id="authLoading" class="hidden mt-4 text-center">
        <p class="text-xs font-bold text-royal ai-loading">Conectando ao servidor...</p>
      </div>

      <p class="text-[9px] text-gray-700 text-center mt-6">Seus dados são sincronizados na nuvem via Supabase.</p>
    </div>
  </div>

  <!-- ========== SYNC INDICATOR ========== -->
  <div id="syncIndicator" class="sync-indicator synced" title="Cloud Sync"></div>

  <!-- ========== HEADER ========== -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-md border-b border-border px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-extrabold tracking-tight">BE <span class="text-royal">UNSTOPPABLE</span></h1>
    <div class="flex items-center gap-3">
      <time id="headerDate" class="text-xs text-gray-500 font-semibold tabular-nums"></time>
      <button onclick="handleLogout()" title="Sair" class="text-gray-600 hover:text-red-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </div>
  </header>

  <!-- ========== MAIN CONTENT ========== -->
  <main id="mainContent" class="flex-1 mt-14 mb-20 px-4 py-4 overflow-y-auto">
    <!-- Dynamic content rendered here -->
  </main>

  <!-- ========== BOTTOM NAV ========== -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-md border-t border-border">
    <div class="flex justify-around items-center py-2 max-w-lg mx-auto">
      <button class="nav-btn flex flex-col items-center gap-0.5 px-1.5 py-1" onclick="switchTab('dashboard')">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        <span class="text-[9px] font-bold">Home</span>

    // =============================================
    // CLOUD SYNC (Supabase user_data table)
    // =============================================
    // Table schema:
    //   user_data (
    //     id UUID REFERENCES auth.users(id) PRIMARY KEY,
    //     app_state JSONB NOT NULL DEFAULT '{}',
    //     updated_at TIMESTAMPTZ DEFAULT now()
    //   )

    function setSyncStatus(status) {
      const el = document.getElementById('syncIndicator');
      el.className = 'sync-indicator ' + status;
    }

    async function cloudSave() {
      if (!currentUser || isSyncing) return;
      isSyncing = true;
      setSyncStatus('syncing');
      try {
        const { error } = await supabase
          .from('user_data')
          .upsert({
            id: currentUser.id,
            app_state: userState,
            updated_at: new Date().toISOString()
          }, { onConflict: 'id' });
        if (error) throw error;
        setSyncStatus('synced');
      } catch (err) {
        console.error('Cloud save error:', err);
        setSyncStatus('error');
      }
      isSyncing = false;
    }

    async function cloudLoad() {
      if (!currentUser) return;
      setSyncStatus('syncing');
      try {
        const { data, error } = await supabase
          .from('user_data')
          .select('app_state')
          .eq('id', currentUser.id)
          .single();

        if (error && error.code === 'PGRST116') {
          // No row found — new user, INSERT default state
          console.log('New user — creating cloud record');
          const { error: insertError } = await supabase
            .from('user_data')
            .insert({ id: currentUser.id, app_state: userState });
          if (insertError) throw insertError;
          // Also save to localStorage
          localStorage.setItem('unstoppable_state', JSON.stringify(userState));
          setSyncStatus('synced');
          return;
        }
        if (error) throw error;

        if (data && data.app_state) {
          // Cloud data found — merge into userState
          const cloudState = data.app_state;
          userState = { ...userState, ...cloudState };
          localStorage.setItem('unstoppable_state', JSON.stringify(userState));
        }
        setSyncStatus('synced');
      } catch (err) {
        console.error('Cloud load error:', err);
        setSyncStatus('error');
        // Fall back to localStorage silently
      }
    }

    // Debounced cloud sync — fires 2s after last saveData() call
    function scheduleCloudSync() {
      if (syncTimeout) clearTimeout(syncTimeout);
      syncTimeout = setTimeout(cloudSave, 2000);
    }

    function getTodayKey() {
      return new Date().toISOString().split('T')[0];
    }

    function getMonthKey() {
      return getTodayKey().slice(0, 7); // "2026-03"

    function saveData() {
      localStorage.setItem('unstoppable_state', JSON.stringify(userState));
      // Trigger debounced cloud sync if logged in
      if (currentUser) scheduleCloudSync();

    function loadData() {
      const raw = localStorage.getItem('unstoppable_state');
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          userState = { ...userState, ...parsed };
        } catch (e) {
          console.warn('Failed to load state:', e);
        }
      }
      // Migrate: old flat array → month-keyed object
      if (Array.isArray(userState.monthlyExpenses)) {
        const migrated = {};
        userState.monthlyExpenses.forEach(e => {
          const mk = (e.date || getTodayKey()).slice(0, 7);
          if (!migrated[mk]) migrated[mk] = [];
          migrated[mk].push(e);
        });
        userState.monthlyExpenses = migrated;
      }
      if (typeof userState.monthlyExpenses !== 'object' || userState.monthlyExpenses === null) {
        userState.monthlyExpenses = {};
      }
      const today = getTodayKey();
      // Daily reset: create fresh booleans for today (history stays intact)
      if (!userState.dailyHabits[today]) {
        // Before resetting, compute streak from yesterday
        computeStreakOnNewDay(today);
        userState.dailyHabits[today] = {};
        DEFAULT_HABITS.forEach(h => userState.dailyHabits[today][h.id] = false);
      }
      // Initialize vicios if needed
      if (!userState.vicios || typeof userState.vicios !== 'object') {
        userState.vicios = {};
      }
      DEFAULT_VICIOS.forEach(v => {
        if (!userState.vicios[v.id]) {
          userState.vicios[v.id] = { startedAt: null, label: v.label };
        }
      });
      // Initialize focusSessions if needed
      if (!userState.focusSessions || typeof userState.focusSessions !== 'object') {
        userState.focusSessions = {};
      }
      // Initialize workout state if needed
      if (!userState.workoutLoads || typeof userState.workoutLoads !== 'object') {
        userState.workoutLoads = {};
      }
      if (!userState.workoutLog || typeof userState.workoutLog !== 'object') {
        userState.workoutLog = {};
      }
      // Initialize v3.0 fields
      if (!userState.performanceLog || typeof userState.performanceLog !== 'object') userState.performanceLog = {};
      if (!userState.aiCache || typeof userState.aiCache !== 'object') userState.aiCache = {};
      if (!userState.apiKey) userState.apiKey = '';
      if (!userState.profile) userState.profile = { name: 'Guerreiro', budget: 0, focusGoalHours: 4 };
      // Clean stale AI cache (keep only today's)
      const todayPrefix = 'verdict_' + today;
      Object.keys(userState.aiCache).forEach(k => {
        if (k.startsWith('verdict_') && !k.startsWith(todayPrefix)) delete userState.aiCache[k];
      });
      // Clean old habit data (keep only last 60 days)
      pruneOldHabits();
      // Prune old focus data (keep only last 60 days)
      const focusKeys = Object.keys(userState.focusSessions).sort();
      if (focusKeys.length > 60) {
        focusKeys.slice(0, focusKeys.length - 60).forEach(k => delete userState.focusSessions[k]);
      }
      // Prune old workout logs (keep only last 60 days)
      const workoutLogKeys = Object.keys(userState.workoutLog).sort();
      if (workoutLogKeys.length > 60) {
        workoutLogKeys.slice(0, workoutLogKeys.length - 60).forEach(k => delete userState.workoutLog[k]);
      }
      userState.lastDate = today;
      saveData();
    }

    function computeStreakOnNewDay(today) {
      const yesterday = getDateOffset(today, -1);
      const yHabits = userState.dailyHabits[yesterday];

      if (userState.lastDate === today) return; // Already processed

      if (userState.lastDate === yesterday) {
        // Yesterday exists — check if ALL habits were completed
        if (yHabits && allHabitsComplete(yHabits)) {
          userState.streakCount = (userState.streakCount || 0) + 1;
        } else {
          // Yesterday was not 100% → streak breaks
          userState.streakCount = 0;
        }
      } else if (userState.lastDate) {
        // Skipped one or more days → streak resets to 0
        userState.streakCount = 0;
      }
    }

    function allHabitsComplete(habitsObj) {
      const ids = DEFAULT_HABITS.map(h => h.id);
      return ids.every(id => habitsObj[id] === true);
    }

    function getDateOffset(dateStr, offset) {
      const d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    }

    function pruneOldHabits() {
      const keys = Object.keys(userState.dailyHabits).sort();
      if (keys.length > 60) {
        keys.slice(0, keys.length - 60).forEach(k => delete userState.dailyHabits[k]);
      }
    }

    function renderActiveTab() {
      const main = document.getElementById('mainContent');
      switch (activeTab) {
        case 'dashboard': main.innerHTML = renderDashboard(); break;
        case 'grind': main.innerHTML = renderGrind(); break;
        case 'treino': main.innerHTML = renderTreino(); break;
        case 'warchest': main.innerHTML = renderWarChest(); break;
        case 'focus': main.innerHTML = renderFocus(); break;
        case 'status': main.innerHTML = renderStatus(); break;
        case 'mentor': main.innerHTML = renderMentor(); break;

      main.querySelector('.tab-enter')?.offsetHeight; // force reflow

    // =============================================
    // SOBERANIA (VÍCIOS) ENGINE
    // =============================================
    function getVersiculoDoDia() {
      const today = getTodayKey();
      const dayOfYear = Math.floor((new Date(today + 'T12:00:00') - new Date(today.slice(0, 4) + '-01-01T00:00:00')) / 86400000);
      return VERSICULOS[dayOfYear % VERSICULOS.length];
    }

    function calcTimeSince(isoString) {
      if (!isoString) return null;
      const start = new Date(isoString).getTime();
      const now = Date.now();
      const diff = now - start;
      if (diff < 0) return { days: 0, hours: 0, mins: 0, total: 0 };
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      return { days, hours, mins, total: diff };
    }

    function getVicioLevel(days) {
      if (days < 4) return { label: 'INICIANTE', cls: 'text-gray-500', border: 'border-[#333]' };
      if (days < 7) return { label: 'RESISTÊNCIA', cls: 'text-royal', border: 'border-royal/30' };
      return { label: 'SOBERANO', cls: 'neon-gold', border: 'neon-gold-border' };
    }

    function startSobriety(vicioId) {
      userState.vicios[vicioId].startedAt = new Date().toISOString();
      saveData();
      renderActiveTab();
    }

    function resetSobriety(vicioId) {
      showRecaidaOverlay(vicioId);
    }

    function updateCustomVicioLabel() {
      const input = document.getElementById('customVicioInput');
      if (input && input.value.trim()) {
        userState.vicios.custom.label = input.value.trim();
        saveData();
        showToast('Vício atualizado.');
      }
    }

    function renderSoberaniaSection() {
      return DEFAULT_VICIOS.map(v => {
        const data = userState.vicios[v.id];

        const time = calcTimeSince(data.startedAt);
        const active = !!data.startedAt;
        const level = active ? getVicioLevel(time.days) : { label: 'INATIVO', cls: 'text-gray-700', border: 'border-[#333]' };
        const displayLabel = v.id === 'custom' ? (data.label || 'Personalizado') : v.label;

        const streakGlow = active && time.days >= 7 ? ' streak-glow' : '';
        return `
          <div class="sobriety-card card-neu ${level.border}${streakGlow} p-4">

                </div>
              </div>
              ${active ? `
                <button onclick="resetSobriety('${v.id}')" class="px-2.5 py-1 rounded-lg bg-red-950/30 border border-red-900/40 text-[10px] font-extrabold text-red-400 hover:bg-red-900/30 transition-all active:scale-95">
                  RECAÍDA
                </button>

            ${active ? `
              <div class="bg-black rounded-lg p-3 text-center">
                <p class="mono-timer text-2xl font-black ${level.cls}" id="timer-${v.id}">
                  ${String(time.days).padStart(2, '0')}d ${String(time.hours).padStart(2, '0')}h ${String(time.mins).padStart(2, '0')}m

              </div>
            ` : `

    let sobrietyInterval = null;
    function startSobrietyTicker() {
      if (sobrietyInterval) clearInterval(sobrietyInterval);
      sobrietyInterval = setInterval(() => {
        DEFAULT_VICIOS.forEach(v => {
          const data = userState.vicios[v.id];
          if (!data || !data.startedAt) return;
          const el = document.getElementById('timer-' + v.id);
          if (!el) return;
          const time = calcTimeSince(data.startedAt);
          const level = getVicioLevel(time.days);
          el.textContent = `${String(time.days).padStart(2, '0')}d ${String(time.hours).padStart(2, '0')}h ${String(time.mins).padStart(2, '0')}m`;
          el.className = `mono-timer text-2xl font-black ${level.cls}`;
        });
      }, 30000); // update every 30s
    }

    // =============================================
    // SCORE ENGINE
    // =============================================
    function calcDayScore(dateKey) {
      const habits = userState.dailyHabits[dateKey];
      if (!habits) return 0;

      // 70% — habit completion
      const ids = DEFAULT_HABITS.map(h => h.id);
      const done = ids.filter(id => habits[id] === true).length;
      const habitScore = (done / ids.length) * 70;

      // 30% — budget health (daily portion)
      let budgetScore = 30; // default full if no budget set
      const budget = userState.budget || 0;
      if (budget > 0) {
        const mk = dateKey.slice(0, 7);
        const monthExps = userState.monthlyExpenses[mk] || [];
        const daysInMonth = new Date(parseInt(mk.split('-')[0]), parseInt(mk.split('-')[1]), 0).getDate();
        const dailyBudget = budget / daysInMonth;
        const dayExpenses = monthExps.filter(e => e.date === dateKey).reduce((s, e) => s + e.amount, 0);
        const ratio = Math.max(0, Math.min(1, 1 - (dayExpenses / dailyBudget)));
        budgetScore = ratio * 30;
      }

      return Math.round(habitScore + budgetScore);
    }

    function getWeekData() {
      const today = getTodayKey();
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const habits = userState.dailyHabits[dk];
        const score = calcDayScore(dk);
        const ids = DEFAULT_HABITS.map(h => h.id);
        const done = habits ? ids.filter(id => habits[id] === true).length : 0;
        const allDone = done === ids.length && habits;
        const dayLabel = new Date(dk + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'short' }).slice(0, 3).toUpperCase();
        days.push({ date: dk, score, done, allDone, dayLabel, isToday: dk === today });
      }
      return days;
    }

    function getStatusBattle(score) {
      if (score <= 30) return { text: 'REAGIR OU MORRER', cls: 'neon-red', bg: 'border-red-900/40', bgInner: 'rgba(255,50,50,0.05)', icon: '💀' };
      if (score <= 70) return { text: 'MANTENHA A LINHA', cls: 'neon-yellow', bg: 'border-yellow-700/40', bgInner: 'rgba(250,204,21,0.05)', icon: '⚔️' };
      return { text: 'IMPARÁVEL', cls: 'neon-text', bg: 'border-[#00FF64]/30', bgInner: 'rgba(0,255,100,0.05)', icon: '👑' };
    }

    function getScoreRingColor(score) {
      if (score <= 30) return '#FF3333';
      if (score <= 70) return '#FACC15';
      return '#00FF64';
    }

                <div class="pie-chart" style="--ess-pct:${Math.round((totalEssencial / totalGasto) * 100)}; --ess-color:#2563EB; --dop-color:#FF3333;">
                  <div class="w-full h-full rounded-full flex items-center justify-center" style="background: radial-gradient(circle, #111 35%, transparent 36%);">
                    <span class="text-xs font-black text-white">${Math.round((totalEssencial / totalGasto) * 100)}%</span>
                  </div>
                </div>
                <div class="space-y-3">
                  <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-sm bg-royal"></div>
                    <div>
                      <span class="text-[10px] font-bold text-gray-400">Essencial</span>
                      <p class="text-[9px] font-black text-gray-500">${Math.round((totalEssencial / totalGasto) * 100)}%</p>
                    </div>
                  </div>
                  <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-sm bg-red-500"></div>
                    <div>
                      <span class="text-[10px] font-bold text-gray-400">Dopamina</span>
                      <p class="text-[9px] font-black text-red-400">${Math.round((totalDopamina / totalGasto) * 100)}%</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          ` : ''}

          <!-- Barra de Uso -->
          ${budget > 0 ? `
            <div class="card-neu p-4">
              <div class="flex justify-between mb-2">
                <span class="text-[10px] font-extrabold tracking-widest text-gray-500">USO DO CAPITAL</span>
                <span class="text-xs font-black ${usoPct > 90 ? 'neon-red' : usoPct > 70 ? 'text-yellow-400' : 'text-royal'}">${usoPct}%</span>
              </div>
              <div class="w-full h-3 bg-black rounded-full overflow-hidden neon-bar-track">
                <div class="h-full rounded-full transition-all duration-700 ease-out ${usoPct > 90 ? 'neon-red-bar' : usoPct > 70 ? 'bg-yellow-500' : 'bg-royal'}" style="width:${usoPct}%"></div>
              </div>
            </div>
          ` : ''}

          <!-- Capital de Guerra -->
          <div class="bg-[#111] border border-[#333] rounded-xl p-4">
            <label class="text-[10px] font-extrabold tracking-widest text-gray-500 block mb-2">CAPITAL DE GUERRA (R$)</label>
            <input type="number" id="budgetInput" value="${budget || ''}" placeholder="Ex: 5000"
              class="w-full px-3 py-3 rounded-lg text-sm font-extrabold text-center" style="font-size:18px;"
              onchange="updateBudget(this.value)">
          </div>

          <!-- Input de Gastos -->
          <div class="bg-[#111] border border-[#333] rounded-xl p-4">
            <h3 class="text-sm font-extrabold mb-3 text-gray-300">REGISTRAR GASTO</h3>
            <input type="text" id="expDesc" placeholder="Descrição do gasto"
              class="w-full px-3 py-2.5 rounded-lg text-sm font-semibold mb-2">
            <input type="number" id="expAmount" placeholder="Valor (R$)" step="0.01"
              class="w-full px-3 py-3 rounded-lg text-sm font-extrabold mb-3" style="font-size:16px;">
            <div class="grid grid-cols-2 gap-3">
              <button onclick="addWarExpense('essencial')"
                class="py-3 rounded-xl text-sm font-extrabold border-2 border-[#333] bg-black text-gray-300 hover:border-gray-500 transition-all active:scale-[0.97]">
                <span class="block text-lg mb-0.5">🛡️</span>
                ESSENCIAL
              </button>
              <button onclick="addWarExpense('dopamina')"
                class="py-3 rounded-xl text-sm font-extrabold border-2 border-red-900/50 bg-red-950/20 text-red-400 hover:border-red-700 transition-all active:scale-[0.97]">
                <span class="block text-lg mb-0.5">💀</span>
                DOPAMINA BARATA
              </button>
            </div>
          </div>

          <!-- Últimos 5 Registros -->
          ${last5.length > 0 ? `
            <div class="bg-[#111] border border-[#333] rounded-xl p-4">
              <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-extrabold text-gray-300">ÚLTIMOS REGISTROS</h3>
                <button onclick="clearMonthExpenses()" class="text-[10px] font-bold text-gray-600 hover:text-red-400 transition-colors">LIMPAR MÊS</button>
              </div>
              <div class="space-y-2">
                ${last5.map((e, i) => {
                  const isD = e.category === 'dopamina';
                  const realIdx = expenses.length - 1 - i;
                  return `
                    <div class="flex items-center gap-3 p-3 bg-black rounded-xl">
                      <div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs font-black flex-shrink-0 ${isD ? 'bg-red-950 text-red-400 border border-red-900/50' : 'bg-[#1a1a1a] text-gray-500 border border-[#333]'}">
                        ${isD ? 'D' : 'E'}
                      </div>
                      <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold ${isD ? 'text-red-900' : 'text-gray-400'} truncate">${escapeHtml(e.name || 'Sem descrição')}</p>
                        <p class="text-[10px] font-semibold text-gray-700">${e.date || ''}</p>
                      </div>
                      <div class="flex items-center gap-2 flex-shrink-0">
                        <span class="text-sm font-black tabular-nums ${isD ? 'text-red-500' : 'text-gray-400'}">-R$${e.amount.toLocaleString('pt-BR')}</span>
                        <button onclick="removeWarExpense(${realIdx})" class="text-gray-700 hover:text-red-400 p-0.5 transition-colors">
                          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
              ${expenses.length > 5 ? `<p class="text-[10px] text-gray-700 font-bold text-center mt-2">+ ${expenses.length - 5} registros anteriores</p>` : ''}
            </div>
          ` : `
            <div class="bg-[#111] border border-[#333] rounded-xl p-6 text-center">
              <p class="text-gray-700 text-sm font-bold">Nenhum gasto registrado este mês.</p>
              <p class="text-gray-800 text-xs font-semibold mt-1">Mantenha a disciplina.</p>
            </div>
          `}
        </div>
      `;
    }

    function updateBudget(val) {
      userState.budget = parseFloat(val) || 0;
      saveData();
      checkScarcity();
      renderActiveTab();
    }

    function addWarExpense(category) {
      const descEl = document.getElementById('expDesc');
      const amountEl = document.getElementById('expAmount');
      const name = descEl?.value?.trim() || (category === 'essencial' ? 'Gasto Essencial' : 'Dopamina Barata');
      const amount = parseFloat(amountEl?.value);
      if (!amount || amount <= 0) {
        // Highlight input briefly
        if (amountEl) { amountEl.style.borderColor = '#FF3333'; setTimeout(() => amountEl.style.borderColor = '#222', 1000); }
        return;
      }
      const mk = getMonthKey();
      if (!userState.monthlyExpenses[mk]) userState.monthlyExpenses[mk] = [];
      userState.monthlyExpenses[mk].push({ name, amount, category, date: getTodayKey() });
      haptic(category === 'dopamina' ? [50, 30, 50] : 20);
      saveData();
      checkScarcity();
      renderActiveTab();
      showToast(category === 'dopamina' ? 'Dopamina registrada. Fique esperto.' : 'Gasto registrado.');
    }

    function removeWarExpense(index) {
      const mk = getMonthKey();
      const arr = userState.monthlyExpenses[mk];
      if (arr && arr[index] !== undefined) {
        arr.splice(index, 1);
        saveData();
        checkScarcity();
        renderActiveTab();
      }
    }

    function clearMonthExpenses() {
      if (confirm('Limpar todos os gastos deste mês? Isso é irreversível.')) {
        userState.monthlyExpenses[getMonthKey()] = [];
        saveData();
        renderActiveTab();
      }
    }

    // =============================================
    // TREINO (ATLAS) MODULE
    // =============================================
    function getTodayWorkoutDay() {
      return WORKOUT_DAYS[new Date().getDay()];
    }

    function getWorkoutLog(dateKey) {
      if (!userState.workoutLog[dateKey]) {
        userState.workoutLog[dateKey] = { exercises: {}, finalized: false };
      }
      return userState.workoutLog[dateKey];
    }

    function toggleExerciseDone(exerciseId) {
      const today = getTodayKey();
      const log = getWorkoutLog(today);
      if (!log.exercises[exerciseId]) {
        log.exercises[exerciseId] = { done: false, load: 0 };
      }
      log.exercises[exerciseId].done = !log.exercises[exerciseId].done;
      haptic(log.exercises[exerciseId].done ? 40 : 15);
      if (log.exercises[exerciseId].done) startRestTimer(90);
      saveData();
      renderActiveTab();
    }

    function updateExerciseLoad(exerciseId, val) {
      const today = getTodayKey();
      const log = getWorkoutLog(today);
      const load = parseFloat(val) || 0;
      if (!log.exercises[exerciseId]) {
        log.exercises[exerciseId] = { done: false, load: 0 };
      }
      log.exercises[exerciseId].load = load;

      // Update load history and PR
      if (!userState.workoutLoads[exerciseId]) {
        userState.workoutLoads[exerciseId] = { lastLoad: 0, pr: 0 };
      }
      if (load > 0) {
        userState.workoutLoads[exerciseId].lastLoad = load;
        if (load > userState.workoutLoads[exerciseId].pr) {
          userState.workoutLoads[exerciseId].pr = load;
        }
      }
      saveData();
    }

    function finalizeWorkout() {
      const today = getTodayKey();
      const log = getWorkoutLog(today);
      log.finalized = true;

      // Auto-mark 'Treino de Força' habit as done
      if (userState.dailyHabits[today]) {
        userState.dailyHabits[today].workout = true;
      }

      stopRestTimer();
      haptic([100, 50, 100, 50, 100]);
      saveData();
      renderActiveTab();
      showToast('TREINO FINALIZADO. Hábito marcado.');
    }

    function selectWorkoutDay(day) {
      selectedWorkoutDay = day;
      renderActiveTab();
    }

    function renderTreino() {
      const today = getTodayKey();
      const todayDay = getTodayWorkoutDay();
      const viewDay = selectedWorkoutDay;
      const plan = DEFAULT_WORKOUT_PLAN[viewDay];
      const isToday = viewDay === todayDay;
      const log = isToday ? getWorkoutLog(today) : { exercises: {}, finalized: false };
      const isRest = !plan; // Sunday
      const isFinalized = isToday && log.finalized;

      // Count completed exercises
      const doneCount = plan ? plan.exercises.filter(e => log.exercises[e.id]?.done).length : 0;
      const totalExercises = plan ? plan.exercises.length : 0;
      const stagnationAlerts = getStagnationAlerts();

      return `
        <div class="tab-enter space-y-4 max-w-lg mx-auto">
          <div class="pt-1">
            <h2 class="text-2xl font-extrabold">Atlas <span class="text-royal">Treino</span></h2>
            <p class="text-gray-500 text-sm font-semibold mt-1">Sua ficha de guerra. Sem papel, sem desculpa.</p>
          </div>

          <!-- DAY SELECTOR -->
          <div class="flex gap-1.5">
            ${WORKOUT_DAYS.map((d, i) => {
              const isActive = d === viewDay;
              const hasPlan = !!DEFAULT_WORKOUT_PLAN[d];
              return `
                <button onclick="selectWorkoutDay('${d}')"
                  class="day-selector-btn flex-1 py-2 rounded-lg text-[10px] font-extrabold border transition-all ${isActive ? 'active-day' : hasPlan ? 'bg-[#111] border-[#333] text-gray-400 hover:border-gray-500' : 'bg-[#0a0a0a] border-[#222] text-gray-700'}">
                  ${WORKOUT_DAY_LABELS[i]}
                </button>
              `;
            }).join('')}
          </div>

          ${isRest ? `
            <!-- REST DAY -->
            <div class="bg-[#111] border border-[#333] rounded-xl p-8 text-center">
              <p class="text-4xl mb-3">😴</p>
              <p class="text-xl font-black text-gray-400">DIA DE DESCANSO</p>
              <p class="text-xs font-bold text-gray-600 mt-2">Recuperação é parte do processo. Descanse para voltar mais forte.</p>
            </div>
          ` : `
            <!-- WORKOUT HEADER -->
            <div class="card-neu p-4">
              <div class="flex items-center justify-between">
                <div>
                  <p class="text-[10px] font-extrabold tracking-widest text-gray-500">${isToday ? 'TREINO DE HOJE' : 'VISUALIZANDO'}</p>
                  <p class="text-lg font-black text-white mt-1">${plan.label}</p>
                </div>
                <div class="text-center">
                  <p class="text-3xl font-black workout-load ${doneCount === totalExercises && totalExercises > 0 ? 'neon-text' : 'text-gray-500'}">${doneCount}/${totalExercises}</p>
                  <p class="text-[9px] font-bold text-gray-600">EXERCÍCIOS</p>
                </div>
              </div>
              ${isToday && totalExercises > 0 ? `
                <div class="w-full h-2 bg-black rounded-full overflow-hidden mt-3">
                  <div class="h-full rounded-full transition-all duration-500 ease-out ${doneCount === totalExercises ? 'neon-bar' : 'bg-royal'}" style="width:${Math.round((doneCount / totalExercises) * 100)}%"></div>
                </div>
              ` : ''}
            </div>

            <!-- REST TIMER -->
            ${isToday && restTimerSeconds > 0 ? `
              <div class="card-neu p-3" id="restTimerContainer">
                <div class="flex items-center justify-between mb-1">
                  <span id="restTimerLabel" class="text-[10px] font-extrabold text-royal tracking-wider">Descanso: ${restTimerSeconds}s</span>
                  <button onclick="stopRestTimer(); document.getElementById('restTimerContainer').style.display='none'" class="text-[10px] font-bold text-gray-600 hover:text-red-400 transition-colors">PULAR</button>
                </div>
                <div class="w-full h-1 bg-black rounded-full overflow-hidden">
                  <div id="restTimerBar" class="rest-timer-bar" style="width:100%"></div>
                </div>
              </div>
            ` : ''}

            <!-- EXERCISE TABLE -->
            <div class="card-neu overflow-hidden">
              <!-- Table Header -->
              <div class="grid grid-cols-[1fr_80px_80px_40px] gap-0 px-4 py-2.5 border-b border-[#222]">
                <span class="text-[9px] font-extrabold tracking-widest text-gray-600">EXERCÍCIO</span>
                <span class="text-[9px] font-extrabold tracking-widest text-gray-600 text-center">SxR</span>
                <span class="text-[9px] font-extrabold tracking-widest text-gray-600 text-center">KG</span>
                <span class="text-[9px] font-extrabold tracking-widest text-gray-600 text-center">OK</span>
              </div>

              <!-- Exercise Rows -->
              ${plan.exercises.map(ex => {
                const exLog = log.exercises[ex.id] || { done: false, load: 0 };
                const loadHistory = userState.workoutLoads[ex.id] || { lastLoad: 0, pr: 0 };
                const currentLoad = isToday ? (exLog.load || loadHistory.lastLoad) : loadHistory.lastLoad;
                const isPR = isToday && exLog.load > 0 && exLog.load >= loadHistory.pr && loadHistory.pr > 0;
                const isDone = isToday && exLog.done;

                const history = getExerciseHistory(ex.id);
                return `
                  <div class="exercise-row grid grid-cols-[1fr_80px_80px_40px] gap-0 px-4 py-3 border-b border-[#1a1a1a] items-center ${isDone ? 'done-exercise' : ''}">
                    <div class="min-w-0">
                      <div class="flex items-center gap-1">
                        <p class="exercise-name text-sm font-bold ${isDone ? 'text-gray-600' : 'text-gray-200'} truncate">${ex.name}</p>
                        ${history.length > 0 ? `<button onclick="event.stopPropagation(); toggleExerciseHistory('${ex.id}')" class="text-[9px] text-gray-600 hover:text-royal px-1 transition-colors">\u25BC</button>` : ''}
                      </div>
                      ${isPR ? '<span class="pr-badge text-[8px] font-black px-1.5 py-0.5 rounded mt-0.5 inline-block">PR!</span>' : ''}
                      ${stagnationAlerts[ex.id] ? '<span class="stagnation-tag text-[8px] font-black px-1.5 py-0.5 rounded mt-0.5 inline-block">⚠ AUMENTE A CARGA</span>' : ''}
                      ${!isToday && loadHistory.pr > 0 ? `<p class="text-[9px] font-bold text-gray-700 mt-0.5">PR: ${loadHistory.pr}kg</p>` : ''}
                      ${history.length > 0 ? `
                        <div id="history-${ex.id}" class="hidden mt-1 space-y-0.5">
                          <p class="text-[8px] font-extrabold text-gray-600 tracking-wider">ÚLTIMAS CARGAS:</p>
                          ${history.map(h => `<p class="text-[9px] font-bold text-gray-600">${h.date.slice(5)}: <span class="text-gray-400 workout-load">${h.load}kg</span></p>`).join('')}
                        </div>
                      ` : ''}
                    </div>
                    <div class="text-center">
                      <span class="workout-load text-sm font-black ${isDone ? 'text-gray-600' : 'text-gray-400'}">${ex.sets}x${ex.reps}</span>
                    </div>
                    <div class="flex justify-center">
                      ${isToday ? `
                        <input type="number" value="${currentLoad || ''}" placeholder="—"
                          class="w-16 px-1 py-1.5 rounded text-center text-sm font-black workout-load"
                          style="background:#0a0a0a !important; border:1px solid #222 !important;"
                          onchange="updateExerciseLoad('${ex.id}', this.value)"
                          ${isDone ? '' : ''}>
                      ` : `
                        <span class="workout-load text-sm font-black ${loadHistory.lastLoad > 0 ? 'text-gray-400' : 'text-gray-700'}">${loadHistory.lastLoad > 0 ? loadHistory.lastLoad : '—'}</span>
                      `}
                    </div>
                    <div class="flex justify-center">
                      ${isToday ? `
                        <button onclick="toggleExerciseDone('${ex.id}')"
                          class="w-7 h-7 rounded-lg border-2 flex items-center justify-center transition-all active:scale-90 ${isDone ? 'bg-[#00FF64] border-[#00FF64]' : 'border-[#444] hover:border-gray-400'}">
                          ${isDone ? '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="black" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}
                        </button>
                      ` : `
                        <span class="text-gray-700">—</span>
                      `}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>

            ${isToday && !isFinalized ? `
              <!-- FINALIZAR TREINO -->
              <button onclick="finalizeWorkout()"
                class="w-full py-4 rounded-xl ${doneCount === totalExercises && doneCount > 0 ? 'btn-royal' : 'bg-[#111] border-2 border-[#333]'} text-white font-extrabold text-base tracking-wider active:scale-[0.97] transition-all">
                ${doneCount === totalExercises && doneCount > 0 ? '🏋️ FINALIZAR TREINO' : `🏋️ FINALIZAR TREINO (${doneCount}/${totalExercises})`}
              </button>
            ` : ''}

            ${isFinalized ? `
              <div class="rounded-xl p-5 text-center border border-[#00FF64]/30" style="background: rgba(0,255,100,0.05); box-shadow: 0 0 30px rgba(0,255,100,0.1);">
                <p class="text-3xl mb-2">🏆</p>
                <p class="neon-text font-black text-xl tracking-wide">TREINO CONCLUÍDO</p>
                <p class="text-gray-400 text-xs font-bold mt-2">Hábito 'Treino de Força' marcado automaticamente.</p>
              </div>
            ` : ''}
          `}
        </div>
      `;
    }

    // =============================================
    // FOCUS (DEEP WORK) MODULE
    // =============================================
    let focusInterval = null;
    let focusStartTime = null;
    let focusImmersive = false;
    let restTimerInterval = null;
    let restTimerSeconds = 0;
    let extremeFocusMode = false;

    function getTodayFocus() {
      const today = getTodayKey();
      if (!userState.focusSessions[today]) {
        userState.focusSessions[today] = { totalSeconds: 0, sessions: [] };
      }
      return userState.focusSessions[today];
    }

    function formatFocusTime(totalSec) {
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function getRandomFocusPhrase() {
      return FOCUS_PHRASES[Math.floor(Math.random() * FOCUS_PHRASES.length)];
    }

    function startFocusSession() {
      focusStartTime = Date.now();
      focusImmersive = true;
      renderActiveTab();
      showImmersiveOverlay();
      startFocusTicker();
    }

    function startFocusTicker() {
      if (focusInterval) clearInterval(focusInterval);
      focusInterval = setInterval(() => {
        if (!focusStartTime) return;
        const elapsed = Math.floor((Date.now() - focusStartTime) / 1000);
        // Update immersive timer
        const imTimer = document.getElementById('focusImmersiveTimer');
        if (imTimer) imTimer.textContent = formatFocusTime(elapsed);
        // Update phrase every 60 seconds
        const phEl = document.getElementById('focusPhrase');
        if (phEl && elapsed > 0 && elapsed % 60 === 0) {
          phEl.textContent = getRandomFocusPhrase();
          phEl.style.opacity = '0';
          setTimeout(() => { if (phEl) phEl.style.opacity = '1'; }, 50);
        }
        // Update regular tab timer if visible
        const tabTimer = document.getElementById('focusTabTimer');
        if (tabTimer) tabTimer.textContent = formatFocusTime(elapsed);
      }, 1000);
    }

    function endFocusSession() {
      if (!focusStartTime) return;
      const elapsed = Math.floor((Date.now() - focusStartTime) / 1000);
      if (elapsed > 0) {
        const todayFocus = getTodayFocus();
        todayFocus.totalSeconds += elapsed;
        todayFocus.sessions.push({
          start: new Date(focusStartTime).toISOString(),
          durationSec: elapsed,
        });
        saveData();
      }
      focusStartTime = null;
      focusImmersive = false;
      if (focusInterval) { clearInterval(focusInterval); focusInterval = null; }
      removeImmersiveOverlay();
      renderActiveTab();
      if (elapsed > 0) {
        const mins = Math.floor(elapsed / 60);
        showToast(`Sessão encerrada: ${mins} min registrados.`);
      }
    }

    function showImmersiveOverlay() {
      removeImmersiveOverlay();
      const overlay = document.createElement('div');
      overlay.id = 'focusOverlay';
      overlay.className = 'focus-immersive focus-scanline';
      overlay.innerHTML = `
        <div class="flex flex-col items-center justify-center w-full px-6">
          <p class="text-[10px] font-extrabold tracking-[0.3em] text-royal/60 mb-6">MODO IMERSIVO ATIVO</p>
          <div class="w-52 h-52 rounded-full focus-ring-active focus-pulse flex items-center justify-center mb-8" style="background: radial-gradient(circle, #0a0a0a 60%, #111 100%);">
            <span id="focusImmersiveTimer" class="focus-timer-text text-5xl font-black text-royal">00:00:00</span>
          </div>
          <p id="focusPhrase" class="text-sm font-extrabold text-gray-500 text-center max-w-xs mb-10 transition-opacity duration-500" style="letter-spacing:0.5px;">
            ${getRandomFocusPhrase()}
          </p>
          <button onclick="endFocusSession()"
            class="px-8 py-4 rounded-xl border-2 border-red-900/60 bg-red-950/30 text-red-400 font-extrabold text-sm tracking-wider hover:bg-red-900/30 transition-all active:scale-95">
            ENCERRAR SESSÃO
          </button>
          <p class="text-[9px] font-bold text-gray-700 mt-4">O tempo será salvo automaticamente</p>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function removeImmersiveOverlay() {
      const el = document.getElementById('focusOverlay');
      if (el) el.remove();
    }

    function renderFocus() {
      const today = getTodayKey();
      const todayFocus = getTodayFocus();
      const totalSec = todayFocus.totalSeconds + (focusStartTime ? Math.floor((Date.now() - focusStartTime) / 1000) : 0);

    function getWeekScores() {
      const today = getTodayKey();
      const result = [];
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const score = calcDayScore(dk);
        const dayLabel = new Date(dk + 'T12:00:00').toLocaleDateString('pt-BR', { weekday: 'short' }).slice(0, 3).toUpperCase();
        const isToday = dk === today;
        result.push({ date: dk, score, dayLabel, isToday });
      }
      return result;
    }

    function getWeekAvgScore() {
      const scores = getWeekScores();
      const total = scores.reduce((s, d) => s + d.score, 0);
      return Math.round(total / scores.length);
    }

    function getWeekFocusHours() {
      const today = getTodayKey();
      let totalSec = 0;
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const fs = userState.focusSessions[dk];
        if (fs) totalSec += fs.totalSeconds;
      }
      return (totalSec / 3600).toFixed(1);
    }

    function getWeekHabitRate() {
      const today = getTodayKey();
      let totalPossible = 0;
      let totalDone = 0;
      const ids = DEFAULT_HABITS.map(h => h.id);
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const habits = userState.dailyHabits[dk];
        if (habits) {
          totalPossible += ids.length;
          totalDone += ids.filter(id => habits[id] === true).length;
        }
      }
      return totalPossible > 0 ? Math.round((totalDone / totalPossible) * 100) : 0;
    }

    function getMonthFinancials() {
      const mk = getMonthKey();
      const expenses = userState.monthlyExpenses[mk] || [];
      const totalGasto = expenses.reduce((s, e) => s + e.amount, 0);
      const totalDopamina = expenses.filter(e => e.category === 'dopamina').reduce((s, e) => s + e.amount, 0);
      const totalEssencial = expenses.filter(e => e.category === 'essencial').reduce((s, e) => s + e.amount, 0);
      const budget = userState.budget || 0;
      const saldo = budget - totalGasto;
      return { totalGasto, totalDopamina, totalEssencial, budget, saldo };
    }
