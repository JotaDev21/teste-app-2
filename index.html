          <!-- ===== HERO PROFILE SECTION ===== -->
          <div class="card-neu p-6 text-center">
            <!-- Avatar grande central -->
            <div class="level-badge w-24 h-24 rounded-full mx-auto flex items-center justify-center text-5xl mb-4">
              ${avatar}
            </div>

            <!-- Nome editável -->
            <input type="text" value="${name}" onchange="updateProfileName()" id="profileNameInput"
              class="w-full bg-transparent text-2xl font-black text-white text-center border-b-2 border-[#222] pb-2 outline-none focus:border-royal transition-colors mb-3"
              maxlength="20">

            <!-- Nível gigante -->
            <div class="flex items-center justify-center gap-3 mb-5">
              <span class="text-sm font-extrabold tracking-[0.2em] ${lvl.isMax ? 'text-yellow-400' : 'text-royal'}">NÍVEL</span>
              <span class="text-5xl font-black ${lvl.isMax ? 'text-yellow-400' : 'neon-text'}">${lvl.nivel}</span>
              ${lvl.isMax ? '<span class="text-sm font-black text-yellow-400/60">MAX</span>' : ''}
            </div>

            <!-- Barra de XP gigante -->
            <div class="mb-5">
              <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-extrabold tracking-widest text-gray-500">EXPERIÊNCIA</span>
                <span class="text-xs font-black text-royal">${lvl.isMax ? 'MAX' : lvl.xpNoNivelAtual + ' / ' + lvl.xpProximoNivel + ' XP'}</span>
              </div>
              <div class="w-full h-5 bg-black rounded-full overflow-hidden" style="box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);">
                <div class="xp-level-bar h-full rounded-full transition-all duration-700 ease-out" style="width:${lvl.pctNivel}%"></div>
              </div>
              <p class="text-sm font-bold text-gray-600 mt-2 text-center">XP Total: ${userState.xpTotal.toLocaleString('pt-BR')}</p>
            </div>

            <!-- Avatar selector -->
            <div>
              <p class="text-xs font-extrabold tracking-widest text-gray-500 mb-3">AVATAR</p>
              <div class="flex flex-wrap justify-center gap-2.5">
                ${AVATAR_OPTIONS.map(e => `
                  <button onclick="selectAvatar('${e}')"
                    class="avatar-option w-12 h-12 rounded-xl border-2 flex items-center justify-center text-2xl min-h-[48px] ${avatar === e ? 'selected border-royal bg-royal/10' : 'border-[#222] bg-[#0a0a0a]'}">
                    ${e}
                  </button>
                `).join('')}
              </div>
            </div>
          </div>

          <!-- ===== ARSENAL HEADER ===== -->
          <div class="flex items-center justify-between px-1">
            <div>
              <h3 class="text-xl font-black text-white">O Arsenal</h3>
              <p class="text-sm font-bold text-gray-600">${cartasDesbloqueadas.length}/${COLECAO_CARTAS.length} cartas desbloqueadas</p>
            </div>
            <div class="text-right">
              <p class="text-xs font-extrabold text-gray-500 tracking-widest">PRÓXIMA</p>
              <p class="text-sm font-black text-gray-400">${proxima ? 'Lvl ' + proxima.requisito + ' — ' + proxima.nome : 'Todas de nível desbloqueadas!'}</p>
            </div>
          </div>

          <!-- RARITY BREAKDOWN -->
          <div class="flex flex-wrap gap-2">
            ${Object.entries(contagem).map(([r, c]) => {
              const cfg = RARITY_CONFIG[r];
              return `<span class="text-xs font-black ${cfg.badgeText} ${cfg.badgeBg} px-3 py-1.5 rounded-lg border ${cfg.border}">${cfg.label}: ${c.desbloqueadas}/${c.total}</span>`;
            }).join('')}
          </div>

          <!-- FILTER BUTTONS (scrollable) -->
          <div class="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1" style="scrollbar-width: none; -ms-overflow-style: none;">
            ${filtros.map(f => {
              const activeClass = filtroClasses[f] || '';
              const count = f === 'Todas' ? COLECAO_CARTAS.length : COLECAO_CARTAS.filter(c => c.raridade === f).length;
              return `<button onclick="setArsenalFiltro('${f}')" class="filter-btn ${activeClass} px-4 py-2.5 rounded-xl text-xs font-extrabold tracking-wider text-gray-500 whitespace-nowrap min-h-[44px]">${f === 'Todas' ? 'TODAS' : RARITY_CONFIG[f]?.label.toUpperCase() || f.toUpperCase()} <span class="text-gray-700 ml-1">${count}</span></button>`;
            }).join('')}
          </div>

          <!-- CARD GALLERY (mobile grid) -->
          <div class="grid grid-cols-2 gap-3.5">
            ${cartasFiltradas.map(carta => renderCartaHTML(carta, lvl)).join('')}
          </div>

          ${cartasFiltradas.length === 0 ? '<p class="text-center text-gray-600 text-base font-bold py-10">Nenhuma carta nesta categoria.</p>' : ''}
        </div>
      `;
    }

    // =============================================
    // UTILITIES
    // =============================================
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg, duration = 2500) {
      const toast = document.createElement('div');
      toast.className = 'fixed top-20 left-4 right-4 mx-auto max-w-sm text-white text-xs font-bold px-4 py-3 rounded-xl z-[100] text-center leading-relaxed';
      toast.style.cssText = 'background: #111; border: 1px solid rgba(37,99,235,0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 15px rgba(37,99,235,0.1); animation: eliteSlideUp 0.35s cubic-bezier(.4,0,.2,1); backdrop-filter: blur(8px);';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.transition = 'opacity 0.3s, transform 0.3s';
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }

    // =============================================
    // PWA: SERVICE WORKER + INSTALL PROMPT
    // =============================================
    let deferredInstallPrompt = null;
    let appInstalled = false;

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      }
    }

    function setupInstallPrompt() {
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredInstallPrompt = e;
        // Show install banner after 3 seconds
        setTimeout(showInstallBanner, 3000);
      });

      window.addEventListener('appinstalled', () => {
        appInstalled = true;
        deferredInstallPrompt = null;
        hideInstallBanner();
        showToast('App instalado com sucesso!');
      });

      // Check if already installed (standalone mode)
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        appInstalled = true;
      }
    }

    function showInstallBanner() {
      if (appInstalled || !deferredInstallPrompt) return;
      // Don't show if already dismissed this session
      if (sessionStorage.getItem('install_dismissed')) return;
      hideInstallBanner();
      const banner = document.createElement('div');
      banner.id = 'installBanner';
      banner.className = 'install-banner';
      banner.innerHTML = `
        <div class="w-10 h-10 rounded-xl bg-royal/20 border border-royal/30 flex items-center justify-center flex-shrink-0">
          <span class="text-lg font-black text-royal">U</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-extrabold text-white">Instalar na Tela Inicial</p>
          <p class="text-[10px] font-semibold text-gray-500 mt-0.5">Acesso rápido, offline, sem navegador.</p>
        </div>
        <button onclick="triggerInstall()" class="btn-royal px-3 py-2 rounded-lg text-[11px] font-extrabold text-white flex-shrink-0">
          INSTALAR
        </button>
        <button onclick="dismissInstallBanner()" class="text-gray-600 hover:text-gray-400 p-1 flex-shrink-0">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      `;
      document.body.appendChild(banner);
    }

    function hideInstallBanner() {
      const el = document.getElementById('installBanner');
      if (el) el.remove();
    }

    function dismissInstallBanner() {
      sessionStorage.setItem('install_dismissed', '1');
      hideInstallBanner();
    }

    async function triggerInstall() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const result = await deferredInstallPrompt.userChoice;
      if (result.outcome === 'accepted') {
        appInstalled = true;
      }
      deferredInstallPrompt = null;
      hideInstallBanner();
    }

    // Check if app can be installed (for use in Status tab)
    function canInstallApp() {
      return !!deferredInstallPrompt && !appInstalled;
    }

    // =============================================
    // GEMINI AI ENGINE (v3.0)
    // =============================================
    const GEMINI_MODEL = 'gemini-2.5-flash';
    // Personas agora vivem no backend (api/gemini.js) via system_instruction dinâmico

    async function callGemini(prompt, maxTokens = 300, topicoEstudo = null, historico = null, moduloAtivo = null, imagemBase64 = null) {
      try {
        const payload = { prompt, maxTokens };
        if (topicoEstudo) payload.topicoEstudo = topicoEstudo;
        if (historico && historico.length > 0) payload.historico = historico;
        if (moduloAtivo) payload.moduloAtivo = moduloAtivo;
        if (imagemBase64) payload.imagemBase64 = imagemBase64;

        const res = await fetch('/api/gemini', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          console.error('Erro Real da API — Status:', res.status, res.statusText);
          console.error('Erro Real da API — Body:', JSON.stringify(data, null, 2));
          throw new Error(`HTTP ${res.status}: ${data?.error || 'Unknown error'}`);
        }

        return data.text || 'Sistema offline. Continue na disciplina.';
      } catch (err) {
        console.error('Erro Real da API — Exception:', err.message || err);
        console.error('Erro Real da API — Stack:', err.stack);
        return 'Conexão com IA falhou. O guerreiro não depende de tecnologia.';
      }
    }

    async function fetchAIVerdict() {
      const today = getTodayKey();
      const hourBlock = Math.floor(new Date().getHours() / 2);
      const cacheKey = 'verdict_' + today + '_' + hourBlock;
      const cached = userState.aiCache[cacheKey];
      if (cached && !cached.includes('falhou') && !cached.includes('offline')) { displayVerdict(cached); return; }

      const done = getMissoesDone();
      const total = MISSOES_POR_DIA;
      const score = calcDayScore(today);
      const hour = new Date().getHours();
      const mk = getMonthKey();
      const todayExp = (userState.monthlyExpenses[mk] || []).filter(e => e.date === today);
      const dopamina = todayExp.filter(e => e.category === 'dopamina').reduce((s, e) => s + e.amount, 0);
      const essencial = todayExp.filter(e => e.category === 'essencial').reduce((s, e) => s + e.amount, 0);
      const budget = userState.budget || 0;
      const dopPct = budget > 0 ? (dopamina / budget * 100) : 0;

      let extra = '';
      if (hour >= 12 && done < total) extra += '\nALERTA: Passou do MEIO-DIA e hábitos INCOMPLETOS. Seja EXTRA AGRESSIVO sobre preguiça.';
      if (dopPct > 15) extra += '\nALERTA: Dopamina Barata acima de 15%! Inclua uma ORDEM DE CORTE DE GASTOS.';

      const prompt = `DADOS (${today} ${hour}h): Hábitos ${done}/${total}, Score ${score}/100, Gastos hoje: Essencial R$${essencial.toFixed(0)} Dopamina R$${dopamina.toFixed(0)}, Streak ${userState.streakCount || 0}d.${extra}\n\nVEREDITO: Exatamente 2 frases. Direto, estoico, cobrador.`;
      const verdict = await callGemini(prompt, 150);

      userState.aiCache[cacheKey] = verdict;
      if (!userState.performanceLog[today]) userState.performanceLog[today] = {};
      userState.performanceLog[today].score = score;
      userState.performanceLog[today].verdict = verdict;
      saveData();
      displayVerdict(verdict);
    }

    function displayVerdict(text) {
      const el = document.getElementById('aiVerdict');
      if (el) { el.textContent = text; el.classList.remove('ai-loading'); el.style.opacity = '1'; }
    }

    async function fetchRecaidaFeedback(label) {
      const msg = await callGemini(`O soldado RECAIU no vício "${label}". Bronca em 1 frase curta. Mande recomeçar AGORA.`, 80);
      showToast(msg, 5000);
    }

    function getStagnationAlerts() {
      const alerts = {};
      const keys = Object.keys(userState.workoutLog).sort().reverse().slice(0, 30);
      const exHist = {};
      for (const k of keys) {
        const dl = userState.workoutLog[k];
        if (!dl?.exercises) continue;
        for (const [id, d] of Object.entries(dl.exercises)) {
          if (!d.load || d.load <= 0) continue;
          if (!exHist[id]) exHist[id] = [];
          if (exHist[id].length < 3) exHist[id].push(d.load);
        }
      }
      for (const [id, loads] of Object.entries(exHist)) {
        if (loads.length >= 3 && loads.every(l => l === loads[0])) alerts[id] = true;
      }
      return alerts;
    }

    async function fetchFullAnalysis() {
      const weekScores = getWeekScores();
      const avg = getWeekAvgScore();
      const fin = getMonthFinancials();
      const vicData = DEFAULT_VICIOS.map(v => {
        const d = userState.vicios[v.id];
        if (!d?.startedAt) return `${d?.label || v.label}: INATIVO`;
        const t = calcTimeSince(d.startedAt);
        return `${d.label || v.label}: ${t.days}d ${t.hours}h`;
      }).join(', ');
      const stag = Object.keys(getStagnationAlerts());
      const prompt = `RELATÓRIO SEMANAL DO SOLDADO:
Score Médio ${avg}/100, Streak ${userState.streakCount||0}d, Hábitos ${getWeekHabitRate()}%, Foco ${getWeekFocusHours()}h
Scores: ${weekScores.map(d=>d.dayLabel+':'+d.score).join(' ')}
Finanças: Budget R$${fin.budget}, Gasto R$${fin.totalGasto}, Essencial R$${fin.totalEssencial}, Dopamina R$${fin.totalDopamina}, Saldo R$${fin.saldo}
Vícios: ${vicData}
Treino estagnado: ${stag.length>0?stag.join(', '):'nenhum'}

ANÁLISE COMPLETA no formato:
[VEREDITO ESTOICO] 2 frases estado geral
[ANÁLISE DE FALHAS] max 4 pontos fracos
[MISSÃO PRÓXIMA SEMANA] 3 ordens executáveis
Formato terminal militar. Sem emojis. Direto e brutal.`;
      return await callGemini(prompt, 600);
    }

    function getFocusAdaptiveFeedback() {
      const today = getTodayKey();
      let totalSec = 0, activeDays = 0;
      for (let i = 6; i >= 0; i--) {
        const dk = getDateOffset(today, -i);
        const fs = userState.focusSessions[dk];
        if (fs && fs.totalSeconds > 0) { totalSec += fs.totalSeconds; activeDays++; }
      }
      if (activeDays === 0) return null;
      const avgH = totalSec / activeDays / 3600;
      const goal = userState.profile?.focusGoalHours || 4;
      if ((avgH / goal * 100) < 50) {
        return 'ALERTA TÁTICO: Sua média de foco semanal está abaixo de 50% da meta. Estratégia: blocos Pomodoro de 25min com 5min de pausa. Construa a base antes de mirar 4h direto.';
      }
      return null;
    }

    async function runFullAnalysis() {
      const btn = document.getElementById('analysisBtn');
      const result = document.getElementById('analysisResult');
      if (btn) { btn.textContent = 'PROCESSANDO...'; btn.disabled = true; }
      if (result) { result.classList.remove('hidden'); result.textContent = '> Conectando ao Mentor Estoico...\n> Analisando dados de combate...\n> Processando...'; }
      const analysis = await fetchFullAnalysis();
      if (result) result.textContent = analysis;
      if (btn) { btn.textContent = 'ANÁLISE DE GUERRA COMPLETA'; btn.disabled = false; }
    }

    // =============================================
    // HAPTIC FEEDBACK
    // =============================================
    function haptic(pattern = 30) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    // =============================================
    // SCARCITY DETECTION
    // =============================================
    function checkScarcity() {
      const budget = userState.budget || 0;
      if (budget <= 0) { document.body.classList.remove('scarcity-vignette'); return; }
      const mk = getMonthKey();
      const expenses = userState.monthlyExpenses[mk] || [];
      const totalGasto = expenses.reduce((s, e) => s + e.amount, 0);
      const saldo = budget - totalGasto;
      if (saldo < budget * 0.1) {
        document.body.classList.add('scarcity-vignette');
      } else {
        document.body.classList.remove('scarcity-vignette');
      }
    }

    // =============================================
    // REST TIMER (TREINO)
    // =============================================
    function startRestTimer(seconds = 90) {
      stopRestTimer();
      restTimerSeconds = seconds;
      const totalSec = seconds;
      restTimerInterval = setInterval(() => {
        restTimerSeconds--;
        const bar = document.getElementById('restTimerBar');
        const label = document.getElementById('restTimerLabel');
        if (bar) bar.style.width = `${(restTimerSeconds / totalSec) * 100}%`;
        if (label) label.textContent = `Descanso: ${restTimerSeconds}s`;
        if (restTimerSeconds <= 0) {
          stopRestTimer();
          haptic([100, 50, 100]);
          showToast('DESCANSO ACABOU. PRÓXIMA SÉRIE.');
          const container = document.getElementById('restTimerContainer');
          if (container) container.classList.add('hidden');
        }
      }, 1000);
    }

    function stopRestTimer() {
      if (restTimerInterval) { clearInterval(restTimerInterval); restTimerInterval = null; }
      restTimerSeconds = 0;
    }

    // =============================================
    // EXERCISE HISTORY
    // =============================================
    function getExerciseHistory(exerciseId) {
      const logs = userState.workoutLog;
      const keys = Object.keys(logs).sort().reverse();
      const history = [];
      for (const k of keys) {
        if (history.length >= 3) break;
        const ex = logs[k]?.exercises?.[exerciseId];
        if (ex && ex.load > 0) {
          history.push({ date: k, load: ex.load, done: ex.done });
        }
      }
      return history;
    }

    function toggleExerciseHistory(exerciseId) {
      const el = document.getElementById('history-' + exerciseId);
      if (el) el.classList.toggle('hidden');
    }

    // =============================================
    // RECAÍDA OVERLAY
    // =============================================
    function showRecaidaOverlay(vicioId) {
      const data = userState.vicios[vicioId];
      const time = calcTimeSince(data?.startedAt);
      const days = time ? time.days : 0;
      const impactMsg = days >= 7
        ? `Você construiu ${days} DIAS de soberania. Cada dia foi uma batalha vencida. Vai destruir tudo agora?`
        : days >= 3
        ? `${days} dias de progresso serão ZERADOS. A dor da recaída dura mais que o prazer. Tem certeza?`
        : 'O cronômetro volta a zero. Mas lembre-se: cada recomeço é uma chance de ir mais longe.';
      const overlay = document.createElement('div');
      overlay.id = 'recaidaOverlay';
      overlay.className = 'recaida-overlay';
      overlay.innerHTML = `
        <div class="w-full max-w-sm mx-4 p-6 rounded-2xl card-neu text-center">
          <p class="text-4xl mb-4">\u{1F480}</p>
          <p class="text-lg font-black neon-red mb-2">CONFIRMAR RECAÍDA?</p>
          <p class="text-sm font-bold text-gray-400 mb-6 leading-relaxed">${impactMsg}</p>
          ${days >= 7 ? '<p class="text-xs font-extrabold neon-red mb-4">VOCÊ VAI PERDER ' + days + ' DIAS DE PROGRESSO</p>' : ''}
          <div class="flex gap-3">
            <button onclick="closeRecaidaOverlay()" class="flex-1 py-3 rounded-xl bg-[#111] border border-[#333] text-gray-400 font-extrabold text-sm tracking-wider active:scale-95 transition-all">
              CANCELAR
            </button>
            <button onclick="confirmRecaida('${vicioId}')" class="flex-1 py-3 rounded-xl bg-red-950/50 border-2 border-red-900/60 text-red-400 font-extrabold text-sm tracking-wider active:scale-95 transition-all">
              CONFIRMAR
            </button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      haptic([50, 30, 50]);
    }

    function closeRecaidaOverlay() {
      const el = document.getElementById('recaidaOverlay');
      if (el) el.remove();
    }

    function confirmRecaida(vicioId) {
      closeRecaidaOverlay();
      userState.vicios[vicioId].startedAt = new Date().toISOString();
      haptic(100);
      // Invalidate verdict cache (force refresh)
      const today = getTodayKey();
      Object.keys(userState.aiCache).forEach(k => { if (k.startsWith('verdict_' + today)) delete userState.aiCache[k]; });
      saveData();
      renderActiveTab();
      const label = userState.vicios[vicioId]?.label || vicioId;
      fetchRecaidaFeedback(label);
    }

    // =============================================
    // EXTREME FOCUS MODE
    // =============================================
    function toggleExtremeFocus() {
      extremeFocusMode = !extremeFocusMode;
      const nav = document.querySelector('nav');
      if (nav) nav.classList.toggle('nav-hidden', extremeFocusMode);
      const main = document.getElementById('mainContent');
      if (main) main.style.marginBottom = extremeFocusMode ? '0' : '';
      haptic(20);
    }

    // =============================================
    // INIT
    // =============================================
    (async function init() {
      registerServiceWorker();
      setupInstallPrompt();
      setInterval(updateHeaderDate, 60000);

      // Check for existing Supabase session
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session && session.user) {
          currentUser = session.user;
          document.getElementById('authScreen').style.display = 'none';
          await cloudLoad();
          loadData();
          updateHeaderDate();
          switchTab('dashboard');
          checkScarcity();
          return;
        }
      } catch (err) {
        console.error('Session restore error:', err);
      }

      // No session — show login screen, but load localStorage as fallback display
      loadData();
      updateHeaderDate();

      // Listen for auth state changes (e.g., email confirmation redirect)
      supabase.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session?.user) {
          currentUser = session.user;
          await onAuthSuccess();
        }
        if (event === 'SIGNED_OUT') {
          currentUser = null;
          document.getElementById('authScreen').style.display = 'flex';
        }
      });
    })();
  </script>
